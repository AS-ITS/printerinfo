<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印表機明細 | Printer Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --accent: #fb6a7d;
            --accent-strong: #f43f5e;
            --accent-soft: #fff1f4;
            --blue: #3b9cff;
            --ink: #172033;
            --muted: #64748b;
            --surface: #edf1f5;
            --panel: #ffffff;
            --line: #d9dee7;
            --line-soft: #eef1f5;
        }

        * { box-sizing: border-box; }
        html { width: 100%; overflow-x: hidden; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Plus Jakarta Sans", "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif;
            background: var(--surface);
            color: var(--ink);
            overflow-x: hidden;
        }

        button, input, select, textarea { font: inherit; }
        canvas { max-width: 100%; }

        .glass-panel {
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
        }

        .detail-shell {
            width: min(100%, 1280px);
            margin: 0 auto;
            padding: 0 14px 18px;
            min-width: 0;
        }

        /* Login */
        #login-screen {
            padding: 24px;
        }
        #login-screen h1 {
            line-height: 1.05;
            overflow-wrap: anywhere;
        }

        /* Hero */
        .detail-hero {
            min-height: 130px;
            margin: 0 -14px 12px;
            padding: 24px 22px 8px 34px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 860px);
            gap: 18px;
            align-items: center;
            color: #ffffff;
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
        }

        .detail-title {
            margin: 0;
            font-size: 42px;
            line-height: 1.05;
            font-weight: 800;
            color: #111827;
        }

        .detail-subtitle {
            margin-top: 6px;
            color: #475569;
            font-size: 15px;
            font-weight: 700;
        }

        .hero-side {
            display: grid;
            grid-template-columns: minmax(240px, 270px) minmax(0, 1fr);
            gap: 12px;
            align-items: stretch;
            min-width: 0;
        }

        .date-panel {
            border: 1px solid rgba(0, 0, 0, 0.12);
            border-radius: 8px;
            padding: 10px 12px;
            min-height: 112px;
            background: rgba(0, 0, 0, 0.03);
        }

        .date-panel-title {
            margin: 0 0 8px;
            font-size: 12px;
            font-weight: 800;
            color: #475569;
        }

        .date-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .date-field {
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border: 1px solid rgba(0, 0, 0, 0.10);
            color: #111827;
            font-size: 13px;
            font-weight: 800;
            line-height: 1;
            white-space: nowrap;
        }

        .date-rule {
            position: relative;
            height: 4px;
            margin: 18px 14px 0;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.15);
        }

        .date-rule::after {
            content: "";
            position: absolute;
            right: -13px;
            top: 50%;
            width: 30px;
            height: 30px;
            border-radius: 999px;
            background: #ffffff;
            transform: translateY(-50%);
            box-shadow: 0 2px 4px rgba(15, 23, 42, 0.12);
        }

        .dashboard-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        #dashboard-refresh-btn,
        #signout-btn,
        #back-btn {
            border: 1px solid rgba(0, 0, 0, 0.12) !important;
            border-radius: 8px !important;
            background: rgba(0, 0, 0, 0.05) !important;
            color: #111827 !important;
            padding: 9px 13px !important;
            font-size: 13px !important;
            font-weight: 800 !important;
            line-height: 1 !important;
            transition: background 0.15s ease, transform 0.15s ease;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        #dashboard-refresh-btn:hover,
        #signout-btn:hover,
        #back-btn:hover {
            background: rgba(0, 0, 0, 0.10) !important;
            transform: translateY(-1px);
        }

        #last-update {
            color: #475569 !important;
            font-size: 12px !important;
            font-weight: 700 !important;
        }

        /* Summary cards */
        .summary-strip {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 10px;
            min-width: 0;
        }

        .summary-card {
            min-width: 0;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            padding: 10px 12px;
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.10);
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(15, 23, 42, 0.08);
        }

        .summary-value {
            margin: 0;
            color: #d95f72;
            font-size: 28px;
            line-height: 1;
            font-weight: 800;
        }

        .summary-label {
            margin: 0;
            color: #172033;
            font-size: 12px;
            font-weight: 800;
        }

        .summary-hint {
            margin: 0;
            color: var(--muted);
            font-size: 10px;
            font-weight: 700;
        }

        /* Layout */
        .detail-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 300px;
            gap: 12px;
            align-items: start;
            min-width: 0;
        }

        .detail-main-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(430px, 0.95fr);
            grid-template-areas:
                "trend details"
                "warnings incidents";
            gap: 10px;
            min-width: 0;
        }

        #trend-section { grid-area: trend; }
        #printer-info { grid-area: details; }
        #supply-warnings { grid-area: warnings; }
        #incidents-section { grid-area: incidents; }

        #trend-section,
        #printer-info,
        #supply-warnings,
        #incidents-section {
            margin: 0 !important;
            border-radius: 8px !important;
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
        }

        #trend-section,
        #printer-info,
        #supply-warnings,
        #incidents-section {
            padding: 12px !important;
        }

        .section-title {
            margin: 0 0 10px !important;
            color: var(--accent-strong) !important;
            font-size: 17px !important;
            line-height: 1.2 !important;
            font-weight: 800 !important;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 252px;
        }

        #trend-section .chart-container {
            height: 312px;
        }

        /* Printer info card */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .info-item {
            padding: 8px 10px;
            border-radius: 6px;
            background: #f8fafc;
            border: 1px solid var(--line-soft);
        }

        .info-label {
            font-size: 10px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .info-value {
            font-size: 14px;
            font-weight: 800;
            color: #111827;
            margin-top: 2px;
        }

        .info-value.mono {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
        }

        /* Status dot */
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.58; }
        }

        .status-dot.status-normal {
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
        }

        .status-dot.status-warning {
            background: #f59e0b;
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.6);
        }

        .status-dot.status-error {
            background: #ef4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
        }

        /* Supply bar */
        .supply-bar {
            height: 8px;
            border-radius: 4px;
            background: #e5e7eb;
            overflow: hidden;
            margin-top: 4px;
        }

        .supply-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .supply-chip {
            display: inline-flex;
            min-width: 44px;
            justify-content: flex-end;
            font-size: 14px;
            font-weight: 800;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        /* Warning cards */
        .supply-warning-card {
            border-left: 4px solid;
            border-radius: 8px !important;
            background: #fff7ed !important;
        }

        #incidents-list > div {
            border: 1px solid var(--line-soft);
            border-radius: 8px !important;
            background: #f8fafc !important;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #eef2f7; }
        ::-webkit-scrollbar-thumb { background: #aeb7c4; border-radius: 999px; }

        /* Responsive */
        @media (max-width: 1220px) {
            .detail-hero {
                grid-template-columns: 1fr;
                padding-right: 22px;
            }
            .hero-side {
                grid-template-columns: 270px minmax(0, 1fr);
            }
            .detail-layout {
                grid-template-columns: 1fr;
            }
            .detail-main-grid {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
                grid-template-areas:
                    "trend"
                    "details"
                    "warnings"
                    "incidents";
            }
        }

        @media (max-width: 980px) {
            .hero-side { grid-template-columns: 1fr; }
            .summary-strip { grid-template-columns: repeat(3, minmax(0, 1fr)); }
            .detail-main-grid {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "trend"
                    "details"
                    "warnings"
                    "incidents";
            }
            .chart-container, #trend-section .chart-container { height: 280px; }
        }

        @media (max-width: 760px) {
            .detail-shell { padding: 0 10px 14px; }
            .detail-hero { margin: 0 -10px 10px; padding: 20px 16px 14px 22px; border-left-width: 10px; }
            .detail-title { font-size: 32px; }
            .hero-side { grid-template-columns: 1fr; }
            .summary-strip { grid-template-columns: 1fr; }
            .info-grid { grid-template-columns: 1fr; }
            .chart-container { height: 230px; }
            #trend-section .chart-container { height: 280px; }
        }

        @media (max-width: 520px) {
            #login-screen { padding: 18px; }
            #login-screen h1 { font-size: 32px !important; }
            #google-login-btn { width: 100%; justify-content: center; }
            .detail-shell { padding: 0 8px 12px; }
            .detail-hero { margin: 0 -8px 8px; padding: 18px 12px 12px 18px; border-left-width: 8px; }
            .detail-title { font-size: 28px; line-height: 1.18; }
            .dashboard-actions { align-items: stretch; flex-direction: column; gap: 8px; }
            #dashboard-refresh-btn, #signout-btn, #back-btn { width: 100%; }
            #last-update { text-align: left; }
            .summary-card { min-height: 72px; padding: 10px; }
            .summary-value { font-size: 24px; }
        }
    </style>
</head>

<body>
    <!-- 登入畫面 -->
    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center" style="background: radial-gradient(circle at 0% 0%, #0f172a, #1e1b4b);">
        <div class="text-center">
            <h1 class="text-5xl font-extrabold mb-2 text-white">OPERATIONS<span class="text-indigo-500">CENTER</span></h1>
            <p class="text-slate-400 font-medium mb-8">全院印表機監控系統</p>
            <button id="google-login-btn"
                class="flex items-center gap-3 mx-auto bg-white text-slate-900 hover:bg-slate-100 font-bold py-3 px-8 rounded-xl transition-all duration-200 shadow-lg hover:shadow-xl"
                onclick="handleGoogleLogin()">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.65 0 6.53 5.78 5.04 13.42l7.46 5.79C13.64 15.08 18.3 9.5 24 9.5z"/>
                    <path fill="#34A853" d="M46.85 24.49c.34-1.97.54-3.98.54-6.49 0-1.49-.13-2.9-.39-4.25H24v9.03h12.74c-.57 2.99-2.23 5.45-4.74 7.12l7.43 5.76c4.34-4.01 6.85-9.91 6.85-15.17z"/>
                    <path fill="#4A90D9" d="M5.04 13.42C3.48 16.53 2.55 20.21 2.55 24s.93 7.47 2.49 10.58l-7.46 5.79C-1.54 37.01-3.04 30.92-3.04 24s1.5-13.01 4.09-18.58l4z"/>
                    <path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.76l-7.43-5.76c-2.14 1.44-4.88 2.36-8.46 2.36-6.54 0-12.08-4.42-14.04-10.4L5.04 34.58C6.53 42.22 14.65 48 24 48z"/>
                </svg>
                Sign in with Google
            </button>
            <p id="login-error" class="text-red-400 text-sm mt-4 hidden"></p>
        </div>
    </div>

    <!-- 明細內容（初始隱藏） -->
    <div id="detail-content" class="detail-shell hidden">
        <header class="detail-hero">
            <div>
                <button id="back-btn" onclick="window.location.href='index.html'">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                    返回儀表板
                </button>
                <h1 id="detail-title" class="detail-title">載入中...</h1>
                <p id="detail-subtitle" class="detail-subtitle"></p>
                <div class="dashboard-actions">
                    <button id="dashboard-refresh-btn" type="button" onclick="handleDetailRefresh()">重整</button>
                    <div id="last-update"></div>
                </div>
            </div>
            <div class="hero-side">
                <div class="date-panel" aria-label="資料日期區間">
                    <p class="date-panel-title">Date</p>
                    <div class="date-fields">
                        <span id="date-start" class="date-field">--</span>
                        <span id="date-end" class="date-field">--</span>
                    </div>
                    <div class="date-rule" aria-hidden="true"></div>
                </div>
                <div id="summary-bar" class="summary-strip" aria-label="列印量概況"></div>
            </div>
        </header>

        <div class="detail-layout">
            <main class="detail-main-grid">
                <!-- 每日趨勢圖 -->
                <div id="trend-section" class="glass-panel rounded-2xl mb-8">
                    <h3 class="text-lg font-bold mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M12 17h.01"></path>
                        </svg>
                        每日總印量趨勢
                    </h3>
                    <div class="chart-container">
                        <canvas id="trend-chart"></canvas>
                    </div>
                </div>

                <!-- 印表機資訊 -->
                <div id="printer-info" class="glass-panel rounded-2xl mb-8">
                    <h3 class="text-lg font-bold mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        印表機資訊
                    </h3>
                    <div id="info-grid" class="info-grid"></div>
                </div>

                <!-- 耗材警告列表 -->
                <div id="supply-warnings" class="mb-8 hidden">
                    <h3 class="text-lg font-bold mb-4 flex items-center text-amber-400">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                        耗材警告
                    </h3>
                    <div id="supply-warnings-list" class="space-y-2"></div>
                </div>

                <!-- 近期故障記錄 -->
                <div id="incidents-section" class="glass-panel rounded-2xl p-6 mb-8 hidden">
                    <h3 class="text-lg font-bold mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        近期故障記錄（30 天）
                    </h3>
                    <div id="incidents-list" class="space-y-2"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let cachedPrinterData = null;
        let cachedSupplies = {};
        let cachedIncidents = [];
        let cachedMetrics = {};

        // Supabase 設定
        const SUPABASE_URL = 'https://aopzclrptvpfovklhcip.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvcHpjbHJwdHZwZm92a2xoY2lwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDI1MzgsImV4cCI6MjA5MjM3ODUzOH0.ZXpDc6ADxFXwSj6LYjcZn9viytSHEPA_69E7VY2bVT0';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // == 獲取 URL 參數 ==
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        let currentPrinterIP = getUrlParam('ip');
        let currentPrinterID = getUrlParam('id');

        // == 每日增量計算 ==
        function buildCorrectedTrend(rawMetrics) {
            if (!rawMetrics || rawMetrics.length === 0) return [];
            let previousComparable = null;
            return rawMetrics.map(row => {
                const hasReading = ['total_count', 'print_count', 'copy_count', 'scan_total', 'fax_count']
                    .some(key => Number(row?.[key] || 0) > 0);
                let dailyPrint = 0, dailyCopy = 0, dailyScan = 0, dailyFax = 0, dailyTotal = 0;

                if (hasReading && previousComparable) {
                    dailyPrint = Math.max(0, Number(row?.print_count || 0) - Number(previousComparable?.print_count || 0));
                    dailyCopy = Math.max(0, Number(row?.copy_count || 0) - Number(previousComparable?.copy_count || 0));
                    dailyScan = Math.max(0, Number(row?.scan_total || 0) - Number(previousComparable?.scan_total || 0));
                    dailyFax = Math.max(0, Number(row?.fax_count || 0) - Number(previousComparable?.fax_count || 0));
                    dailyTotal = dailyPrint + dailyCopy + dailyFax;
                }

                const corrected = { ...row, daily_print: dailyPrint, daily_copy: dailyCopy, daily_scan: dailyScan, daily_fax: dailyFax, daily_total: dailyTotal };

                if (hasReading) previousComparable = row;
                else if (!previousComparable) previousComparable = row;

                return corrected;
            });
        }

        // == 載入明細資料 ==
        async function renderDetail(options = {}) {
            const force = Boolean(options.force);
            if (!force && cachedPrinterData) {
                renderScopedDetail();
                return;
            }

            const btn = document.getElementById('dashboard-refresh-btn');
            if (btn) { btn.disabled = true; btn.textContent = '載入中...'; btn.classList.add('opacity-60'); }

            try {
                // 1. 取得印表機基本資料
                let printerQuery = supabaseClient.from('printers').select('*');
                if (currentPrinterID) {
                    printerQuery = printerQuery.eq('id', parseInt(currentPrinterID));
                } else if (currentPrinterIP) {
                    printerQuery = printerQuery.eq('ip_address', currentPrinterIP);
                }
                const { data: printerRows, error: pErr } = await printerQuery.limit(1);
                if (pErr) throw pErr;
                if (!printerRows || printerRows.length === 0) throw new Error('找不到該印表機');

                const printer = printerRows[0];

                // 2. 取得耗材資料
                const { data: rawSupplies } = await supabaseClient.from('supplies').select('*').eq('printer_id', printer.id);
                cachedSupplies = {};
                (rawSupplies || []).forEach(s => {
                    if (!cachedSupplies[s.printer_id]) cachedSupplies[s.printer_id] = [];
                    cachedSupplies[s.printer_id].push(s);
                });

                // 3. 取得歷史數據
                const { data: rawMetrics } = await supabaseClient
                    .from('daily_stats')
                    .select('*')
                    .eq('ip_address', printer.ip_address)
                    .order('recorded_at', { ascending: true });

                // 4. 取得故障記錄
                const { data: rawIncidents } = await supabaseClient
                    .from('incidents')
                    .select('*')
                    .eq('printer_id', printer.id)
                    .gte('incident_date', new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString().substring(0, 10));

                cachedIncidents = rawIncidents || [];
                cachedMetrics[printer.ip_address] = (rawMetrics || []).sort((a, b) =>
                    new Date(a.recorded_at) - new Date(b.recorded_at)
                );

                // 5. 建構 printer 資料
                const trend = buildCorrectedTrend(cachedMetrics[printer.ip_address] || []);
                const today = getTodayDateString();
                const todayMetrics = trend.filter(m => (m.recorded_at || '').substring(0, 10) === today);
                const todayTotal = todayMetrics.reduce((sum, m) => sum + Math.max(0, m.daily_total || 0), 0);
                const todayPrint = todayMetrics.reduce((sum, m) => sum + Math.max(0, m.daily_print || 0), 0);
                const todayCopy = todayMetrics.reduce((sum, m) => sum + Math.max(0, m.daily_copy || 0), 0);
                const todayFax = todayMetrics.reduce((sum, m) => sum + Math.max(0, m.daily_fax || 0), 0);

                const supplies = (cachedSupplies[printer.id] || []).map(s => {
                    const typeIds = { toner: 0, ink: 1, paper: 2 };
                    return { type: typeIds[s.supply_type] ?? 0, percent: s.remaining_percent || 100 };
                });

                const now = new Date();
                const warrantyDays = printer.warranty_end ?
                    Math.ceil((new Date(printer.warranty_end) - now) / (24 * 60 * 60 * 1000)) : 999;

                const status = (printer.status || (supplies.some(s => s.percent < 15) ? 'warning' : 'normal'));

                // 計算所有歷史總量
                let allTimeTotal = 0;
                if (trend.length > 0) {
                    allTimeTotal = trend.reduce((sum, m) => sum + Math.max(0, m.daily_total || 0), 0);
                }

                cachedPrinterData = {
                    ...printer,
                    supplies,
                    trend,
                    daily_total: todayTotal,
                    daily_print: todayPrint,
                    daily_copy: todayCopy,
                    total_all_time: allTimeTotal,
                    warranty_days: Math.max(0, warrantyDays),
                    printer_status: status
                };

                renderScopedDetail();
                document.getElementById('last-update').innerText = `最後更新：${new Date().toLocaleString('zh-TW', { hour12: false })}`;
            } catch (e) {
                console.error('載入失敗:', e);
                document.getElementById('detail-title').innerText = '載入失敗';
                document.getElementById('detail-subtitle').innerText = e.message || String(e);
            } finally {
                if (btn) { btn.disabled = false; btn.textContent = '重整'; btn.classList.remove('opacity-60'); }
            }
        }

        function getScopedPrinter() {
            return cachedPrinterData;
        }

        function renderScopedDetail() {
            const p = getScopedPrinter();
            if (!p) return;

            document.getElementById('detail-title').innerText = p.location;
            document.getElementById('detail-subtitle').innerText = `${p.ip_address} | ${p.model} | ${p.unit}`;

            renderSummary(p);
            updateDataRange(p);
            renderTrendChart(p);
            renderPrinterInfo(p);
            renderSupplyWarnings(p);
            renderIncidents(cachedIncidents.filter(i => i.printer_id === p.id));
        }

        function getTodayDateString() {
            const todayLocal = new Date();
            return `${todayLocal.getFullYear()}-${String(todayLocal.getMonth() + 1).padStart(2, '0')}-${String(todayLocal.getDate()).padStart(2, '0')}`;
        }

        function formatDashboardDate(dateString) {
            if (!dateString) return '--';
            const date = new Date(dateString);
            if (Number.isNaN(date.getTime())) return '--';
            return `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
        }

        function updateDataRange(p) {
            const startEl = document.getElementById('date-start');
            const endEl = document.getElementById('date-end');
            if (!startEl || !endEl) return;
            const dates = (p.trend || []).map(r => (r.recorded_at || '').substring(0, 10)).filter(Boolean);
            dates.sort();
            startEl.textContent = formatDashboardDate(dates[0]);
            endEl.textContent = formatDashboardDate(dates[dates.length - 1]);
        }

        function renderSummary(p) {
            const bar = document.getElementById('summary-bar');
            bar.innerHTML = `
                <div class="summary-card">
                    <p class="summary-value">${(p.daily_print || 0).toLocaleString()}</p>
                    <p class="summary-label">列印</p>
                    <p class="summary-hint">今日</p>
                </div>
                <div class="summary-card">
                    <p class="summary-value">${(p.daily_copy || 0).toLocaleString()}</p>
                    <p class="summary-label">影印</p>
                    <p class="summary-hint">今日</p>
                </div>
                <div class="summary-card">
                    <p class="summary-value">${(p.daily_fax || 0).toLocaleString()}</p>
                    <p class="summary-label">傳真</p>
                    <p class="summary-hint">今日</p>
                </div>
                <div class="summary-card">
                    <p class="summary-value" style="color: #fb6a7d;">${(p.daily_total || 0).toLocaleString()}</p>
                    <p class="summary-label">總計</p>
                    <p class="summary-hint">今日</p>
                </div>
                <div class="summary-card">
                    <p class="summary-value">${(p.total_all_time || 0).toLocaleString()}</p>
                    <p class="summary-label">累計</p>
                    <p class="summary-hint">全部期間</p>
                </div>
            `;
        }

        // == 趨勢圖 ==
        let trendChartInstance = null;

        function renderTrendChart(p) {
            const dates = (p.trend || []).map(r => (r.recorded_at || '').substring(0, 10));
            const totals = (p.trend || []).map(r => r.daily_total || 0);
            const validIndices = totals.map((v, i) => v > 0 ? i : -1).filter(i => i >= 0);
            const validDates = validIndices.map(i => dates[i]);
            const validTotals = validIndices.map(i => totals[i]);

            const ctx = document.getElementById('trend-chart').getContext('2d');
            if (trendChartInstance) { trendChartInstance.destroy(); trendChartInstance = null; }

            if (typeof Chart === 'undefined' || validDates.length === 0) return;

            trendChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: validDates,
                    datasets: [{
                        label: '每日總印量',
                        data: validTotals,
                        borderColor: '#3b9cff',
                        backgroundColor: 'rgba(59, 156, 255, 0.14)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: validDates.length > 30 ? 0 : 3,
                        pointHoverRadius: 5,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { backgroundColor: 'rgba(23, 32, 51, 0.94)' } },
                    scales: {
                        x: { grid: { color: '#eef1f5' }, ticks: { color: '#526071', maxTicksLimit: 10, font: { family: 'Plus Jakarta Sans', weight: '700' } } },
                        y: { grid: { color: '#e5e9f0' }, ticks: { color: '#526071', font: { family: 'Plus Jakarta Sans', weight: '700' }, callback: v => Number(v).toLocaleString() }, beginAtZero: true }
                    }
                }
            });
        }

        // == 印表機資訊 ==
        function renderPrinterInfo(p) {
            const grid = document.getElementById('info-grid');
            const typeNames = { 0: '碳粉', 1: '墨水', 2: '紙張' };
            const toner = (p.supplies || []).find(s => s.type === 0);
            const ink = (p.supplies || []).find(s => s.type === 1);
            const paper = (p.supplies || []).find(s => s.type === 2);

            grid.innerHTML = `
                <div class="info-item">
                    <div class="info-label">狀態</div>
                    <div class="info-value">
                        <span class="status-dot status-${p.printer_status}"></span>
                        ${p.printer_status === 'normal' ? '正常' : p.printer_status === 'warning' ? '注意' : '異常'}
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">型號</div>
                    <div class="info-value">${p.model || '-'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">IP 位址</div>
                    <div class="info-value mono">${p.ip_address || '-'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">位置</div>
                    <div class="info-value">${p.location || '-'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">單位</div>
                    <div class="info-value">${p.unit || '-'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">保固剩餘</div>
                    <div class="info-value">${p.warranty_days >= 999 ? '無保固資訊' : p.warranty_days + ' 天'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">碳粉</div>
                    <div class="info-value"><span class="supply-chip" style="color:${supplyColor(toner?.percent)}">${toner?.percent ?? '--'}%</span></div>
                </div>
                <div class="info-item">
                    <div class="info-label">墨水</div>
                    <div class="info-value"><span class="supply-chip" style="color:${supplyColor(ink?.percent)}">${ink?.percent ?? '--'}%</span></div>
                </div>
                <div class="info-item">
                    <div class="info-label">紙張</div>
                    <div class="info-value"><span class="supply-chip" style="color:${supplyColor(paper?.percent)}">${paper?.percent ?? '--'}%</span></div>
                </div>
                <div class="info-item">
                    <div class="info-label">累計總印量</div>
                    <div class="info-value">${(p.total_all_time || 0).toLocaleString()}</div>
                </div>
            `;
        }

        // == 耗材警告 ==
        function renderSupplyWarnings(p) {
            const warnings = [];
            const typeNames = { 0: '碳粉', 1: '墨水', 2: '紙張' };
            (p.supplies || []).forEach(s => {
                if (s.percent < 15) {
                    warnings.push({ type: typeNames[s.type] || s.type, percent: s.percent });
                }
            });

            const container = document.getElementById('supply-warnings');
            const list = document.getElementById('supply-warnings-list');
            if (warnings.length === 0) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');
            list.innerHTML = warnings.map(w => `
                <div class="supply-warning-card bg-amber-500/10 border-amber-500 rounded-r-xl p-3 flex justify-between items-center">
                    <div>
                        <span class="font-bold text-amber-300">${w.type}剩餘</span>
                    </div>
                    <span class="text-amber-400 font-mono font-bold">${w.percent}%</span>
                </div>
            `).join('');
        }

        // == 故障記錄 ==
        function renderIncidents(incidents) {
            const container = document.getElementById('incidents-section');
            const list = document.getElementById('incidents-list');
            if (!incidents || incidents.length === 0) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');
            list.innerHTML = incidents.map(inc => `
                <div class="bg-white/5 rounded-xl p-3 flex justify-between items-center">
                    <div>
                        <span class="text-red-400 font-mono text-sm">${inc.error_code || 'Unknown'}</span>
                        <span class="text-slate-400 ml-2 text-sm">${inc.description || ''}</span>
                    </div>
                    <div class="text-right text-slate-500 text-sm">
                        <div>${inc.incident_date?.substring(0, 10) || ''}</div>
                        ${inc.downtime_minutes ? `<div class="text-red-400">${inc.downtime_minutes} 分鐘</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function supplyColor(percent) {
            if (percent === undefined || percent === null) return '#94a3b8';
            if (percent <= 15) return '#ef4444';
            if (percent <= 50) return '#eab308';
            return '#22c55e';
        }

        // == 刷新 ==
        function handleDetailRefresh() {
            renderDetail({ force: true });
        }

        // == 認證邏輯 ==
        let currentUser = null;

        async function handleGoogleLogin() {
            const btn = document.getElementById('google-login-btn');
            btn.disabled = true;
            btn.innerHTML = '登入中...';
            const { data, error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
            if (error) {
                const errEl = document.getElementById('login-error');
                errEl.textContent = error.message;
                errEl.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = 'Sign in with Google';
            }
        }

        function setAuthState(isLoggedIn) {
            document.getElementById('login-screen').style.display = isLoggedIn ? 'none' : 'flex';
            document.getElementById('detail-content').classList.toggle('hidden', !isLoggedIn);
            if (isLoggedIn && currentUser) addSignOutButton(currentUser);
        }

        function addSignOutButton(user) {
            const header = document.querySelector('header');
            const existing = document.getElementById('signout-btn');
            if (existing) existing.remove();
            const btn = document.createElement('button');
            btn.id = 'signout-btn';
            btn.className = 'px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 text-slate-300 text-sm font-medium transition-colors border border-white/10';
            btn.textContent = `Sign out (${user.email})`;
            btn.onclick = handleSignOut;
            const actions = document.querySelector('.dashboard-actions');
            if (actions) actions.appendChild(btn);
            else header?.appendChild(btn);
        }

        async function handleSignOut() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        // == 初始化 ==
        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                setAuthState(true);
                renderDetail();
            } else {
                setAuthState(false);
            }
            supabaseClient.auth.onAuthStateChange((_event, session) => {
                if (session) {
                    currentUser = session.user;
                    setAuthState(true);
                    renderDetail();
                } else {
                    currentUser = null;
                    setAuthState(false);
                }
            });
        }

        init();
    </script>
</body>

</html>
