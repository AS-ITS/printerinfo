<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印表機使用量看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">🖨️ 今日印表機使用統計</h1>

        <div hx-get="data.json" hx-trigger="load" hx-swap="innerHTML"
            class="overflow-x-auto bg-white rounded-lg shadow">

            <template id="table-template">
                <table class="min-w-full leading-normal">
                    <thead>
                        <tr class="bg-blue-600 text-white">
                            <th class="px-5 py-3 border-b-2 text-left text-sm font-semibold uppercase">位置</th>
                            <th class="px-5 py-3 border-b-2 text-left text-sm font-semibold uppercase">型號</th>
                            <th class="px-5 py-3 border-b-2 text-left text-sm font-semibold uppercase">總用量</th>
                            <th class="px-5 py-3 border-b-2 text-left text-sm font-semibold uppercase">列印/影印</th>
                        </tr>
                    </thead>
                    <tbody id="data-body"></tbody>
                </table>
            </template>
        </div>
    </div>

    <script>
        // 簡單的處理腳本，將 JSON 渲染進表格
        document.body.addEventListener('htmx:afterRequest', function (evt) {
            if (evt.detail.pathInfo.requestPath === 'data.json') {
                const data = JSON.parse(evt.detail.xhr.responseText);
                const tbody = document.querySelector('#data-body');
                if (!tbody) {
                    // 如果是第一次載入，先放入 template
                    const container = evt.detail.target;
                    const temp = document.getElementById('table-template');
                    container.innerHTML = temp.innerHTML;
                }
                const targetBody = document.querySelector('#data-body');
                data.forEach(item => {
                    const row = `<tr>
                        <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">${item.location}</td>
                        <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">${item.model}</td>
                        <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm font-bold text-blue-600">${item.total}</td>
                        <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">${item.print} / ${item.copy}</td>
                    </tr>`;
                    targetBody.innerHTML += row;
                });
            }
        });
    </script>
</body>

</html>
