<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printer Operations Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 0% 0%, #1e1b4b, #020617);
            background-attachment: fixed;
            color: #f1f5f9;
        }

        .glass-bg {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .stat-tile {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .stat-tile:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .bar {
            fill: #6366f1;
            rx: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .bar:hover {
            fill: #818cf8;
            filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.6));
        }

        .text-accent-blue {
            color: #60a5fa;
        }

        .text-accent-green {
            color: #34d399;
        }

        .text-accent-amber {
            color: #fbbf24;
        }
    </style>
</head>

<body class="min-h-screen pb-24">

    <nav class="glass-bg sticky top-0 z-50 px-10 py-6 mb-12 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div
                class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z">
                    </path>
                </svg>
            </div>
            <h1 class="text-3xl font-black tracking-tighter">PRINTER<span class="text-indigo-400">HUB</span></h1>
        </div>
        <select id="year-selector" onchange="render()"
            class="bg-slate-900 text-white px-6 py-2 rounded-xl border border-white/20 text-lg font-bold outline-none cursor-pointer"></select>
    </nav>

    <main class="max-w-[1600px] mx-auto px-10">
        <div class="mb-16">
            <h2 class="text-6xl font-black tracking-tight mb-4 text-white">運作狀態儀表板</h2>
            <p class="text-xl text-slate-400 font-medium">即時監控各部門印表機使用量與消耗統計</p>
        </div>

        <div id="printer-grid" class="space-y-16">
        </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-8">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="glass-bg w-full max-w-5xl rounded-[3rem] relative p-12 animate-in fade-in zoom-in duration-300">
            <div class="flex justify-between items-center mb-10">
                <h3 id="modal-title" class="text-4xl font-black text-white"></h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-5xl">&times;</button>
            </div>
            <div class="max-h-[60vh] overflow-y-auto rounded-3xl border border-white/5">
                <table class="w-full text-center">
                    <thead class="bg-white/5 text-slate-500 uppercase text-xs font-black sticky top-0 backdrop-blur-md">
                        <tr>
                            <th class="py-6 pl-10 text-left">日期</th>
                            <th class="py-6 text-accent-blue">列印</th>
                            <th class="py-6 text-accent-green">影印</th>
                            <th class="py-6 text-accent-amber">傳真</th>
                            <th class="py-6 text-white pr-10">當日總計</th>
                        </tr>
                    </thead>
                    <tbody id="modal-body" class="text-2xl font-bold divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let fullData = [];

        async function init() {
            const res = await fetch('data.json');
            fullData = await res.json();

            const years = new Set();
            fullData.forEach(p => p.history.forEach(h => years.add(h.year)));
            const selector = document.getElementById('year-selector');
            Array.from(years).sort().reverse().forEach(y => {
                const opt = document.createElement('option');
                opt.value = y; opt.innerText = y + " 年度報告";
                selector.appendChild(opt);
            });
            render();
        }

        function render() {
            const year = document.getElementById('year-selector').value;
            const container = document.getElementById('printer-grid');
            container.innerHTML = "";

            fullData.forEach(p => {
                const yh = p.history.find(h => h.year === year);
                if (!yh) return;

                const card = document.createElement('div');
                card.className = "glass-bg rounded-[4rem] p-12 overflow-hidden";
                card.innerHTML = `
                    <div class="flex flex-col lg:flex-row gap-12">
                        <div class="lg:w-2/3">
                            <div class="mb-10">
                                <h3 class="text-4xl font-black text-white mb-2">${p.location}</h3>
                                <p class="text-xl text-indigo-300 font-mono opacity-60">${p.ip} · ${p.model}</p>
                            </div>
                            <div id="chart-${p.ip.replace(/[:\.]/g, '-')}" class="w-full h-[400px]"></div>
                        </div>

                        <div class="lg:w-1/3 flex flex-col gap-6 justify-center">
                            <div class="stat-tile p-10 rounded-[3rem] text-center">
                                <p class="text-sm font-black text-slate-500 uppercase tracking-widest mb-2">本日累計增量</p>
                                <p class="text-7xl font-black text-white">${p.today.total.toLocaleString()}</p>
                                <p class="text-indigo-400 font-bold mt-2">PAGES TOTAL</p>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-6">
                                <div class="stat-tile p-8 rounded-[2.5rem] text-center">
                                    <p class="text-xs font-black text-accent-blue uppercase mb-2">Print</p>
                                    <p class="text-3xl font-black text-white">${p.today.print}</p>
                                </div>
                                <div class="stat-tile p-8 rounded-[2.5rem] text-center">
                                    <p class="text-xs font-black text-accent-green uppercase mb-2">Copy</p>
                                    <p class="text-3xl font-black text-white">${p.today.copy}</p>
                                </div>
                                <div class="stat-tile p-8 rounded-[2.5rem] text-center col-span-2">
                                    <p class="text-xs font-black text-accent-amber uppercase mb-2">Fax / Incoming</p>
                                    <p class="text-3xl font-black text-white">${p.today.fax}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                drawChart(p, yh);
            });
        }

        function drawChart(printer, yearData) {
            const chartId = `#chart-${printer.ip.replace(/[:\.]/g, '-')}`;
            const container = d3.select(chartId);
            const width = container.node().getBoundingClientRect().width;
            const height = 400;
            const margin = { top: 20, right: 30, bottom: 60, left: 60 };

            const svg = container.append("svg").attr("width", width).attr("height", height)
                .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

            const x = d3.scaleBand().range([0, width - margin.left - margin.right]).padding(0.4)
                .domain(yearData.months.map(m => m.month + "月"));

            const y = d3.scaleLinear().range([height - margin.top - margin.bottom, 0])
                .domain([0, d3.max(yearData.months, m => m.month_metrics.total) * 1.2 || 10]);

            // 定義漸層
            const defs = svg.append("defs");
            const grad = defs.append("linearGradient").attr("id", "barGrad").attr("x1", "0%").attr("y1", "0%").attr("x2", "0%").attr("y2", "100%");
            grad.append("stop").attr("offset", "0%").attr("stop-color", "#818cf8");
            grad.append("stop").attr("offset", "100%").attr("stop-color", "#4f46e5");

            svg.append("g").attr("transform", `translate(0,${height - margin.top - margin.bottom})`)
                .call(d3.axisBottom(x)).selectAll("text").style("fill", "#94a3b8").style("font-size", "14px").style("font-weight", "600");

            svg.append("g").call(d3.axisLeft(y).ticks(5).tickSize(-width + margin.left + margin.right))
                .call(g => g.select(".domain").remove())
                .call(g => g.selectAll(".tick line").attr("stroke", "rgba(255,255,255,0.05)"))
                .selectAll("text").style("fill", "#94a3b8").style("font-size", "12px");

            svg.selectAll(".bar").data(yearData.months).enter().append("rect")
                .attr("class", "bar")
                .attr("fill", "url(#barGrad)")
                .attr("x", d => x(d.month + "月"))
                .attr("y", d => y(d.month_metrics.total))
                .attr("width", x.bandwidth())
                .attr("height", d => (height - margin.top - margin.bottom) - y(d.month_metrics.total))
                .on("click", (e, d) => showDailyDetails(printer.location, d));
        }

        function showDailyDetails(location, monthData) {
            document.getElementById('modal-title').innerText = `${location} · ${monthData.month}月每日明細`;
            const tbody = document.getElementById('modal-body');
            tbody.innerHTML = monthData.daily_logs.map(log => `
                <tr class="hover:bg-white/5 transition-colors">
                    <td class="py-8 pl-10 text-left text-slate-400 font-mono text-xl">${log.date}</td>
                    <td class="py-8 text-accent-blue">${log.metrics.print.toLocaleString()}</td>
                    <td class="py-8 text-accent-green">${log.metrics.copy.toLocaleString()}</td>
                    <td class="py-8 text-accent-amber">${log.metrics.fax.toLocaleString()}</td>
                    <td class="py-8 text-white pr-10 text-3xl font-black">${log.metrics.total.toLocaleString()}</td>
                </tr>
            `).join('');
            document.getElementById('modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        window.onload = init;
    </script>
</body>

</html>
