<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印表機使用量統計儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .bar-print {
            fill: #3b82f6;
        }

        .bar-copy {
            fill: #10b981;
        }

        .bar-fax {
            fill: #f59e0b;
        }

        .axis-label {
            font-size: 12px;
        }
    </style>
</head>

<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">印表機使用量統計</h1>

        <div class="flex gap-4 mb-8">
            <button onclick="updateDashboard('daily')"
                class="bg-blue-600 text-white px-6 py-2 rounded shadow hover:bg-blue-700 transition">本日增量</button>
            <button onclick="updateDashboard('monthly')"
                class="bg-green-600 text-white px-6 py-2 rounded shadow hover:bg-green-700 transition">本月累計</button>
            <button onclick="updateDashboard('yearly')"
                class="bg-purple-600 text-white px-6 py-2 rounded shadow hover:bg-purple-700 transition">今年累計</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h2 id="chart-title" class="text-xl font-semibold mb-4 text-gray-700">數據視覺化 (Top 10)</h2>
            <div id="chart" class="w-full overflow-hidden"></div>
        </div>

        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <table class="min-w-full leading-normal">
                <thead>
                    <tr class="bg-gray-800 text-white">
                        <th class="px-5 py-3 border-b-2 text-left text-xs font-semibold uppercase">放置地點</th>
                        <th class="px-5 py-3 border-b-2 text-left text-xs font-semibold uppercase">型號</th>
                        <th class="px-5 py-3 border-b-2 text-center text-xs font-semibold uppercase">列印</th>
                        <th class="px-5 py-3 border-b-2 text-center text-xs font-semibold uppercase">影印</th>
                        <th class="px-5 py-3 border-b-2 text-center text-xs font-semibold uppercase">傳真</th>
                        <th class="px-5 py-3 border-b-2 text-center text-xs font-semibold uppercase">總量</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="text-gray-700">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let fullData = [];

        async function init() {
            // 讀取 Github Action 產生的 JSON
            const response = await fetch('data.json');
            fullData = await response.json();
            updateDashboard('daily');
        }

        function updateDashboard(period) {
            const chartTitle = { 'daily': '本日增量統計', 'monthly': '本月累積統計', 'yearly': '本年累積統計' };
            document.getElementById('chart-title').innerText = chartTitle[period];

            renderTable(period);
            renderChart(period);
        }

        function renderTable(period) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = fullData.map(d => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-5 py-4 border-b border-gray-200 text-sm font-medium">${d.location}</td>
                    <td class="px-5 py-4 border-b border-gray-200 text-sm text-gray-500">${d.model}</td>
                    <td class="px-5 py-4 border-b border-gray-200 text-sm text-center text-blue-600">${d[period].print}</td>
                    <td class="px-5 py-4 border-b border-gray-200 text-sm text-center text-green-600">${d[period].copy}</td>
                    <td class="px-5 py-4 border-b border-gray-200 text-sm text-center text-orange-600">${d[period].fax}</td>
                    <td class="px-5 py-4 border-b border-gray-200 text-sm text-center font-bold">${d[period].total}</td>
                </tr>
            `).join('');
        }

        function renderChart(period) {
            const container = d3.select("#chart");
            container.selectAll("*").remove();

            const margin = { top: 20, right: 30, bottom: 60, left: 60 };
            const width = container.node().getBoundingClientRect().width - margin.left - margin.right;
            const height = 400 - margin.top - margin.bottom;

            const svg = container.append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            // 只取前 10 名
            const data = [...fullData].sort((a, b) => b[period].total - a[period].total).slice(0, 10);

            const x = d3.scaleBand().domain(data.map(d => d.location)).range([0, width]).padding(0.2);
            const y = d3.scaleLinear().domain([0, d3.max(data, d => d[period].total) * 1.1 || 10]).range([height, 0]);

            svg.append("g").attr("transform", `translate(0,${height})`)
                .call(d3.axisBottom(x))
                .selectAll("text")
                .attr("transform", "rotate(-20)")
                .style("text-anchor", "end");

            svg.append("g").call(d3.axisLeft(y));

            // 繪製堆疊條形圖或群組條形圖 (這裡簡化為總量顯示)
            svg.selectAll(".bar")
                .data(data)
                .enter().append("rect")
                .attr("class", "bar-print")
                .attr("x", d => x(d.location))
                .attr("y", d => y(d[period].total))
                .attr("width", x.bandwidth())
                .attr("height", d => height - y(d[period].total))
                .attr("rx", 4);
        }

        window.onload = init;
    </script>
</body>

</html>
