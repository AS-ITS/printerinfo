<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printer Analytics | Glass Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
        }

        /* Glassmorphism Utility */
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .modal-glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .tab-active {
            background: rgba(255, 255, 255, 0.3) !important;
            border-bottom: 2px solid white;
            color: white !important;
        }

        /* 隱藏滾動條但保留功能 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
    </style>
</head>

<body class="min-h-screen text-white/90 pb-12">

    <nav class="glass-panel sticky top-0 z-40 px-6 py-4 mb-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-white/20 rounded-xl">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
                <h1 class="text-xl font-extrabold tracking-tight">PRINTER<span class="text-indigo-300">CORE</span></h1>
            </div>
            <div id="last-update" class="text-xs font-medium text-white/60 tracking-widest uppercase">Syncing...</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6">

        <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-8">
            <div>
                <p class="text-indigo-200 font-bold text-sm uppercase tracking-widest mb-1">Status Overview</p>
                <h2 class="text-4xl font-extrabold">監控儀表板</h2>
            </div>

            <div class="flex gap-2 p-1.5 glass-panel rounded-2xl">
                <button onclick="updateView('daily', this)"
                    class="period-btn px-6 py-2.5 rounded-xl text-sm font-bold text-white/70 hover:text-white transition-all tab-active">Daily</button>
                <button onclick="updateView('monthly', this)"
                    class="period-btn px-6 py-2.5 rounded-xl text-sm font-bold text-white/70 hover:text-white transition-all">Monthly</button>
                <button onclick="updateView('yearly', this)"
                    class="period-btn px-6 py-2.5 rounded-xl text-sm font-bold text-white/70 hover:text-white transition-all">Yearly</button>
            </div>
        </div>

        <div class="glass-panel p-8 rounded-3xl mb-8">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-lg font-bold flex items-center gap-2">
                    <span class="w-1.5 h-5 bg-white rounded-full"></span>
                    使用量 TOP 10 排名
                </h3>
            </div>
            <div id="main-chart" class="w-full h-80"></div>
        </div>

        <div class="glass-panel rounded-3xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-white/10 text-white/60 text-xs font-black uppercase tracking-widest">
                            <th class="px-8 py-5">放置地點 / IP</th>
                            <th class="px-6 py-5">設備型號</th>
                            <th class="px-6 py-5 text-center">列印</th>
                            <th class="px-6 py-5 text-center">影印</th>
                            <th class="px-6 py-5 text-center text-indigo-300">總增量</th>
                            <th class="px-8 py-5 text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody id="printer-table-body" class="divide-y divide-white/5">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="detail-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div
            class="modal-glass w-full max-w-2xl rounded-3xl shadow-2xl relative animate-in fade-in zoom-in duration-300">
            <div class="p-8">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h3 class="text-3xl font-black text-white mb-2" id="modal-printer-name">裝置詳細資訊</h3>
                        <p id="m-ip" class="text-indigo-200 font-mono text-sm tracking-widest uppercase"></p>
                    </div>
                    <button onclick="closeModal()" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="glass-card p-5 rounded-2xl">
                        <p class="text-[10px] font-black text-white/40 uppercase mb-1">Model</p>
                        <p id="m-model" class="font-bold"></p>
                    </div>
                    <div class="glass-card p-5 rounded-2xl">
                        <p class="text-[10px] font-black text-white/40 uppercase mb-1">Absolute Total</p>
                        <p id="m-raw-total" class="font-bold text-indigo-300"></p>
                    </div>
                </div>

                <div class="glass-card rounded-2xl overflow-hidden">
                    <table class="w-full text-center">
                        <thead class="bg-white/5 text-[10px] font-black uppercase text-white/40">
                            <tr>
                                <th class="py-4 border-b border-white/5">週期</th>
                                <th class="py-4 border-b border-white/5">列印</th>
                                <th class="py-4 border-b border-white/5">影印</th>
                                <th class="py-4 border-b border-white/5">傳真</th>
                                <th class="py-4 border-b border-white/5 text-white">總量</th>
                            </tr>
                        </thead>
                        <tbody id="modal-stats-body" class="text-sm font-semibold"></tbody>
                    </table>
                </div>

                <div class="mt-8">
                    <button onclick="closeModal()"
                        class="w-full py-4 bg-white text-indigo-900 rounded-2xl font-black hover:bg-indigo-50 transition-colors shadow-xl">CLOSE
                        PANEL</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let printerData = [];
        let currentPeriod = 'daily';

        async function init() {
            try {
                const response = await fetch('data.json');
                printerData = await response.json();
                document.getElementById('last-update').innerText = `Sync: ${new Date().toLocaleTimeString()}`;
                render(currentPeriod);
            } catch (e) {
                console.error('Data load failed', e);
            }
        }

        function updateView(period, el) {
            currentPeriod = period;
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('tab-active'));
            el.classList.add('tab-active');
            render(period);
        }

        function render(period) {
            renderChart(period);
            renderTable(period);
        }

        function renderChart(period) {
            const container = d3.select("#main-chart");
            const width = container.node().getBoundingClientRect().width;
            const height = 320;
            container.selectAll("*").remove();

            const svg = container.append("svg").attr("width", width).attr("height", height)
                .append("g").attr("transform", "translate(40, 20)");

            const sortedData = [...printerData].sort((a, b) => b[period].total - a[period].total).slice(0, 10);

            const x = d3.scaleBand().range([0, width - 60]).domain(sortedData.map(d => d.location)).padding(0.4);
            const y = d3.scaleLinear().range([height - 80, 0]).domain([0, d3.max(sortedData, d => d[period].total) * 1.1 || 10]);

            // 座標軸樣式自訂
            const xAxis = svg.append("g").attr("transform", `translate(0, ${height - 80})`).call(d3.axisBottom(x));
            xAxis.selectAll("text").attr("transform", "rotate(-20)").style("text-anchor", "end").style("fill", "rgba(255,255,255,0.6)").style("font-size", "11px");
            xAxis.select(".domain").attr("stroke", "rgba(255,255,255,0.2)");

            svg.selectAll(".bar")
                .data(sortedData).enter().append("rect")
                .attr("x", d => x(d.location))
                .attr("y", d => y(d[period].total))
                .attr("width", x.bandwidth())
                .attr("height", d => (height - 80) - y(d[period].total))
                .attr("fill", "rgba(255,255,255,0.8)")
                .attr("rx", 6);
        }

        function renderTable(period) {
            const tbody = document.getElementById('printer-table-body');
            tbody.innerHTML = printerData.map(d => `
                <tr class="hover:bg-white/5 transition-colors group">
                    <td class="px-8 py-5">
                        <div class="font-bold text-white">${d.location}</div>
                        <div class="text-[10px] text-white/40 font-mono uppercase tracking-tighter">${d.ip}</div>
                    </td>
                    <td class="px-6 py-5 text-sm font-medium text-white/70">${d.model}</td>
                    <td class="px-6 py-5 text-center text-sm font-bold">${d[period].print.toLocaleString()}</td>
                    <td class="px-6 py-5 text-center text-sm font-bold">${d[period].copy.toLocaleString()}</td>
                    <td class="px-6 py-5 text-center text-sm font-black text-indigo-300">${d[period].total.toLocaleString()}</td>
                    <td class="px-8 py-5 text-right">
                        <button onclick="showPrinterDetail('${d.ip}')" class="px-4 py-2 bg-white/10 hover:bg-white text-white hover:text-indigo-900 text-xs font-black rounded-xl transition-all uppercase tracking-widest">Detail</button>
                    </td>
                </tr>
            `).join('');
        }

        function showPrinterDetail(ip) {
            const p = printerData.find(d => d.ip === ip);
            if (!p) return;

            document.getElementById('modal-printer-name').innerText = p.location;
            document.getElementById('m-ip').innerText = p.ip;
            document.getElementById('m-model').innerText = p.model;
            document.getElementById('m-raw-total').innerText = p.raw_total.toLocaleString();

            const rows = [
                { l: 'Daily', k: 'daily' },
                { l: 'Monthly', k: 'monthly' },
                { l: 'Yearly', k: 'yearly' }
            ];

            document.getElementById('modal-stats-body').innerHTML = rows.map(r => `
                <tr class="border-b border-white/5">
                    <td class="py-5 text-white/60 font-black uppercase text-[10px]">${r.l}</td>
                    <td class="py-5">${p[r.k].print}</td>
                    <td class="py-5">${p[r.k].copy}</td>
                    <td class="py-5">${p[r.k].fax}</td>
                    <td class="py-5 text-indigo-300 font-black">${p[r.k].total}</td>
                </tr>
            `).join('');

            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.add('hidden');
        }

        window.onload = init;
        window.onresize = () => renderChart(currentPeriod);
    </script>
</body>

</html>
