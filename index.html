<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印表機使用量看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen">
    <div class="max-w-md mx-auto md:max-w-2xl lg:max-w-4xl p-4">
        <header class="py-6 text-center">
            <h1 class="text-3xl font-extrabold text-slate-800">🖨️ 印表機用量排行</h1>
            <p id="update-time" class="text-slate-500 text-sm mt-2"></p>
        </header>

        <div class="flex bg-white rounded-xl shadow-sm p-1 mb-6 border">
            <button onclick="switchTab('daily')" id="tab-daily"
                class="flex-1 py-2 rounded-lg font-bold transition-all text-blue-600 bg-blue-50">本日</button>
            <button onclick="switchTab('monthly')" id="tab-monthly"
                class="flex-1 py-2 rounded-lg font-bold transition-all text-slate-500">本月</button>
            <button onclick="switchTab('yearly')" id="tab-yearly"
                class="flex-1 py-2 rounded-lg font-bold transition-all text-slate-500">本年</button>
        </div>

        <div class="mb-4 text-center">
            <span class="text-xs font-medium text-slate-400 bg-white px-3 py-1 rounded-full shadow-sm border">
                比較基準日期：<span id="base-date">---</span>
            </span>
        </div>

        <div id="list-container" class="space-y-3">
            <div class="text-center py-20 text-slate-400">正在載入數據...</div>
        </div>
    </div>

    <script>
        let rawData = null;

        async function init() {
            try {
                const response = await fetch('./data.json?v=' + Date.now());
                rawData = await response.json();
                document.getElementById('update-time').innerText = `最後更新日期：${rawData.meta.latest.replace('.csv', '')}`;
                switchTab('daily');
            } catch (e) {
                document.getElementById('list-container').innerHTML = `<div class="text-red-500 text-center">載入失敗，請確認 data.json 是否存在</div>`;
            }
        }

        function switchTab(type) {
            // 切換按鈕樣式
            ['daily', 'monthly', 'yearly'].forEach(t => {
                const btn = document.getElementById('tab-' + t);
                btn.className = "flex-1 py-2 rounded-lg font-bold transition-all " +
                    (t === type ? "text-blue-600 bg-blue-50" : "text-slate-500 hover:bg-slate-50");
            });

            document.getElementById('base-date').innerText = rawData.meta[type].replace('.csv', '');
            renderList(rawData[type]);
        }

        function renderList(items) {
            const container = document.getElementById('list-container');
            if (!items || items.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400">目前尚無變動數據</div>`;
                return;
            }

            container.innerHTML = items.map((item, index) => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 ${index < 3 ? 'border-amber-400' : 'border-blue-500'} flex items-center">
                    <div class="w-10 text-xl font-black text-slate-300">#${index + 1}</div>
                    <div class="flex-1 min-w-0 px-2">
                        <div class="font-bold text-slate-800 truncate">${item.location}</div>
                        <div class="text-xs text-slate-400 truncate">${item.model} (${item.ip})</div>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-black text-blue-600">${item.total.toLocaleString()}</div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">張數</div>
                    </div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>

</html>
