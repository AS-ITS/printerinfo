<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printer Dashboard | Glass Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            background-attachment: fixed;
            color: #f8fafc;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .tab-active {
            background: rgba(99, 102, 241, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff !important;
        }

        .text-huge {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .text-label {
            font-size: 0.875rem;
            font-weight: 800;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body class="min-h-screen pb-20">

    <nav class="glass sticky top-0 z-50 px-10 py-6 mb-12 border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black italic tracking-tighter">PRINTER<span class="text-indigo-400">CORE</span>
            </h1>
            <div id="update-info"
                class="text-sm font-bold bg-indigo-500/10 px-4 py-2 rounded-xl text-indigo-300 border border-indigo-500/20">
                Syncing...</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6">
        <div class="flex flex-col md:flex-row justify-between items-end gap-8 mb-12">
            <div>
                <p class="text-emerald-400 font-bold text-lg uppercase tracking-widest mb-2">System Analytics</p>
                <h2 class="text-6xl font-black">數據監控</h2>
            </div>
            <div class="flex gap-3 p-2 glass rounded-3xl">
                <button onclick="changeView('daily', this)"
                    class="v-btn px-10 py-4 rounded-2xl text-lg font-bold text-slate-400 tab-active">本日增量</button>
                <button onclick="changeView('monthly', this)"
                    class="v-btn px-10 py-4 rounded-2xl text-lg font-bold text-slate-400">本月累積</button>
                <button onclick="changeView('yearly', this)"
                    class="v-btn px-10 py-4 rounded-2xl text-lg font-bold text-slate-400">年度統計</button>
            </div>
        </div>

        <div class="glass rounded-[3rem] overflow-hidden">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-white/5 text-slate-400 text-sm font-black uppercase tracking-widest">
                        <th class="px-10 py-8">放置地點</th>
                        <th class="px-8 py-8 text-center text-blue-400">列印</th>
                        <th class="px-8 py-8 text-center text-emerald-400">影印</th>
                        <th class="px-8 py-8 text-center text-amber-400">傳真</th>
                        <th class="px-10 py-8 text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="main-table" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="glass w-full max-w-4xl rounded-[3.5rem] relative p-12 animate-in fade-in zoom-in duration-300">
            <div class="flex justify-between items-start mb-10">
                <div>
                    <h3 id="m-name" class="text-5xl font-black text-white mb-2"></h3>
                    <p id="m-ip" class="text-indigo-400 font-mono text-xl"></p>
                </div>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white text-5xl">&times;</button>
            </div>

            <div class="grid grid-cols-2 gap-8 mb-10">
                <div class="bg-white/5 p-8 rounded-3xl border border-white/10">
                    <p class="text-label text-indigo-300/60 mb-2">DEVICE MODEL</p>
                    <p id="m-model" class="text-2xl font-bold"></p>
                </div>
                <div class="bg-white/5 p-8 rounded-3xl border border-white/10 text-emerald-400">
                    <p class="text-label text-emerald-400/60 mb-2">TOTAL COUNTER</p>
                    <p id="m-raw" class="text-3xl font-black"></p>
                </div>
            </div>

            <div class="bg-black/20 rounded-[2rem] overflow-hidden border border-white/10">
                <table class="w-full text-center">
                    <thead class="bg-white/5 text-xs font-black text-slate-500 uppercase">
                        <tr>
                            <th class="py-6 border-b border-white/5">維度</th>
                            <th class="py-6 border-b border-white/5 text-blue-400">列印</th>
                            <th class="py-6 border-b border-white/5 text-emerald-400">影印</th>
                            <th class="py-6 border-b border-white/5 text-amber-400">傳真</th>
                            <th class="py-6 border-b border-white/5 text-white">總量</th>
                        </tr>
                    </thead>
                    <tbody id="m-rows" class="text-lg font-bold"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let data = [];
        let view = 'daily';

        async function init() {
            const res = await fetch('data.json');
            data = await res.json();
            document.getElementById('update-info').innerText = `Sync: ${new Date().toLocaleTimeString()}`;
            render();
        }

        function changeView(v, el) {
            view = v;
            document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('tab-active'));
            el.classList.add('tab-active');
            render();
        }

        function render() {
            const tbody = document.getElementById('main-table');
            tbody.innerHTML = data.map(d => `
                <tr class="hover:bg-white/5 transition-all">
                    <td class="px-10 py-8">
                        <div class="text-2xl font-black text-white">${d.location}</div>
                        <div class="text-sm text-indigo-300/50 font-mono mt-1">${d.ip}</div>
                    </td>
                    <td class="px-8 py-8 text-center text-huge text-blue-400">${d[view].print.toLocaleString()}</td>
                    <td class="px-8 py-8 text-center text-huge text-emerald-400">${d[view].copy.toLocaleString()}</td>
                    <td class="px-8 py-8 text-center text-huge text-amber-400">${d[view].fax.toLocaleString()}</td>
                    <td class="px-10 py-8 text-right">
                        <button onclick="showDetail('${d.ip}')" class="px-6 py-2 bg-white/10 hover:bg-white hover:text-indigo-900 rounded-xl font-black text-sm uppercase transition-all">Detail</button>
                    </td>
                </tr>
            `).join('');
        }

        function showDetail(ip) {
            const p = data.find(x => x.ip === ip);
            document.getElementById('m-name').innerText = p.location;
            document.getElementById('m-ip').innerText = p.ip;
            document.getElementById('m-model').innerText = p.model;
            document.getElementById('m-raw').innerText = p.raw_total.toLocaleString();

            const rows = [
                { l: 'Daily Change', k: 'daily', c: 'text-blue-400' },
                { l: 'Monthly Accum.', k: 'monthly', c: 'text-emerald-400' },
                { l: 'Yearly Accum.', k: 'yearly', c: 'text-amber-400' }
            ];

            document.getElementById('m-rows').innerHTML = rows.map(r => `
                <tr class="border-b border-white/5">
                    <td class="py-6 text-slate-500 uppercase text-xs pl-8 text-left italic">${r.l}</td>
                    <td class="py-6 text-blue-400">${p[r.k].print}</td>
                    <td class="py-6 text-emerald-400">${p[r.k].copy}</td>
                    <td class="py-6 text-amber-400">${p[r.k].fax}</td>
                    <td class="py-6 text-2xl font-black ${r.c}">${p[r.k].total}</td>
                </tr>
            `).join('');
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        window.onload = init;
    </script>
</body>

</html>
