<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印表機監控系統 - 數據儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }

        .tab-btn.active {
            background-color: #1e40af;
            ring: 2px;
            ring-offset: 2px;
            ring-color: #3b82f6;
            transform: scale(1.05);
        }

        .bar-main {
            fill: url(#barGradient);
            rx: 6;
        }

        .chart-container {
            transition: all 0.3s ease;
        }

        /* 滾動條美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body class="p-6 md:p-12">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">印表機使用量監控</h1>
                <p class="text-slate-500 mt-1">即時數據可視化與資源分配管理</p>
            </div>

            <div class="flex bg-white p-1.5 rounded-xl shadow-sm border border-slate-200">
                <button onclick="updateDashboard('daily', this)"
                    class="tab-btn active px-5 py-2 rounded-lg text-sm font-semibold text-white transition-all duration-200 bg-blue-600">本日</button>
                <button onclick="updateDashboard('monthly', this)"
                    class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-all duration-200">本月</button>
                <button onclick="updateDashboard('yearly', this)"
                    class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-all duration-200">今年</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm font-medium text-slate-500">當前統計總量</p>
                <h3 id="stat-total" class="text-3xl font-bold text-slate-800 mt-2">--</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm font-medium text-slate-500">最活躍地點</p>
                <h3 id="stat-top-loc" class="text-xl font-bold text-blue-600 mt-2">--</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm font-medium text-slate-500">系統狀態</p>
                <h3 class="text-xl font-bold text-green-500 mt-2">● 正常運行</h3>
            </div>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 mb-8 chart-container">
            <div class="flex items-center justify-between mb-6">
                <h2 id="chart-title" class="text-lg font-bold text-slate-700 uppercase tracking-wide">數據視覺化 (Top 10)
                </h2>
                <span class="text-xs font-medium px-2 py-1 bg-blue-50 text-blue-600 rounded">Auto-refresh: On</span>
            </div>
            <div id="chart" class="w-full h-[400px]"></div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b border-slate-50">
                <h3 class="font-bold text-slate-700">詳細清單</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full">
                    <thead>
                        <tr class="bg-slate-50">
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">
                                放置地點</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">型號
                            </th>
                            <th class="px-6 py-4 text-center text-xs font-bold text-blue-500 uppercase tracking-wider">
                                列印</th>
                            <th class="px-6 py-4 text-center text-xs font-bold text-green-500 uppercase tracking-wider">
                                影印</th>
                            <th
                                class="px-6 py-4 text-center text-xs font-bold text-orange-500 uppercase tracking-wider">
                                傳真</th>
                            <th class="px-6 py-4 text-center text-xs font-bold text-slate-700 uppercase tracking-wider">
                                總累計</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let fullData = [];

        async function init() {
            try {
                const response = await fetch('data.json');
                fullData = await response.json();
                updateDashboard('daily', document.querySelector('.tab-btn'));
            } catch (e) {
                console.error("數據加載失敗", e);
                // 測試用途：若無 data.json 可模擬數據
            }
        }

        function updateDashboard(period, btnElement) {
            // Update Active Tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-blue-600', 'text-white');
                btn.classList.add('text-slate-600');
            });
            btnElement.classList.add('active', 'bg-blue-600', 'text-white');

            const titles = { 'daily': '本日增量統計', 'monthly': '本月累積統計', 'yearly': '本年累積統計' };
            document.getElementById('chart-title').innerText = titles[period];

            renderStats(period);
            renderTable(period);
            renderChart(period);
        }

        function renderStats(period) {
            const total = fullData.reduce((sum, d) => sum + d[period].total, 0);
            const top = [...fullData].sort((a, b) => b[period].total - a[period].total)[0];

            document.getElementById('stat-total').innerText = total.toLocaleString();
            document.getElementById('stat-top-loc').innerText = top ? top.location : '--';
        }

        function renderTable(period) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = fullData.map(d => `
                <tr class="hover:bg-blue-50/50 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-slate-700">${d.location}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">${d.model}</td>
                    <td class="px-6 py-4 text-center text-sm font-medium text-blue-600">${d[period].print.toLocaleString()}</td>
                    <td class="px-6 py-4 text-center text-sm font-medium text-green-600">${d[period].copy.toLocaleString()}</td>
                    <td class="px-6 py-4 text-center text-sm font-medium text-orange-600">${d[period].fax.toLocaleString()}</td>
                    <td class="px-6 py-4 text-center font-bold text-slate-800">${d[period].total.toLocaleString()}</td>
                </tr>
            `).join('');
        }

        function renderChart(period) {
            const container = d3.select("#chart");
            container.selectAll("*").remove();

            const rect = container.node().getBoundingClientRect();
            const margin = { top: 20, right: 20, bottom: 60, left: 50 };
            const width = rect.width - margin.left - margin.right;
            const height = 400 - margin.top - margin.bottom;

            const svg = container.append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            // 漸層設定
            const defs = svg.append("defs");
            const gradient = defs.append("linearGradient")
                .attr("id", "barGradient")
                .attr("x1", "0%").attr("y1", "0%").attr("x2", "0%").attr("y2", "100%");
            gradient.append("stop").attr("offset", "0%").attr("stop-color", "#3b82f6");
            gradient.append("stop").attr("offset", "100%").attr("stop-color", "#1e40af");

            const data = [...fullData].sort((a, b) => b[period].total - a[period].total).slice(0, 10);

            const x = d3.scaleBand().domain(data.map(d => d.location)).range([0, width]).padding(0.3);
            const y = d3.scaleLinear().domain([0, d3.max(data, d => d[period].total) * 1.1 || 10]).range([height, 0]);

            // Axes
            svg.append("g").attr("transform", `translate(0,${height})`)
                .call(d3.axisBottom(x))
                .selectAll("text")
                .attr("transform", "rotate(-15)")
                .style("text-anchor", "end")
                .style("font-size", "12px")
                .style("color", "#64748b");

            svg.append("g").call(d3.axisLeft(y).ticks(5).tickSize(-width).tickFormat(d3.format(".0f")))
                .call(g => g.select(".domain").remove())
                .call(g => g.selectAll(".tick line").attr("stroke", "#f1f5f9"))
                .selectAll("text").style("color", "#64748b");

            // Bars with Animation
            svg.selectAll(".bar")
                .data(data)
                .enter().append("rect")
                .attr("class", "bar-main")
                .attr("x", d => x(d.location))
                .attr("y", height)
                .attr("width", x.bandwidth())
                .attr("height", 0)
                .transition()
                .duration(800)
                .attr("y", d => y(d[period].total))
                .attr("height", d => height - y(d[period].total));
        }

        window.onload = init;
        window.onresize = () => renderChart(document.querySelector('.tab-btn.active').getAttribute('onclick').match(/'([^']+)'/)[1]);
    </script>
</body>

</html>
