<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printer Dashboard | Advanced Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #0f172a, #1e1b4b);
            background-attachment: fixed;
            color: #f8fafc;
        }

        .glass {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .bar:hover {
            fill: #818cf8;
            cursor: pointer;
            transition: 0.2s;
        }

        .text-blue {
            color: #60a5fa;
        }

        .text-green {
            color: #34d399;
        }

        .text-amber {
            color: #fbbf24;
        }
    </style>
</head>

<body class="min-h-screen pb-20">

    <nav class="glass sticky top-0 z-50 px-10 py-6 mb-12 flex justify-between items-center">
        <h1 class="text-3xl font-black tracking-tighter italic">PRINTER<span class="text-indigo-400">CORE</span></h1>
        <select id="year-selector" onchange="render()"
            class="bg-slate-900 text-white px-6 py-2 rounded-xl border border-white/20 text-lg font-bold outline-none"></select>
    </nav>

    <main class="max-w-7xl mx-auto px-8">
        <div id="dashboard-content" class="space-y-20">
        </div>
    </main>

    <div id="detail-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="glass w-full max-w-4xl rounded-[3rem] relative p-12 animate-in fade-in zoom-in duration-300">
            <div class="flex justify-between items-center mb-8">
                <h3 id="modal-title" class="text-4xl font-black"></h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-4xl">&times;</button>
            </div>
            <div class="max-h-[500px] overflow-y-auto pr-4">
                <table class="w-full text-center">
                    <thead class="bg-white/5 text-slate-500 uppercase text-sm font-black sticky top-0 backdrop-blur-md">
                        <tr>
                            <th class="py-4">日期</th>
                            <th class="py-4 text-blue">列印</th>
                            <th class="py-4 text-green">影印</th>
                            <th class="py-4 text-amber">傳真</th>
                            <th class="py-4">總計</th>
                        </tr>
                    </thead>
                    <tbody id="modal-body" class="text-xl font-bold divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let printerData = [];

        async function init() {
            const res = await fetch('data.json');
            printerData = await res.json();

            const years = new Set();
            printerData.forEach(p => p.history.forEach(h => years.add(h.year)));
            const selector = document.getElementById('year-selector');
            Array.from(years).sort().reverse().forEach(y => {
                const opt = document.createElement('option');
                opt.value = y; opt.innerText = y + " 年度";
                selector.appendChild(opt);
            });
            render();
        }

        function render() {
            const year = document.getElementById('year-selector').value;
            const container = document.getElementById('dashboard-content');
            container.innerHTML = "";

            printerData.forEach(p => {
                const yh = p.history.find(h => h.year === year);
                if (!yh) return;

                const section = document.createElement('div');
                section.className = "glass rounded-[3.5rem] p-12";
                section.innerHTML = `
                    <div class="mb-10">
                        <h2 class="text-4xl font-black mb-2">${p.location}</h2>
                        <p class="text-xl text-indigo-300 font-mono">${p.ip} · ${p.model}</p>
                    </div>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                        <div class="lg:col-span-2">
                            <h4 class="text-sm font-black uppercase tracking-widest text-slate-500 mb-6">每月列印量統計 (點擊長條查看每日明細)</h4>
                            <div id="chart-${p.ip.replace(/\./g, '-')}" class="w-full h-64"></div>
                        </div>
                        
                        <div>
                            <h4 class="text-sm font-black uppercase tracking-widest text-slate-500 mb-6">今日列印量 (${new Date().toLocaleDateString()})</h4>
                            <div class="bg-black/20 rounded-3xl p-8 border border-white/5">
                                <div class="space-y-6">
                                    <div class="flex justify-between items-center"><span class="text-xl text-blue font-bold">列印</span><span class="text-3xl font-black">${p.today.print}</span></div>
                                    <div class="flex justify-between items-center"><span class="text-xl text-green font-bold">影印</span><span class="text-3xl font-black">${p.today.copy}</span></div>
                                    <div class="flex justify-between items-center"><span class="text-xl text-amber font-bold">傳真</span><span class="text-3xl font-black">${p.today.fax}</span></div>
                                    <hr class="border-white/10">
                                    <div class="flex justify-between items-center"><span class="text-xl font-bold">總計增量</span><span class="text-4xl font-black text-white">${p.today.total}</span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(section);
                drawChart(p, yh);
            });
        }

        function drawChart(printer, yearData) {
            const chartId = `#chart-${printer.ip.replace(/\./g, '-')}`;
            const container = d3.select(chartId);
            const width = container.node().getBoundingClientRect().width;
            const height = 250;
            const margin = { top: 20, right: 20, bottom: 40, left: 40 };

            const svg = container.append("svg").attr("width", width).attr("height", height)
                .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

            const x = d3.scaleBand().range([0, width - margin.left - margin.right]).padding(0.3)
                .domain(yearData.months.map(m => m.month + "月"));

            const y = d3.scaleLinear().range([height - margin.top - margin.bottom, 0])
                .domain([0, d3.max(yearData.months, m => m.month_metrics.total) * 1.1 || 10]);

            svg.append("g").attr("transform", `translate(0,${height - margin.top - margin.bottom})`)
                .call(d3.axisBottom(x)).selectAll("text").style("fill", "#94a3b8").style("font-size", "14px");

            svg.selectAll(".bar").data(yearData.months).enter().append("rect")
                .attr("class", "bar fill-indigo-500/60")
                .attr("x", d => x(d.month + "月"))
                .attr("y", d => y(d.month_metrics.total))
                .attr("width", x.bandwidth())
                .attr("height", d => (height - margin.top - margin.bottom) - y(d.month_metrics.total))
                .attr("rx", 6)
                .on("click", (e, d) => showDailyDetails(printer.location, d));
        }

        function showDailyDetails(location, monthData) {
            document.getElementById('modal-title').innerText = `${location} - ${monthData.month}月每日明細`;
            const tbody = document.getElementById('modal-body');
            tbody.innerHTML = monthData.daily_logs.map(log => `
                <tr>
                    <td class="py-6 text-slate-400">${log.date}</td>
                    <td class="py-6 text-blue">${log.metrics.print}</td>
                    <td class="py-6 text-green">${log.metrics.copy}</td>
                    <td class="py-6 text-amber">${log.metrics.fax}</td>
                    <td class="py-6 text-white">${log.metrics.total}</td>
                </tr>
            `).join('');
            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); }
        window.onload = init;
    </script>
</body>

</html>
