<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印表機維運監控系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .active-btn {
            background-color: #1e40af !important;
            border-bottom: 4px solid #93c5fd;
        }

        .bar-color {
            fill: #6366f1;
            transition: all 0.3s;
        }

        .bar-color:hover {
            fill: #4338ca;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen pb-12">
    <nav class="bg-slate-800 text-white p-4 mb-8 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">Printer Usage Dashboard</h1>
            <span class="text-slate-400 text-sm" id="update-time">資料更新於: Loading...</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4">
        <div class="flex flex-wrap items-end justify-between gap-4 mb-8">
            <div class="inline-flex rounded-md shadow-sm">
                <button onclick="changeView('daily', this)"
                    class="view-btn px-6 py-2 text-sm font-medium bg-white border border-gray-200 rounded-l-lg hover:bg-gray-100 active-btn text-white">本日增量</button>
                <button onclick="changeView('monthly', this)"
                    class="view-btn px-6 py-2 text-sm font-medium bg-white border-t border-b border-gray-200 hover:bg-gray-100 text-gray-900">本月累積</button>
                <button onclick="changeView('yearly', this)"
                    class="view-btn px-6 py-2 text-sm font-medium bg-white border border-gray-200 rounded-r-lg hover:bg-gray-100 text-gray-900">今年累積</button>
            </div>
            <div class="text-sm text-slate-500 bg-white p-2 rounded shadow-sm border">
                目前統計維度: <span id="current-label" class="font-bold text-indigo-600">本日增量</span>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
            <h2 class="text-lg font-semibold text-slate-700 mb-4">使用量排名 (Top 10)</h2>
            <div id="chart-container" class="w-full" style="height: 350px;"></div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200">
                        <th class="p-4 font-semibold text-slate-600">放置地點</th>
                        <th class="p-4 font-semibold text-slate-600">型號</th>
                        <th class="p-4 font-semibold text-slate-600 text-center">列印</th>
                        <th class="p-4 font-semibold text-slate-600 text-center">影印</th>
                        <th class="p-4 font-semibold text-slate-600 text-center">傳真</th>
                        <th class="p-4 font-semibold text-slate-600 text-center">總計</th>
                        <th class="p-4 font-semibold text-slate-600 text-center">操作</th>
                    </tr>
                </thead>
                <tbody id="data-table" class="divide-y divide-slate-100">
                </tbody>
            </table>
        </div>
    </main>

    <div id="detail-modal" class="modal">
        <div
            class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full mx-4 overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h3 id="modal-title" class="text-xl font-bold text-slate-800">印表機詳情</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            </div>
            <div class="p-8">
                <div class="grid grid-cols-2 gap-6 mb-8">
                    <div><label class="text-xs text-slate-400 uppercase font-bold tracking-wider">IP位址</label>
                        <p id="m-ip" class="text-lg font-mono text-slate-700"></p>
                    </div>
                    <div><label class="text-xs text-slate-400 uppercase font-bold tracking-wider">機器型號</label>
                        <p id="m-model" class="text-lg text-slate-700"></p>
                    </div>
                    <div class="col-span-2"><label
                            class="text-xs text-slate-400 uppercase font-bold tracking-wider">位置</label>
                        <p id="m-location" class="text-lg text-slate-700"></p>
                    </div>
                </div>
                <div class="border rounded-xl overflow-hidden">
                    <table class="w-full text-center">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="p-3 text-xs font-bold text-slate-500 border-b">時間維度</th>
                                <th class="p-3 text-xs font-bold text-blue-600 border-b">列印</th>
                                <th class="p-3 text-xs font-bold text-emerald-600 border-b">影印</th>
                                <th class="p-3 text-xs font-bold text-amber-600 border-b">傳真</th>
                                <th class="p-3 text-xs font-bold text-slate-800 border-b">總量</th>
                            </tr>
                        </thead>
                        <tbody id="m-stats-rows"></tbody>
                    </table>
                </div>
                <div class="mt-6 text-right">
                    <span class="text-sm text-slate-400 italic">機器目前累計讀數: <span id="m-raw-total"
                            class="font-bold"></span></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let printerData = [];
        let currentPeriod = 'daily';

        async function loadData() {
            try {
                const res = await fetch('data.json');
                printerData = await res.json();
                document.getElementById('update-time').innerText = `資料最後更新: ${new Date().toLocaleString()}`;
                render();
            } catch (e) {
                console.error("載入 JSON 失敗", e);
            }
        }

        function changeView(period, btn) {
            currentPeriod = period;
            document.querySelectorAll('.view-btn').forEach(b => {
                b.classList.remove('active-btn', 'text-white');
                b.classList.add('text-gray-900');
            });
            btn.classList.add('active-btn', 'text-white');
            btn.classList.remove('text-gray-900');
            document.getElementById('current-label').innerText = btn.innerText;
            render();
        }

        function render() {
            renderTable();
            renderChart();
        }

        function renderTable() {
            const tbody = document.getElementById('data-table');
            tbody.innerHTML = printerData.map(d => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-4 text-sm font-medium text-slate-700">${d.location}</td>
                    <td class="p-4 text-sm text-slate-500">${d.model}</td>
                    <td class="p-4 text-sm text-center text-blue-600">${d[currentPeriod].print}</td>
                    <td class="p-4 text-sm text-center text-emerald-600">${d[currentPeriod].copy}</td>
                    <td class="p-4 text-sm text-center text-amber-600">${d[currentPeriod].fax}</td>
                    <td class="p-4 text-sm text-center font-bold text-slate-800">${d[currentPeriod].total}</td>
                    <td class="p-4 text-sm text-center">
                        <button onclick="showDetail('${d.ip}')" class="text-indigo-600 hover:text-indigo-800 font-semibold underline decoration-2 underline-offset-4">詳情</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderChart() {
            const container = document.getElementById('chart-container');
            const width = container.offsetWidth;
            const height = 350;
            d3.select("#chart-container").selectAll("*").remove();

            const svg = d3.select("#chart-container").append("svg").attr("width", width).attr("height", height);
            const margin = { top: 20, right: 30, bottom: 60, left: 60 };
            const chartWidth = width - margin.left - margin.right;
            const chartHeight = height - margin.top - margin.bottom;

            const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

            // 取 Top 10
            const sorted = [...printerData].sort((a, b) => b[currentPeriod].total - a[currentPeriod].total).slice(0, 10);

            const x = d3.scaleBand().rangeRound([0, chartWidth]).padding(0.3).domain(sorted.map(d => d.location));
            const y = d3.scaleLinear().rangeRound([chartHeight, 0]).domain([0, d3.max(sorted, d => d[currentPeriod].total) * 1.1 || 10]);

            g.append("g").attr("transform", `translate(0,${chartHeight})`).call(d3.axisBottom(x))
                .selectAll("text").attr("transform", "rotate(-25)").style("text-anchor", "end").attr("dx", "-.8em").attr("dy", ".15em");

            g.append("g").call(d3.axisLeft(y).ticks(5));

            g.selectAll(".bar").data(sorted).enter().append("rect")
                .attr("class", "bar-color")
                .attr("x", d => x(d.location))
                .attr("y", d => y(d[currentPeriod].total))
                .attr("width", x.bandwidth())
                .attr("height", d => chartHeight - y(d[currentPeriod].total))
                .attr("rx", 4);
        }

        function showDetail(ip) {
            const d = printerData.find(p => p.ip === ip);
            if (!d) return;

            document.getElementById('m-ip').innerText = d.ip;
            document.getElementById('m-model').innerText = d.model;
            document.getElementById('m-location').innerText = d.location;
            document.getElementById('m-raw-total').innerText = d.raw_total.toLocaleString();

            const periods = [
                { k: 'daily', l: '本日增量' },
                { k: 'monthly', l: '本月累積' },
                { k: 'yearly', l: '今年累積' }
            ];

            document.getElementById('m-stats-rows').innerHTML = periods.map(p => `
                <tr class="border-b last:border-0 hover:bg-slate-50">
                    <td class="p-3 text-sm font-bold text-slate-500 text-left pl-6">${p.l}</td>
                    <td class="p-3 text-sm">${d[p.k].print}</td>
                    <td class="p-3 text-sm">${d[p.k].copy}</td>
                    <td class="p-3 text-sm">${d[p.k].fax}</td>
                    <td class="p-3 text-sm font-bold">${d[p.k].total}</td>
                </tr>
            `).join('');

            document.getElementById('detail-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('detail-modal').style.display = 'none';
        }

        window.onclick = (e) => { if (e.target.id === 'detail-modal') closeModal(); }
        window.onload = loadData;
        window.onresize = renderChart;
    </script>
</body>

</html>
