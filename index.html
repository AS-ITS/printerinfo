<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printer Operations Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 0% 0%, #0f172a, #1e1b4b);
            background-attachment: fixed;
            color: #f1f5f9;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-hover:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(99, 102, 241, 0.4);
        }
    </style>
</head>

<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-12 flex justify-between items-end">
            <div>
                <h1 class="text-5xl font-extrabold tracking-tighter mb-2">OPERATIONS<span
                        class="text-indigo-500">CENTER</span></h1>
                <p class="text-slate-400 font-medium">全院印表機監控系統 · 實時數據分析</p>
            </div>
            <div class="text-right text-slate-500 font-mono text-sm">
                SYSTEM STATUS: <span class="text-emerald-400">ACTIVE</span>
            </div>
        </header>

        <div id="printer-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </div>

    <script>
        async function init() {
            try {
                // 假設您的 Go 程式輸出的 JSON 放在此路徑
                const response = await fetch('public/data.json');
                const rawData = await response.json();

                const printers = transformData(rawData);
                renderPrinters(printers);
            } catch (e) {
                console.error("載入失敗:", e);
            }
        }

        function transformData(rawData) {
            const groups = {};
            rawData.forEach(row => {
                if (!groups[row.ip_address]) {
                    groups[row.ip_address] = {
                        ip: row.ip_address,
                        location: row.location,
                        model: row.model,
                        total_all_time: row.total_count,
                        daily_logs: []
                    };
                }

                // 核心邏輯：修正數據為 0 的問題
                let p = row.daily_print;
                let c = row.daily_copy;
                let f = row.daily_fax;

                // 如果分類數據都是 0，但總量 daily_total 有值，則將增量歸入列印
                if (p === 0 && c === 0 && f === 0 && row.daily_total > 0) {
                    p = row.daily_total;
                }

                groups[row.ip_address].daily_logs.push({
                    date: row.recorded_at,
                    metrics: {
                        print: p,
                        copy: c,
                        fax: f,
                        total: row.daily_total // 直接使用 SQL 算好的總增量
                    }
                });
            });
            return Object.values(groups);
        }

        function renderPrinters(printers) {
            const grid = document.getElementById('printer-grid');
            grid.innerHTML = printers.map(p => {
                const latest = p.daily_logs[0]?.metrics || { print: 0, copy: 0, fax: 0, total: 0 };
                return `
                    <div class="glass-panel p-8 rounded-[2rem] transition-all duration-500 card-hover">
                        <div class="flex justify-between items-start mb-8">
                            <div>
                                <h3 class="text-2xl font-black text-white">${p.location}</h3>
                                <p class="text-indigo-400 font-mono text-sm font-bold mt-1">${p.ip}</p>
                            </div>
                            <span class="bg-indigo-500/20 text-indigo-300 px-3 py-1 rounded-full text-xs font-bold">${p.model}</span>
                        </div>

                        <div class="space-y-4 mb-8">
                            ${renderMetric("今日列印", latest.print, "indigo")}
                            ${renderMetric("今日影印", latest.copy, "emerald")}
                            ${renderMetric("今日傳真", latest.fax, "amber")}
                        </div>

                        <div class="pt-6 border-t border-white/10 flex justify-between items-end">
                            <div>
                                <p class="text-slate-500 text-xs font-bold uppercase mb-1">今日總量</p>
                                <p class="text-4xl font-black text-white">${latest.total.toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-slate-500 text-xs font-bold uppercase mb-1">累積總印量</p>
                                <p class="text-lg font-bold text-slate-300">${p.total_all_time.toLocaleString()}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderMetric(label, value, color) {
            return `
                <div class="flex justify-between items-center">
                    <span class="text-slate-400 font-medium">${label}</span>
                    <span class="text-${color}-400 font-black font-mono text-lg">${value.toLocaleString()}</span>
                </div>
            `;
        }

        init();
    </script>
</body>

</html>
