<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printer Operations Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --accent: #fb6a7d;
            --accent-strong: #f43f5e;
            --accent-soft: #fff1f4;
            --blue: #3b9cff;
            --ink: #172033;
            --muted: #64748b;
            --surface: #edf1f5;
            --panel: #ffffff;
            --line: #d9dee7;
            --line-soft: #eef1f5;
            --chart-body-height: 312px;
            --top-card-height: 358px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Plus Jakarta Sans", "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif;
            background: var(--surface);
            color: var(--ink);
            overflow-x: hidden;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        canvas {
            max-width: 100%;
        }

        #login-screen {
            padding: 24px;
        }

        #login-screen h1 {
            line-height: 1.05;
            overflow-wrap: anywhere;
        }

        .glass-panel {
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
            backdrop-filter: none;
        }

        .dashboard-shell {
            width: min(100%, 1560px);
            margin: 0 auto;
            padding: 0 14px 18px;
            min-width: 0;
        }

        .dashboard-hero {
            min-height: 130px;
            margin: 0 -14px 12px;
            padding: 24px 22px 8px 34px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 860px);
            gap: 18px;
            align-items: center;
            color: #ffffff;
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
            backdrop-filter: none;
        }

        .dashboard-title {
            margin: 0;
            font-size: 48px;
            line-height: 1.05;
            font-weight: 800;
            letter-spacing: 0;
            color: #111827;
        }

        .dashboard-subtitle {
            margin-top: 8px;
            color: #475569;
            font-size: 15px;
            font-weight: 700;
        }

        .hero-side {
            display: grid;
            grid-template-columns: minmax(240px, 270px) minmax(0, 1fr);
            gap: 12px;
            align-items: stretch;
            min-width: 0;
        }

        .date-panel {
            border: 1px solid rgba(0, 0, 0, 0.12);
            border-radius: 8px;
            padding: 10px 12px;
            min-height: 112px;
            background: rgba(0, 0, 0, 0.03);
        }

        .date-panel-title {
            margin: 0 0 8px;
            font-size: 12px;
            font-weight: 800;
            color: #475569;
        }

        .date-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .date-field {
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border: 1px solid rgba(0, 0, 0, 0.10);
            color: #111827;
            font-size: 13px;
            font-weight: 800;
            line-height: 1;
            white-space: nowrap;
        }

        .date-rule {
            position: relative;
            height: 4px;
            margin: 18px 14px 0;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.15);
        }

        .date-rule::after {
            content: "";
            position: absolute;
            right: -13px;
            top: 50%;
            width: 30px;
            height: 30px;
            border-radius: 999px;
            background: #ffffff;
            transform: translateY(-50%);
            box-shadow: 0 2px 4px rgba(15, 23, 42, 0.12);
        }

        .dashboard-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        #dashboard-refresh-btn,
        #signout-btn {
            border: 1px solid rgba(0, 0, 0, 0.12) !important;
            border-radius: 8px !important;
            background: rgba(0, 0, 0, 0.05) !important;
            color: #111827 !important;
            padding: 9px 13px !important;
            font-size: 13px !important;
            font-weight: 800 !important;
            line-height: 1 !important;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        #dashboard-refresh-btn:hover,
        #signout-btn:hover {
            background: rgba(0, 0, 0, 0.10) !important;
            transform: translateY(-1px);
        }

        #last-update {
            color: #475569 !important;
            font-size: 12px !important;
            font-weight: 700 !important;
            text-transform: none !important;
        }

        .summary-strip {
            display: grid;
            grid-template-columns: minmax(150px, 1.18fr) minmax(92px, 0.62fr) minmax(168px, 1.25fr);
            gap: 10px;
            min-width: 0;
        }

        .summary-card {
            min-width: 0;
            min-height: 104px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            padding: 12px 14px;
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.10);
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(15, 23, 42, 0.08);
        }

        .summary-value {
            margin: 0;
            color: #d95f72;
            font-size: 34px;
            line-height: 1;
            font-weight: 800;
            letter-spacing: 0;
            overflow-wrap: normal;
            white-space: nowrap;
        }

        .summary-primary .summary-value {
            font-size: 38px;
        }

        .summary-label {
            margin: 0;
            color: #172033;
            font-size: 13px;
            font-weight: 800;
            white-space: nowrap;
        }

        .summary-hint {
            margin: 0;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 300px;
            gap: 12px;
            align-items: start;
            min-width: 0;
        }

        .dashboard-main-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(430px, 0.95fr);
            grid-template-areas:
                "trend details"
                "unit yearly"
                "warnings warnings"
                "incidents incidents";
            gap: 10px;
            min-width: 0;
        }

        #trend-section { grid-area: trend; }
        #yearly-chart-section { grid-area: yearly; }
        #unit-chart-section { grid-area: unit; }
        #printer-grid { grid-area: details; }
        #supply-warnings { grid-area: warnings; }
        #incidents-section { grid-area: incidents; }

        #trend-section,
        #yearly-chart-section,
        #unit-chart-section,
        #printer-grid,
        #supply-warnings,
        #incidents-section {
            margin: 0 !important;
            border-radius: 8px !important;
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
        }

        #trend-section,
        #yearly-chart-section,
        #unit-chart-section,
        #supply-warnings,
        #incidents-section {
            padding: 12px !important;
        }

        #trend-section h3,
        #yearly-chart-section h3,
        #unit-chart-section h3,
        #supply-warnings h3,
        #incidents-section h3 {
            margin: 0 0 10px !important;
            color: var(--accent-strong) !important;
            font-size: 17px !important;
            line-height: 1.2 !important;
            font-weight: 800 !important;
            letter-spacing: 0 !important;
        }

        #trend-section h3 svg,
        #yearly-chart-section h3 svg,
        #unit-chart-section h3 svg,
        #supply-warnings h3 svg,
        #incidents-section h3 svg {
            color: var(--accent-strong) !important;
            flex: 0 0 auto;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 252px;
        }

        #trend-section .chart-container {
            height: var(--chart-body-height);
        }

        #printer-grid {
            height: var(--top-card-height);
            min-height: 0;
            max-height: var(--top-card-height);
            align-self: start;
            width: 100%;
            min-width: 0;
            padding: 0 !important;
            overflow-x: auto;
            overflow-y: auto;
            overscroll-behavior: contain;
        }

        #printer-grid table {
            min-width: 940px;
            color: var(--ink);
            border-collapse: separate;
            border-spacing: 0;
        }

        #printer-grid thead tr {
            background: #f3f5f8 !important;
            color: #334155 !important;
            letter-spacing: 0 !important;
        }

        #printer-grid thead {
            position: sticky;
            top: 0;
            z-index: 2;
        }

        #printer-grid tbody tr {
            border-color: var(--line-soft) !important;
        }

        #printer-grid tbody tr:nth-child(even) {
            background: #f8fafc;
        }

        #printer-grid tbody tr:hover {
            background: var(--accent-soft) !important;
        }

        #printer-grid .text-white,
        #incidents-list .text-white,
        #history-modal .text-white {
            color: var(--ink) !important;
        }

        #printer-grid .text-slate-300,
        #printer-grid .text-slate-400,
        #printer-grid .text-slate-500,
        #incidents-list .text-slate-400,
        #incidents-list .text-slate-500,
        #history-modal .text-slate-300,
        #history-modal .text-slate-400,
        #history-modal .text-slate-500 {
            color: var(--muted) !important;
        }

        #printer-grid .text-indigo-400,
        #history-modal .text-indigo-400 {
            color: #2563eb !important;
        }

        #printer-grid .text-emerald-400,
        #history-modal .text-emerald-400 {
            color: #059669 !important;
        }

        #unit-filter-section {
            position: sticky;
            top: 12px;
            width: 100%;
            min-width: 0;
            padding: 10px !important;
            border-radius: 8px !important;
        }

        .filter-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 10px;
            color: #606874;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0;
        }

        .filter-title-icon {
            width: 22px;
            height: 22px;
            color: #a5adb8;
        }

        #unit-filter-buttons {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
        }

        .unit-filter-button {
            position: relative;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 9px;
            border: 1px solid #e4e7ec;
            border-radius: 2px;
            background: #d2d4d7;
            color: #111827;
            font-size: 13px;
            line-height: 1.25;
            font-weight: 800;
            text-align: center;
            transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
        }

        .unit-filter-button:hover {
            background: #c2c5ca;
            border-color: #c2c5ca;
        }

        .unit-filter-button.is-active {
            background: #2f3035;
            border-color: #2f3035;
            color: #ffffff;
        }

        .unit-filter-button.is-all {
            grid-column: 1 / -1;
            background: #f8fafc;
            border-color: var(--line);
            color: #334155;
        }

        .unit-filter-button.is-all.is-active {
            background: var(--accent-strong);
            border-color: var(--accent-strong);
            color: #ffffff;
        }

        .unit-filter-button.has-data::after {
            content: "";
            position: absolute;
            top: 7px;
            right: 7px;
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: #22c55e;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.86);
        }

        .supply-warning-card {
            border-left: 4px solid;
            border-radius: 8px !important;
            background: #fff7ed !important;
        }

        #incidents-list > div {
            border: 1px solid var(--line-soft);
            border-radius: 8px !important;
            background: #f8fafc !important;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .status-text {
            color: #334155;
            font-size: 12px;
            font-weight: 800;
        }

        .supply-chip {
            display: inline-flex;
            min-width: 44px;
            justify-content: flex-end;
            font-size: 12px;
            font-weight: 800;
        }

        .action-link {
            border-bottom: 1px solid transparent;
            font-size: 12px;
            font-weight: 800;
        }

        .action-link:hover {
            border-bottom-color: currentColor;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.58; }
        }

        .status-normal .status-dot,
        .status-dot.status-normal {
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
        }

        .status-warning .status-dot,
        .status-dot.status-warning {
            background: #f59e0b;
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.6);
        }

        .status-error .status-dot,
        .status-dot.status-error {
            background: #ef4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
        }

        .supply-bar {
            height: 6px;
            border-radius: 3px;
            background: #e5e7eb;
            overflow: hidden;
        }

        .supply-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        #history-modal .glass-panel {
            background: #ffffff;
            border: 1px solid var(--line);
            color: var(--ink);
            width: min(100%, 960px);
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #eef2f7;
        }

        ::-webkit-scrollbar-thumb {
            background: #aeb7c4;
            border-radius: 999px;
        }

        @media (max-width: 1220px) {
            .dashboard-hero {
                grid-template-columns: 1fr;
                padding-right: 22px;
            }

            .hero-side {
                grid-template-columns: 270px minmax(0, 1fr);
            }

            .dashboard-layout {
                grid-template-columns: 1fr;
            }

            #unit-filter-section {
                position: static;
                order: -1;
            }

            #unit-filter-buttons {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            }

            .dashboard-main-grid {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
                grid-template-areas:
                    "trend yearly"
                    "unit unit"
                    "details details"
                    "warnings warnings"
                    "incidents incidents";
            }
        }

        @media (max-width: 980px) {
            .dashboard-hero {
                padding: 22px 18px 14px 28px;
            }

            .hero-side {
                grid-template-columns: 1fr;
            }

            .date-panel {
                min-height: 96px;
            }

            .date-rule {
                margin-top: 14px;
            }

            .summary-strip {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .summary-card {
                min-height: 92px;
            }

            .summary-value,
            .summary-primary .summary-value {
                font-size: 30px;
            }

            .dashboard-main-grid {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "trend"
                    "details"
                    "unit"
                    "yearly"
                    "warnings"
                    "incidents";
            }

            .chart-container,
            #trend-section .chart-container {
                height: 280px;
            }

            #printer-grid {
                height: 340px;
                max-height: 340px;
            }
        }

        @media (max-width: 760px) {
            .dashboard-shell {
                padding: 0 10px 14px;
            }

            .dashboard-hero {
                margin: 0 -10px 10px;
                padding: 20px 16px 14px 22px;
                border-left-width: 10px;
            }

            .dashboard-title {
                font-size: 32px;
            }

            .hero-side {
                grid-template-columns: 1fr;
            }

            .summary-strip {
                grid-template-columns: 1fr;
                min-width: 0;
            }

            .date-fields {
                grid-template-columns: 1fr;
            }

            .date-rule {
                display: none;
            }

            .dashboard-main-grid {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "trend"
                    "details"
                    "unit"
                    "yearly"
                    "warnings"
                    "incidents";
            }

            .chart-container {
                height: 230px;
            }

            #printer-grid {
                height: 320px;
                max-height: 320px;
            }

            #trend-section .chart-container {
                height: 280px;
            }
        }

        @media (max-width: 520px) {
            #login-screen {
                padding: 18px;
            }

            #login-screen h1 {
                font-size: 32px !important;
            }

            #google-login-btn {
                width: 100%;
                justify-content: center;
            }

            .dashboard-shell {
                padding: 0 8px 12px;
            }

            .dashboard-hero {
                margin: 0 -8px 8px;
                padding: 18px 12px 12px 18px;
                border-left-width: 8px;
            }

            .dashboard-title {
                font-size: 28px;
                line-height: 1.18;
            }

            .dashboard-subtitle {
                font-size: 13px;
            }

            .dashboard-actions {
                align-items: stretch;
                flex-direction: column;
                gap: 8px;
            }

            #dashboard-refresh-btn,
            #signout-btn {
                width: 100%;
            }

            #last-update {
                text-align: left;
            }

            .date-panel {
                min-height: 0;
            }

            .summary-card {
                min-height: 84px;
                padding: 12px;
            }

            .summary-value,
            .summary-primary .summary-value {
                font-size: 28px;
            }

            #trend-section,
            #yearly-chart-section,
            #unit-chart-section,
            #supply-warnings,
            #incidents-section {
                padding: 10px !important;
            }

            #trend-section h3,
            #yearly-chart-section h3,
            #unit-chart-section h3,
            #supply-warnings h3,
            #incidents-section h3 {
                font-size: 15px !important;
            }

            .chart-container,
            #trend-section .chart-container {
                height: 240px;
            }

            #printer-grid {
                height: 300px;
                max-height: 300px;
            }

            #printer-grid table {
                min-width: 760px;
            }

            #unit-filter-section {
                padding: 8px !important;
            }

            .filter-title {
                font-size: 15px;
                gap: 6px;
            }

            #unit-filter-buttons {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 5px;
            }

            .unit-filter-button {
                min-height: 44px;
                padding: 7px;
                font-size: 12px;
            }

            #history-modal {
                padding: 10px !important;
            }

            #history-modal .glass-panel {
                max-height: 88vh;
                border-radius: 16px !important;
            }

            #history-modal .p-8 {
                padding: 16px !important;
            }

            #modal-title {
                font-size: 22px !important;
            }
        }
    </style>
</head>

<body>
    <!-- 登入畫面 -->
    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center" style="background: radial-gradient(circle at 0% 0%, #0f172a, #1e1b4b);">
        <div class="text-center">
            <h1 class="text-5xl font-extrabold mb-2 text-white">OPERATIONS<span class="text-indigo-500">CENTER</span></h1>
            <p class="text-slate-400 font-medium mb-8">全院印表機監控系統</p>
            <button id="google-login-btn"
                class="flex items-center gap-3 mx-auto bg-white text-slate-900 hover:bg-slate-100 font-bold py-3 px-8 rounded-xl transition-all duration-200 shadow-lg hover:shadow-xl"
                onclick="handleGoogleLogin()">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.65 0 6.53 5.78 5.04 13.42l7.46 5.79C13.64 15.08 18.3 9.5 24 9.5z"/>
                    <path fill="#34A853" d="M46.85 24.49c.34-1.97.54-3.98.54-6.49 0-1.49-.13-2.9-.39-4.25H24v9.03h12.74c-.57 2.99-2.23 5.45-4.74 7.12l7.43 5.76c4.34-4.01 6.85-9.91 6.85-15.17z"/>
                    <path fill="#4A90D9" d="M5.04 13.42C3.48 16.53 2.55 20.21 2.55 24s.93 7.47 2.49 10.58l-7.46 5.79C-1.54 37.01-3.04 30.92-3.04 24s1.5-13.01 4.09-18.58l4z"/>
                    <path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.76l-7.43-5.76c-2.14 1.44-4.88 2.36-8.46 2.36-6.54 0-12.08-4.42-14.04-10.4L5.04 34.58C6.53 42.22 14.65 48 24 48z"/>
                </svg>
                Sign in with Google
            </button>
            <p id="login-error" class="text-red-400 text-sm mt-4 hidden"></p>
        </div>
    </div>

    <!-- 儀表板內容（初始隱藏） -->
    <div id="dashboard-content" class="dashboard-shell hidden">
        <header class="dashboard-hero">
            <div>
                <h1 class="dashboard-title">各單位印表機列印量</h1>
                <p class="dashboard-subtitle">全院印表機監控系統</p>
                <div class="dashboard-actions">
                    <button id="dashboard-refresh-btn" type="button" onclick="handleDashboardRefresh()">重整</button>
                    <div id="last-update"></div>
                </div>
            </div>
            <div class="hero-side">
                <div class="date-panel" aria-label="資料日期區間">
                    <p class="date-panel-title">Date</p>
                    <div class="date-fields">
                        <span id="date-start" class="date-field">--</span>
                        <span id="date-end" class="date-field">--</span>
                    </div>
                    <div class="date-rule" aria-hidden="true"></div>

                <div id="summary-bar" class="summary-strip" aria-label="列印量概況"></div>
            </div>
        </header>

        <div class="dashboard-layout">
            <main class="dashboard-main-grid">

                <!-- 每日趨勢圖 -->
                <div id="trend-section" class="glass-panel rounded-2xl p-6 mb-8">
                    <h3 class="text-lg font-bold mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M12 17h.01"></path>
                        </svg>
                        每日總印量趨勢
                    </h3>
                    <div class="chart-container">
                        <canvas id="trend-chart"></canvas>
                    </div>
                </div>

                <!-- 年度統計圖 -->
                <div id="yearly-chart-section" class="glass-panel rounded-2xl p-6 mb-8">
                    <h3 class="text-lg font-bold mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3v18m4-14v14m4-10v10M7 13v8M3 17v4"></path>
                        </svg>
                        <span id="yearly-chart-title">年度總印量統計</span>
                    </h3>
                    <div class="chart-container">
                        <canvas id="yearly-chart"></canvas>
                    </div>
                    <div id="yearly-chart-empty" class="hidden text-center text-slate-500 text-sm font-bold py-12">
                        尚無年度統計資料
                    </div>
                    <div id="yearly-data-table" class="hidden mt-4 overflow-x-auto">
                        <table class="w-full text-xs">
                            <thead>
                                <tr class="text-slate-400 uppercase tracking-wider border-b border-white/10">
                                    <th class="text-left py-2 px-2 font-bold">年度</th>
                                    <th class="text-right py-2 px-2 font-bold">總印量</th>
                                </tr>
                            </thead>
                            <tbody id="yearly-data-tbody">
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 單位列印狀況 -->
                <div id="unit-chart-section" class="glass-panel rounded-2xl p-6 mb-8">
                    <h3 class="text-lg font-bold mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-4z"></path>
                        </svg>
                        <span id="unit-chart-title">依單位列印狀況</span>
                    </h3>
                    <div class="chart-container">
                        <canvas id="unit-chart"></canvas>
                    </div>
                    <div id="unit-chart-empty" class="hidden text-center text-slate-500 text-sm font-bold py-12">
                        本年度尚無列印紀錄
                    </div>
                </div>

                <!-- 耗材警告列表 -->
                <div id="supply-warnings" class="mb-8 hidden">
                    <h3 class="text-lg font-bold mb-4 flex items-center text-amber-400">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                        耗材警告
                    </h3>
                    <div id="supply-warnings-list" class="space-y-2">
                    </div>
                </div>

                <!-- 印表機條列清單 -->
                <div id="printer-grid" class="glass-panel rounded-2xl overflow-hidden mb-8">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="bg-white/5 text-slate-400 text-xs">
                                <th class="px-4 py-3 font-bold text-left">狀態</th>
                                <th class="px-4 py-3 font-bold text-left">單位</th>
                                <th class="px-4 py-3 font-bold text-left">地點</th>
                                <th class="px-4 py-3 font-bold text-left hidden md:table-cell">型號</th>
                                <th class="px-4 py-3 font-bold text-center hidden md:table-cell">彩色</th>
                                <th class="px-4 py-3 font-bold text-left hidden lg:table-cell">IP</th>
                                <th class="px-4 py-3 font-bold text-right">今日</th>
                                <th class="px-4 py-3 font-bold text-right hidden md:table-cell">碳粉</th>
                                <th class="px-4 py-3 font-bold text-right hidden md:table-cell">墨水</th>
                                <th class="px-4 py-3 font-bold text-right hidden lg:table-cell">紙張</th>
                                <th class="px-4 py-3 font-bold text-right hidden xl:table-cell">累計</th>
                                <th class="px-4 py-3 font-bold text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="printer-table-body">
                        </tbody>
                    </table>
                </div>

                <!-- 近期故障記錄 -->
                <div id="incidents-section" class="glass-panel rounded-2xl p-6 mb-8 hidden">
                    <h3 class="text-lg font-bold mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        近期故障記錄（30 天）
                    </h3>
                    <div id="incidents-list" class="space-y-2">
                    </div>
                </div>

            <!-- 單位選單 -->
            <aside id="unit-filter-section" class="glass-panel hidden">
                <p class="filter-title">
                    <svg class="filter-title-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4h6v6H4V4zm10 0h6v6h-6V4zM4 14h6v6H4v-6zm10 0h6v6h-6v-6z"></path>
                    </svg>
                    全部顯示/取消篩選
                </p>
                <div id="unit-filter-buttons"></div>
            </aside>
        </div>
    </div>

    <!-- 歷史彈窗 -->
    <div id="history-modal"
        class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
        <div class="glass-panel w-full max-w-4xl max-h-[80vh] rounded-[2.5rem] overflow-hidden flex flex-col">
            <div class="p-8 border-b border-white/10 flex justify-between items-center">
                <div>
                    <h2 id="modal-title" class="text-3xl font-black">歷史數據統計</h2>
                    <p id="modal-subtitle" class="text-indigo-400 font-mono text-sm"></p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-4xl">&times;</button>
            </div>
            <div class="p-8 overflow-y-auto" id="modal-content">
            </div>
        </div>
    </div>

    <script>
        let cachedPrinters = [];
        let cachedMetrics = {};
        let cachedSupplies = {};
        let cachedIncidents = [];
        let currentFilterUnit = 'all';
        let dashboardDataLoaded = false;
        let dashboardLoadedUserKey = null;
        let dashboardLoading = false;

        async function fetchAllSupabaseRows(queryFactory, pageSize = 1000) {
            const rows = [];
            for (let from = 0; ; from += pageSize) {
                const { data, error } = await queryFactory().range(from, from + pageSize - 1);
                if (error) throw error;
                const page = data || [];
                rows.push(...page);
                if (page.length < pageSize) break;
            }
            return rows;
        }

        // == 儀表板渲染（需要登入後才呼叫） ==
        async function renderDashboard(options = {}) {
            const force = Boolean(options.force);
            const userKey = currentUser?.id || currentUser?.email || 'anonymous';
            if (!force && dashboardDataLoaded && dashboardLoadedUserKey === userKey) {
                renderScopedDashboard();
                return;
            }
            if (dashboardLoading) return;
            dashboardLoading = true;
            setRefreshLoading(true);

            try {
                const { data: rawPrinters } = await supabaseClient
                    .from('printers')
                    .select('*')
                    .order('unit', { ascending: true })
                    .order('location', { ascending: true });

                if (!rawPrinters || rawPrinters.length === 0) {
                    console.error('無印表機資料');
                    return;
                }

                const { data: rawSupplies } = await supabaseClient
                    .from('supplies')
                    .select('*');

                const rawMetrics = await fetchAllSupabaseRows(() => supabaseClient
                    .from('daily_stats')
                    .select('*')
                    .order('recorded_at', { ascending: true }));

                const { data: rawIncidents } = await supabaseClient
                    .from('incidents')
                    .select('*')
                    .gte('incident_date', new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString().substring(0, 10));

                cachedIncidents = rawIncidents || [];
                cachedSupplies = {};
                (rawSupplies || []).forEach(s => {
                    if (!cachedSupplies[s.printer_id]) cachedSupplies[s.printer_id] = [];
                    cachedSupplies[s.printer_id].push(s);
                });

                cachedMetrics = {};
                (rawMetrics || []).forEach(m => {
                    if (!cachedMetrics[m.ip_address]) cachedMetrics[m.ip_address] = [];
                    cachedMetrics[m.ip_address].push(m);
                });

                // 建構 dashboard 用的印表機資料（含今日印量、trend、supplies、incidents）
                const printers = rawPrinters.map(p => buildPrinterData(p));

                // 儲存完整資料，單位切換時從快取重繪，不重新查詢 Supabase
                cachedPrinters = printers;
                if (!force) currentFilterUnit = 'all';
                dashboardDataLoaded = true;
                dashboardLoadedUserKey = userKey;

                renderUnitFilter(printers, getUnitsWithTodayPrintData(printers));
                renderScopedDashboard();
                document.getElementById('last-update').innerText = `最後更新：${new Date().toLocaleString('zh-TW', { hour12: false })}`;
            } catch (e) {
                console.error("載入失敗:", e);
            } finally {
                dashboardLoading = false;
                setRefreshLoading(false);
            }
        }

        function setRefreshLoading(isLoading) {
            const btn = document.getElementById('dashboard-refresh-btn');
            if (!btn) return;
            btn.disabled = isLoading;
            btn.textContent = isLoading ? '更新中...' : '重整';
            btn.classList.toggle('opacity-60', isLoading);
            btn.classList.toggle('cursor-not-allowed', isLoading);
        }

        function handleDashboardRefresh() {
            renderDashboard({ force: true });
        }

        function getScopedPrinters() {
            return currentFilterUnit === 'all'
                ? cachedPrinters
                : cachedPrinters.filter(p => p.unit === currentFilterUnit);
        }

        function getScopedIncidents(printers) {
            if (currentFilterUnit === 'all') return cachedIncidents;
            const printerIds = new Set(printers.map(p => p.id));
            return cachedIncidents.filter(inc => printerIds.has(inc.printer_id));
        }

        function renderScopedDashboard() {
            const scopedPrinters = getScopedPrinters();
            const scopedIncidents = getScopedIncidents(scopedPrinters);

            // 計算哪些單位今天至少有一台印表機的印量大於 0
            const unitsWithTodayPrintData = getUnitsWithTodayPrintData(cachedPrinters);

            // 所有印表機總列印數量（不隨篩選變動）
            const grandTotal = cachedPrinters.reduce((sum, p) => sum + (p.total_all_time || 0), 0);

            renderSummary(computeSummary(scopedPrinters), grandTotal);
            updateDataRange(scopedPrinters);
            renderTrendChart(scopedPrinters);
            renderYearlyStatsChart(scopedPrinters);
            renderScopedUnitChart(scopedPrinters);
            renderSupplyWarnings(scopedPrinters);
            renderPrinters(scopedPrinters);
            renderIncidents(scopedIncidents);
            renderUnitFilter(cachedPrinters, unitsWithTodayPrintData);
        }

        function getTodayDateString() {
            const todayLocal = new Date();
            return `${todayLocal.getFullYear()}-${String(todayLocal.getMonth() + 1).padStart(2, '0')}-${String(todayLocal.getDate()).padStart(2, '0')}`;
        }

        function formatDashboardDate(dateString) {
            if (!dateString) return '--';
            const date = new Date(dateString);
            if (Number.isNaN(date.getTime())) return '--';
            return `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
        }

        function updateDataRange(printers) {
            const startEl = document.getElementById('date-start');
            const endEl = document.getElementById('date-end');
            if (!startEl || !endEl) return;

            const dates = [];
            printers.forEach(p => {
                (p.trend || []).forEach(row => {
                    const date = (row.recorded_at || '').substring(0, 10);
                    if (date) dates.push(date);
                });
            });

            dates.sort();
            startEl.textContent = formatDashboardDate(dates[0]);
            endEl.textContent = formatDashboardDate(dates[dates.length - 1]);
        }

        function getUnitsWithTodayPrintData(printers) {
            const todayStr = getTodayDateString();
            const unitsWithTodayPrintData = new Map();
            const printerUnitMap = new Map(printers.map(p => [p.ip_address, p.unit]));
            for (const [ip, metrics] of Object.entries(cachedMetrics)) {
                const hasToday = metrics.some(m => (m.recorded_at || '').substring(0, 10) === todayStr);
                if (hasToday) {
                    const unit = printerUnitMap.get(ip);
                    if (unit) unitsWithTodayPrintData.set(unit, true);
                }
            }
            return unitsWithTodayPrintData;
        }

        function computeSummary(printers) {
            const today = getTodayDateString();
            let todayTotal = 0;
            let grandTotal = 0;
            printers.forEach(p => {
                (p.trend || []).forEach(row => {
                    if ((row.recorded_at || '').substring(0, 10) === today) {
                        todayTotal += Math.max(0, row.daily_total || 0);
                    }
                });
                grandTotal += (p.total_all_time || 0);
            });
            return {
                today_total: todayTotal,
                total_printers: printers.length,
                grand_total: grandTotal
            };
        }

        function buildPrinterData(p) {
            const supplies = (cachedSupplies[p.id] || []).map(s => ({
                type: { toner: 0, ink: 1, paper: 2 }[s.supply_type] || 0,
                percent: s.remaining_percent || 100
            }));

            const rawMetrics = (cachedMetrics[p.ip_address] || []).sort((a, b) =>
                new Date(a.recorded_at) - new Date(b.recorded_at)
            );

            const today = getTodayDateString();
            const todayMetrics = rawMetrics.filter(m => (m.recorded_at || '').substring(0, 10) === today);

            const dailyTotal = todayMetrics.reduce((sum, m) => sum + Math.max(0, m.daily_total || 0), 0);
            const dailyPrint = todayMetrics.reduce((sum, m) => sum + Math.max(0, m.daily_print || 0), 0);
            const dailyCopy = todayMetrics.reduce((sum, m) => sum + Math.max(0, m.daily_copy || 0), 0);

            const trend = rawMetrics.map(m => ({
                recorded_at: m.recorded_at,
                // daily_total 是 daily_stats view 已用 LAG 算好的增量值，不可 fallback 到累積值 total_count
                daily_total: Math.max(0, m.daily_total || 0)
            }));

            const incidents = cachedIncidents
                .filter(i => i.printer_id === p.id)
                .map(i => ({
                    error_code: i.error_code,
                    description: i.description,
                    incident_date: i.incident_date?.substring(0, 10),
                    downtime_minutes: i.downtime_minutes
                }));

            const now = new Date();
            const warrantyDays = p.warranty_end ?
                Math.ceil((new Date(p.warranty_end) - now) / (24 * 60 * 60 * 1000)) : 999;

            const status = p.status || (supplies.some(s => s.percent < 15) ? 'warning' : 'normal');

            return {
                id: p.id,
                ip_address: p.ip_address,
                location: p.location,
                model: p.model,
                unit: p.unit,
                printer_status: status,
                daily_total: dailyTotal,
                daily_print: dailyPrint,
                daily_copy: dailyCopy,
                total_all_time: rawMetrics.length > 0 ? (rawMetrics[rawMetrics.length - 1].total_count || 0) : 0,
                warranty_days: Math.max(0, warrantyDays),
                supplies,
                incidents,
                trend
            };
        }

        // == 概況條渲染 ==
        function renderSummary(s, grandTotal) {
            const bar = document.getElementById('summary-bar');
            const scopeLabel = currentFilterUnit === 'all' ? '全部單位' : currentFilterUnit;
            bar.innerHTML = `
                <div class="summary-card summary-primary">
                    <p class="summary-value">${(s.today_total || 0).toLocaleString()}</p>
                    <p class="summary-label">今日總印量</p>
                    <p class="summary-hint">${scopeLabel}</p>
                </div>
                <div class="summary-card">
                    <p class="summary-value">${s.total_printers}</p>
                    <p class="summary-label">印表機總數</p>
                    <p class="summary-hint">目前範圍</p>
                </div>
                <div class="summary-card">
                    <p class="summary-value">${(grandTotal || 0).toLocaleString()}</p>
                    <p class="summary-label">總列印數量</p>
                    <p class="summary-hint">期間總和</p>
                </div>
            `;
        }

        // == 趨勢圖渲染 ==
        let trendChartInstance = null;

        function renderTrendChart(printers) {
            const dateMap = {};
            printers.forEach(p => {
                (p.trend || []).forEach(row => {
                    const d = row.recorded_at.substring(0, 10);
                    dateMap[d] = (dateMap[d] || 0) + (row.daily_total || 0);
                });
            });

            const sortedDates = Object.keys(dateMap).sort();
            const ctx = document.getElementById('trend-chart').getContext('2d');

            if (sortedDates.length === 0) return;

            // 銷毀舊圖表實例
            if (trendChartInstance) {
                trendChartInstance.destroy();
                trendChartInstance = null;
            }

            // 清理 Chart.js 全域註冊表中殘留的舊實例
            Object.keys(Chart.instances).forEach(key => {
                const chart = Chart.instances[key];
                if (chart && chart.canvas && chart.canvas.id === 'trend-chart') {
                    chart.destroy();
                }
            });

            trendChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sortedDates,
                    datasets: [{
                        label: '每日總印量',
                        data: sortedDates.map(d => dateMap[d]),
                        borderColor: '#3b9cff',
                        backgroundColor: 'rgba(59, 156, 255, 0.14)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: sortedDates.length > 30 ? 0 : 3,
                        pointHoverRadius: 5,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(23, 32, 51, 0.94)',
                            titleFont: { family: 'Plus Jakarta Sans' },
                            bodyFont: { family: 'Plus Jakarta Sans' },
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#eef1f5' },
                            ticks: { color: '#526071', maxTicksLimit: 10, font: { family: 'Plus Jakarta Sans', weight: '700' } }
                        },
                        y: {
                            grid: { color: '#e5e9f0' },
                            ticks: {
                                color: '#526071',
                                font: { family: 'Plus Jakarta Sans', weight: '700' },
                                callback: value => Number(value).toLocaleString()
                            },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        // == 年度統計圖渲染 ==
        let yearlyChartInstance = null;

        function destroyYearlyChart() {
            if (yearlyChartInstance) {
                yearlyChartInstance.destroy();
                yearlyChartInstance = null;
            }
            if (typeof Chart !== 'undefined' && Chart.instances) {
                Object.keys(Chart.instances).forEach(key => {
                    const chart = Chart.instances[key];
                    if (chart && chart.canvas && chart.canvas.id === 'yearly-chart') chart.destroy();
                });
            }
        }

        function setYearlyChartEmpty(message, isEmpty) {
            const empty = document.getElementById('yearly-chart-empty');
            const canvas = document.getElementById('yearly-chart');
            if (!empty || !canvas) return;
            empty.textContent = message;
            empty.classList.toggle('hidden', !isEmpty);
            canvas.classList.toggle('hidden', isEmpty);
        }

        function renderYearlyStatsChart(printers) {
            const section = document.getElementById('yearly-chart-section');
            const title = document.getElementById('yearly-chart-title');
            if (!section) return;

            section.classList.remove('hidden');
            if (title) {
                title.textContent = currentFilterUnit === 'all'
                    ? '年度總印量統計'
                    : `${currentFilterUnit}｜年度總印量統計`;
            }
            const yearMap = {};
            printers.forEach(p => {
                (p.trend || []).forEach(row => {
                    const date = new Date((row.recorded_at || '').substring(0, 10));
                    if (Number.isNaN(date.getTime())) return;
                    const year = String(date.getFullYear());
                    yearMap[year] = (yearMap[year] || 0) + Math.max(0, row.daily_total || row.total || 0);
                });
            });

            const years = Object.keys(yearMap).sort();
            destroyYearlyChart();
            if (years.length === 0) {
                setYearlyChartEmpty('尚無年度統計資料', true);
                return;
            }

            setYearlyChartEmpty('', false);
            const ctx = document.getElementById('yearly-chart').getContext('2d');
            yearlyChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: years,
                    datasets: [{
                        label: currentFilterUnit === 'all' ? '年度總印量' : `${currentFilterUnit} 年度總印量`,
                        data: years.map(year => yearMap[year]),
                        backgroundColor: 'rgba(59, 156, 255, 0.72)',
                        borderColor: '#3b9cff',
                        borderWidth: 1,
                        borderRadius: 4,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#334155', font: { family: 'Plus Jakarta Sans', size: 12, weight: '700' } }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(23, 32, 51, 0.94)',
                            titleFont: { family: 'Plus Jakarta Sans' },
                            bodyFont: { family: 'Plus Jakarta Sans' },
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { color: '#526071', font: { family: 'Plus Jakarta Sans', weight: '700' } }
                        },
                        y: {
                            grid: { color: '#e5e9f0' },
                            ticks: {
                                color: '#526071',
                                font: { family: 'Plus Jakarta Sans', weight: '700' },
                                callback: value => Number(value).toLocaleString()
                            },
                            beginAtZero: true
                        }
                    }
                }
            });

            // 渲染年度數據表格
            const tableEl = document.getElementById('yearly-data-table');

        // == 依單位列印狀況圖表 ==
        let unitChartInstance = null;

        function destroyUnitChart() {
            if (unitChartInstance) {
                unitChartInstance.destroy();
                unitChartInstance = null;
            }
            if (typeof Chart !== 'undefined' && Chart.instances) {
                Object.keys(Chart.instances).forEach(key => {
                    const chart = Chart.instances[key];
                    if (chart && chart.canvas && chart.canvas.id === 'unit-chart') chart.destroy();
                });
            }
        }

        function setUnitChartEmpty(message, isEmpty) {
            const empty = document.getElementById('unit-chart-empty');
            const canvas = document.getElementById('unit-chart');
            if (!empty || !canvas) return;
            empty.textContent = message;
            empty.classList.toggle('hidden', !isEmpty);
            canvas.classList.toggle('hidden', isEmpty);
        }

        function renderScopedUnitChart(printers) {
            if (currentFilterUnit === 'all') {
                document.getElementById('unit-chart-title').textContent = '依單位列印狀況';
                renderUnitAggregationChart(printers);
                return;
            }
            document.getElementById('unit-chart-title').textContent = `${currentFilterUnit}｜本年度每月印量`;
            renderPrinterMonthlyChart(printers);
        }

        function renderUnitAggregationChart(printers) {
            const unitMap = {};
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth();

            printers.forEach(p => {
                const unit = p.unit;
                if (!unit) return;
                if (!unitMap[unit]) unitMap[unit] = { daily: 0, monthly: 0, yearly: 0 };

                // 今日：使用 printer 層級的 daily_total
                unitMap[unit].daily += (p.daily_total || 0);
                unitMap[unit].monthly += (p.daily_total || 0);
                unitMap[unit].yearly += (p.daily_total || 0);

                // 歷史：從 trend 累積月/年資料
                (p.trend || []).forEach(row => {
                    const d = (row.recorded_at || '').substring(0, 10);
                    if (!d) return;
                    const val = row.daily_total || row.total || 0;
                    const rowDate = new Date(d);
                    if (rowDate.getFullYear() === currentYear) unitMap[unit].yearly += val;
                    if (rowDate.getMonth() === currentMonth) unitMap[unit].monthly += val;
                });
            });

            const units = Object.keys(unitMap).sort();
            const dailyData = units.map(u => unitMap[u].daily);
            const monthlyData = units.map(u => unitMap[u].monthly);
            const yearlyData = units.map(u => unitMap[u].yearly);

            destroyUnitChart();
            if (units.length === 0) {
                setUnitChartEmpty('沒有可顯示的單位資料', true);
                return;
            }
            setUnitChartEmpty('', false);
            const ctx = document.getElementById('unit-chart').getContext('2d');

            unitChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: units,
                    datasets: [
                        {
                            label: '今日',
                            data: dailyData,
                            backgroundColor: 'rgba(59, 156, 255, 0.72)',
                            borderColor: '#3b9cff',
                            borderWidth: 1,
                            borderRadius: 4,
                        },
                        {
                            label: '本月',
                            data: monthlyData,
                            backgroundColor: 'rgba(244, 63, 94, 0.68)',
                            borderColor: '#f43f5e',
                            borderWidth: 1,
                            borderRadius: 4,
                        },
                        {
                            label: '今年',
                            data: yearlyData,
                            backgroundColor: 'rgba(245, 158, 11, 0.7)',
                            borderColor: '#f59e0b',
                            borderWidth: 1,
                            borderRadius: 4,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#334155', font: { family: 'Plus Jakarta Sans', size: 12, weight: '700' } }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(23, 32, 51, 0.94)',
                            titleFont: { family: 'Plus Jakarta Sans' },
                            bodyFont: { family: 'Plus Jakarta Sans' },
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { color: '#526071', font: { family: 'Plus Jakarta Sans', weight: '700' } }
                        },
                        y: {
                            grid: { color: '#e5e9f0' },
                            ticks: {
                                color: '#526071',
                                font: { family: 'Plus Jakarta Sans', weight: '700' },
                                callback: value => Number(value).toLocaleString()
                            },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function renderPrinterMonthlyChart(printers) {
            const currentYear = new Date().getFullYear();
            const monthLabels = Array.from({ length: 12 }, (_, i) => `${i + 1}月`);
            const palette = [
                '#3b9cff', '#f43f5e', '#f59e0b', '#10b981',
                '#8b5cf6', '#14b8a6', '#ef4444', '#64748b',
                '#06b6d4', '#84cc16', '#f97316', '#0f766e'
            ];

            const datasets = printers.map((p, idx) => {
                const monthly = Array(12).fill(0);
                (p.trend || []).forEach(row => {
                    const date = new Date((row.recorded_at || '').substring(0, 10));
                    if (Number.isNaN(date.getTime()) || date.getFullYear() !== currentYear) return;
                    monthly[date.getMonth()] += Math.max(0, row.daily_total || row.total || 0);
                });
                const color = palette[idx % palette.length];
                return {
                    label: p.location || p.ip_address || `印表機 ${idx + 1}`,
                    data: monthly,
                    backgroundColor: `${color}99`,
                    borderColor: color,
                    borderWidth: 1,
                    borderRadius: 4,
                };
            });

            const hasData = datasets.some(ds => ds.data.some(v => v > 0));
            destroyUnitChart();
            if (!hasData) {
                setUnitChartEmpty('本年度尚無列印紀錄', true);
                return;
            }
            setUnitChartEmpty('', false);

            const ctx = document.getElementById('unit-chart').getContext('2d');
            unitChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: monthLabels,
                    datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#334155', font: { family: 'Plus Jakarta Sans', size: 11, weight: '700' } }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(23, 32, 51, 0.94)',
                            titleFont: { family: 'Plus Jakarta Sans' },
                            bodyFont: { family: 'Plus Jakarta Sans' },
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { color: '#526071', font: { family: 'Plus Jakarta Sans', weight: '700' } }
                        },
                        y: {
                            grid: { color: '#e5e9f0' },
                            ticks: {
                                color: '#526071',
                                font: { family: 'Plus Jakarta Sans', weight: '700' },
                                callback: value => Number(value).toLocaleString()
                            },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function renderUnitFilter(printers, unitsWithTodayPrintData) {
            const units = [...new Set(printers.map(p => p.unit).filter(Boolean))].sort();
            if (units.length === 0) return;

            const section = document.getElementById('unit-filter-section');
            const buttons = document.getElementById('unit-filter-buttons');
            section.classList.remove('hidden');

            buttons.innerHTML = '';
            [{ value: 'all', label: '全部顯示' }, ...units.map(u => ({ value: u, label: u }))].forEach(item => {
                const button = document.createElement('button');
                button.type = 'button';
                button.dataset.unit = item.value;
                const hasToday = item.value === 'all' ? false : (unitsWithTodayPrintData.get(item.value) || false);
                button.className = 'unit-filter-button';
                button.classList.toggle('is-all', item.value === 'all');
                button.classList.toggle('is-active', currentFilterUnit === item.value);
                button.classList.toggle('has-data', hasToday);
                button.setAttribute('aria-pressed', currentFilterUnit === item.value ? 'true' : 'false');
                button.title = hasToday ? '今日已有列印資料' : '';
                const label = document.createElement('span');
                label.textContent = item.label;
                button.appendChild(label);
                button.addEventListener('click', () => filterByUnit(item.value));
                buttons.appendChild(button);
            });

        function filterByUnit(unit) {

        // == 彩色列印判斷 ==
        function isColorPrinter(model) {
            if (!model) return false;
            // 檢查 "Color" 或 "color" 或 Canon C 系列
            return /color|c[0-9]/i.test(model) || /Canon.*(C\d)/i.test(model);
        }

        // == 輔助函數 ==
        function getSupplyPercent(p, type) {
            const typeIds = { toner: 0, ink: 1, paper: 2 };
            const supply = (p.supplies || []).find(s => s.type === type || s.type === typeIds[type]);
            return supply ? supply.percent : 100;
        }

        function getSupplyColor(percent) {
            if (percent <= 15) return '#ef4444';
            if (percent <= 50) return '#eab308';
            return '#22c55e';
        }

        function renderRow(label, value, color, extraClass = "") {
            if (value === undefined || value === null) value = 0;
            return `
                <div class="flex justify-between items-center">
                    <span class="text-slate-400 font-medium">${label}</span>
                    <span class="text-${color}-400 font-mono ${extraClass}">${value.toLocaleString()}</span>
                </div>
            `;
        }

            let yearlyStats = p.yearly_stats;

            if (!yearlyStats && logs.length > 0) {
                yearlyStats = {};
                logs.forEach(l => {

                    if (!yearlyStats[year]) yearlyStats[year] = { total: 0, months: {} };

            document.getElementById('login-screen').style.display = isLoggedIn ? 'none' : 'flex';
            document.getElementById('dashboard-content').classList.toggle('hidden', !isLoggedIn);

            if (isLoggedIn && currentUser) {
                addSignOutButton(currentUser);
            }
        }

        function addSignOutButton(user) {
            const header = document.querySelector('header');
            const existing = document.getElementById('signout-btn');
            if (existing) existing.remove();

            const btn = document.createElement('button');
            btn.id = 'signout-btn';
            btn.className = 'px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 text-slate-300 text-sm font-medium transition-colors border border-white/10';
            btn.textContent = `Sign out (${user.email})`;
            btn.onclick = handleSignOut;

            // 放在更新資訊旁，避免登入後打亂儀表板網格。
            const lastUpdateEl = document.getElementById('last-update');
            const actions = document.querySelector('.dashboard-actions');
            if (actions && lastUpdateEl) {
                actions.insertBefore(btn, lastUpdateEl);
            } else {
                header.appendChild(btn);
            }
        }

        async function handleSignOut() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        // == 初始化（檢查登入狀態） ==
        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();

            if (session) {
                currentUser = session.user;
                setAuthState(true);
                renderDashboard();
            } else {
                setAuthState(false);
            }

            // 監聽登入狀態變化（例如登入後跳回）
            supabaseClient.auth.onAuthStateChange((_event, session) => {
                if (session) {
                    currentUser = session.user;
                    setAuthState(true);
                    renderDashboard();
                } else {
                    currentUser = null;
                    setAuthState(false);
                }
            });
        }

        init();
    </script>
</body>

</html>
