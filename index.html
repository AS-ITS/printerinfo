<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printer Operations Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 0% 0%, #0f172a, #1e1b4b);
            background-attachment: fixed;
            color: #f1f5f9;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bar-month {
            fill: #6366f1;
            rx: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .bar-year {
            fill: #10b981;
            rx: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .bar-month:hover,
        .bar-year:hover {
            filter: brightness(1.2);
        }

        .text-accent-blue {
            color: #60a5fa;
        }

        .text-accent-green {
            color: #34d399;
        }

        .text-accent-amber {
            color: #fbbf24;
        }
    </style>
</head>

<body class="min-h-screen pb-24">

    <nav
        class="glass-panel sticky top-0 z-50 px-10 py-6 mb-12 flex justify-between items-center border-b border-white/5">
        <h1 class="text-3xl font-black italic tracking-tighter text-white">PRINTER<span
                class="text-indigo-400 font-light ml-1">CONTROL</span></h1>
        <select id="year-selector" onchange="render()"
            class="bg-slate-900 text-white px-6 py-2 rounded-xl border border-white/20 text-lg font-bold outline-none cursor-pointer"></select>
    </nav>

    <main class="max-w-[1500px] mx-auto px-8 space-y-12">

        <div class="mb-10">
            <h2 class="text-6xl font-black tracking-tight text-white">營運監控中心</h2>
            <p class="text-2xl text-slate-400 mt-2">即時跨機台數據分析與歷史趨勢</p>
        </div>

        <section class="glass-panel rounded-[3.5rem] p-12">
            <div class="flex items-center gap-4 mb-8">
                <span class="w-3 h-8 bg-indigo-500 rounded-full"></span>
                <h3 class="text-3xl font-extrabold text-white">本月各印表機列印量對照 (Monthly Comparison)</h3>
            </div>
            <div id="month-chart" class="w-full h-96"></div>
        </section>

        <section class="glass-panel rounded-[3.5rem] p-12">
            <div class="flex items-center gap-4 mb-8">
                <span class="w-3 h-8 bg-emerald-500 rounded-full"></span>
                <h3 class="text-3xl font-extrabold text-white">全年度各印表機總量對照 (Annual Total)</h3>
            </div>
            <div id="year-chart" class="w-full h-96"></div>
        </section>

        <section class="glass-panel rounded-[3.5rem] overflow-hidden">
            <div class="px-12 py-8 bg-white/5 border-b border-white/5 flex justify-between items-center">
                <h3 class="text-3xl font-extrabold text-white">本日列印量明細</h3>
                <span id="today-date-display"
                    class="text-2xl font-mono text-indigo-400 font-bold bg-white/5 px-6 py-2 rounded-2xl border border-white/10 tracking-widest"></span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-indigo-500/10 text-indigo-200 text-sm font-black uppercase tracking-[0.2em]">
                            <th class="px-12 py-8">放置地點 / IP</th>
                            <th class="px-8 py-8">設備型號</th>
                            <th class="px-8 py-8 text-center text-accent-blue">列印</th>
                            <th class="px-8 py-8 text-center text-accent-green">影印</th>
                            <th class="px-8 py-8 text-center text-accent-amber">傳真</th>
                            <th class="px-12 py-8 text-right text-white">今日合計</th>
                        </tr>
                    </thead>
                    <tbody id="today-table-body" class="divide-y divide-white/5 text-lg font-semibold">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        let rawData = null;

        async function init() {
            const res = await fetch('data.json');
            rawData = await res.json();

            // 讀取日期顯示
            document.getElementById('today-date-display').innerText = rawData.generated_at;

            const years = new Set();
            rawData.printers.forEach(p => p.history.forEach(h => years.add(h.year)));
            const selector = document.getElementById('year-selector');
            Array.from(years).sort().reverse().forEach(y => {
                const opt = document.createElement('option');
                opt.value = y; opt.innerText = y + " 年度報告";
                selector.appendChild(opt);
            });
            render();
        }

        function render() {
            const year = document.getElementById('year-selector').value;
            const printers = rawData.printers;

            // 1. 本月對照圖
            const monthData = printers.map(p => {
                const yh = p.history.find(h => h.year === year);
                if (!yh) return { label: p.location, value: 0 };
                const lastMonth = yh.months[yh.months.length - 1];
                return { label: p.location, value: lastMonth.month_metrics.total };
            }).sort((a, b) => b.value - a.value);
            drawComparisonChart("#month-chart", monthData, "bar-month");

            // 2. 年度對照圖
            const yearData = printers.map(p => {
                const yh = p.history.find(h => h.year === year);
                return { label: p.location, value: yh ? yh.year_total.total : 0 };
            }).sort((a, b) => b.value - a.value);
            drawComparisonChart("#year-chart", yearData, "bar-year");

            // 3. 今日表格
            const tbody = document.getElementById('today-table-body');
            tbody.innerHTML = printers.map(p => `
                <tr class="hover:bg-white/5 transition-all">
                    <td class="px-12 py-8">
                        <div class="text-2xl font-black text-white">${p.location}</div>
                        <div class="text-base text-indigo-300/50 font-mono mt-1">${p.ip}</div>
                    </td>
                    <td class="px-8 py-8 text-slate-300 font-bold">${p.model}</td>
                    <td class="px-8 py-8 text-center text-2xl font-black text-accent-blue">${p.today.print.toLocaleString()}</td>
                    <td class="px-8 py-8 text-center text-2xl font-black text-accent-green">${p.today.copy.toLocaleString()}</td>
                    <td class="px-8 py-8 text-center text-2xl font-black text-accent-amber">${p.today.fax.toLocaleString()}</td>
                    <td class="px-12 py-8 text-right text-3xl font-black text-white">${p.today.total.toLocaleString()}</td>
                </tr>
            `).join('');
        }

        function drawComparisonChart(selector, data, barClass) {
            const container = d3.select(selector);
            const width = container.node().getBoundingClientRect().width;
            const height = 384;
            container.selectAll("*").remove();

            const svg = container.append("svg").attr("width", width).attr("height", height)
                .append("g").attr("transform", "translate(70, 30)");

            const x = d3.scaleBand().range([0, width - 100]).domain(data.map(d => d.label)).padding(0.4);
            const y = d3.scaleLinear().range([height - 100, 0]).domain([0, d3.max(data, d => d.value) * 1.2 || 10]);

            svg.append("g").attr("transform", `translate(0, ${height - 100})`).call(d3.axisBottom(x))
                .selectAll("text").attr("transform", "rotate(-25)").style("text-anchor", "end").style("fill", "#94a3b8").style("font-size", "14px").style("font-weight", "600");

            svg.append("g").call(d3.axisLeft(y).ticks(5).tickSize(-width + 100))
                .call(g => g.select(".domain").remove())
                .call(g => g.selectAll(".tick line").attr("stroke", "rgba(255,255,255,0.05)"))
                .selectAll("text").style("fill", "#94a3b8").style("font-size", "12px");

            svg.selectAll(".bar").data(data).enter().append("rect")
                .attr("class", barClass)
                .attr("x", d => x(d.label))
                .attr("y", d => y(d.value))
                .attr("width", x.bandwidth())
                .attr("height", d => (height - 100) - y(d.value));
        }

        window.onload = init;
        window.onresize = render;
    </script>
</body>

</html>
