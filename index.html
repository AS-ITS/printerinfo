<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printer History Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #020617);
            background-attachment: fixed;
            color: #f1f5f9;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .card-active {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(129, 140, 248, 0.4);
        }
    </style>
</head>

<body class="min-h-screen pb-20">

    <nav class="glass-panel sticky top-0 z-50 px-10 py-6 mb-12">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black italic tracking-tighter text-white">PRINTER<span
                    class="text-indigo-400">HISTORY</span></h1>
            <select id="year-selector" onchange="render()"
                class="bg-slate-800 text-white px-6 py-2 rounded-xl border border-white/20 text-lg font-bold outline-none cursor-pointer hover:bg-slate-700 transition-all">
            </select>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8">

        <div class="mb-12">
            <p class="text-emerald-400 font-black text-xl uppercase tracking-widest mb-3">Yearly Report</p>
            <h2 class="text-6xl font-black text-white">印表機年度統計</h2>
        </div>

        <div id="printer-list" class="space-y-12">
        </div>
    </main>

    <script>
        let fullData = [];

        async function init() {
            try {
                const res = await fetch('data.json');
                fullData = await res.json();

                // 取得所有出現過的年份
                const years = new Set();
                fullData.forEach(p => p.history.forEach(h => years.add(h.year)));
                const yearSelector = document.getElementById('year-selector');
                Array.from(years).sort().reverse().forEach(y => {
                    const opt = document.createElement('option');
                    opt.value = y; opt.innerText = y + " 年度";
                    yearSelector.appendChild(opt);
                });

                render();
            } catch (e) { console.error("Loading failed", e); }
        }

        function render() {
            const selectedYear = document.getElementById('year-selector').value;
            const container = document.getElementById('printer-list');
            container.innerHTML = "";

            fullData.forEach(printer => {
                const yearData = printer.history.find(h => h.year === selectedYear);
                if (!yearData) return;

                const section = document.createElement('div');
                section.className = "glass-panel rounded-[3rem] p-10 border-white/10";

                section.innerHTML = `
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 gap-6">
                        <div>
                            <h3 class="text-4xl font-black text-white mb-2">${printer.location}</h3>
                            <p class="text-xl text-indigo-300 font-mono">${printer.ip} · ${printer.model}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black text-slate-500 uppercase tracking-widest mb-1">Yearly Total Accumulation</p>
                            <p class="text-5xl font-black text-emerald-400">${yearData.year_total.total.toLocaleString()}</p>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-center">
                            <thead>
                                <tr class="text-sm font-black uppercase tracking-widest text-slate-500 border-b border-white/5">
                                    <th class="py-4 text-left pl-4">月份 (Month)</th>
                                    <th class="py-4 text-blue-400">列印 (Print)</th>
                                    <th class="py-4 text-emerald-400">影印 (Copy)</th>
                                    <th class="py-4 text-amber-400">傳真 (Fax)</th>
                                    <th class="py-4 text-white">單月總計</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/5">
                                ${yearData.months.map(m => `
                                    <tr class="hover:bg-white/5 transition-colors">
                                        <td class="py-6 text-left pl-4 text-xl font-bold text-slate-300">${m.month} 月</td>
                                        <td class="py-6 text-2xl font-black text-blue-400/80">${m.metrics.print.toLocaleString()}</td>
                                        <td class="py-6 text-2xl font-black text-emerald-400/80">${m.metrics.copy.toLocaleString()}</td>
                                        <td class="py-6 text-2xl font-black text-amber-400/80">${m.metrics.fax.toLocaleString()}</td>
                                        <td class="py-6 text-2xl font-black text-white">${m.metrics.total.toLocaleString()}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                container.appendChild(section);
            });
        }

        window.onload = init;
    </script>
</body>

</html>
