<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印表機用量排版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body class="bg-gray-50 p-4">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-gray-800">📊 列印量排行榜</h1>
        </header>

        <div class="flex space-x-2 mb-6 bg-white p-1 rounded-lg shadow-sm border">
            <button onclick="showTab('daily')" id="btn-daily"
                class="tab-btn flex-1 py-2 rounded-md bg-blue-600 text-white font-medium">本日</button>
            <button onclick="showTab('monthly')" id="btn-monthly"
                class="tab-btn flex-1 py-2 rounded-md text-gray-600 hover:bg-gray-100">本月</button>
            <button onclick="showTab('yearly')" id="btn-yearly"
                class="tab-btn flex-1 py-2 rounded-md text-gray-600 hover:bg-gray-100">本年</button>
        </div>

        <div id="stats-list" class="space-y-4">
        </div>
    </div>

    <script>
        let allData = {};

        // 頁面載入時讀取 JSON
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                allData = data;
                showTab('daily'); // 預設顯示本日
            });

        function showTab(type) {
            // 切換按鈕樣式
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('text-gray-600');
            });
            document.getElementById('btn-' + type).classList.add('bg-blue-600', 'text-white');

            // 渲染列表
            const container = document.getElementById('stats-list');
            const list = allData[type];

            container.innerHTML = list.map((item, index) => `
                <div class="flex items-center bg-white p-4 rounded-xl shadow-sm border-l-4 ${index < 3 ? 'border-orange-400' : 'border-blue-400'}">
                    <div class="text-2xl font-black text-gray-300 mr-4 w-8">#${index + 1}</div>
                    <div class="flex-1">
                        <div class="font-bold text-gray-700">${item.location}</div>
                        <div class="text-xs text-gray-400">${item.ip}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xl font-bold text-blue-600">${item.total.toLocaleString()}</div>
                        <div class="text-[10px] text-gray-400 uppercase">張數</div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>

</html>
