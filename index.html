<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printer Analytics | Pro Color Glass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            /* 更深邃的背景以突顯彩色文字 */
            background-attachment: fixed;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
        }

        .tab-active {
            background: rgba(99, 102, 241, 0.4) !important;
            color: #fff !important;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        .metric-label {
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 0.1em;
        }

        .data-val {
            font-size: 1.25rem;
            font-weight: 700;
        }

        /* 動態長條圖漸層 */
        .bar-gradient {
            fill: url(#barGrad);
        }
    </style>
</head>

<body class="min-h-screen text-slate-200 pb-20">

    <nav class="glass-panel sticky top-0 z-40 px-10 py-6 mb-12">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-5">
                <div class="p-3 bg-indigo-500/20 rounded-2xl border border-indigo-400/30 text-indigo-400 shadow-inner">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z">
                        </path>
                    </svg>
                </div>
                <h1 class="text-3xl font-black tracking-tighter text-white">PRINTER<span
                        class="text-indigo-400 font-light italic ml-1">METRICS</span></h1>
            </div>
            <div id="last-update"
                class="text-sm font-bold text-indigo-300 bg-indigo-500/10 px-5 py-2 rounded-full border border-indigo-500/20 uppercase tracking-widest">
                Loading...</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8">

        <div class="flex flex-col md:flex-row justify-between items-end gap-10 mb-12">
            <div>
                <p class="text-emerald-400 font-black text-lg uppercase tracking-[0.25em] mb-3">Live Fleet Status</p>
                <h2 class="text-6xl font-extrabold text-white tracking-tight">監控儀表板</h2>
            </div>

            <div class="flex gap-4 p-2.5 glass-panel rounded-3xl border-white/10">
                <button onclick="updateView('daily', this)"
                    class="period-btn px-10 py-4 rounded-2xl text-lg font-bold text-slate-400 hover:text-white transition-all tab-active">本日增量</button>
                <button onclick="updateView('monthly', this)"
                    class="period-btn px-10 py-4 rounded-2xl text-lg font-bold text-slate-400 hover:text-white transition-all">本月累積</button>
                <button onclick="updateView('yearly', this)"
                    class="period-btn px-10 py-4 rounded-2xl text-lg font-bold text-slate-400 hover:text-white transition-all">年度統計</button>
            </div>
        </div>

        <div class="glass-panel p-12 rounded-[3rem] mb-12 border-white/5">
            <h3 class="text-2xl font-bold text-white mb-10 flex items-center gap-4">
                <span class="w-2.5 h-8 bg-indigo-500 rounded-full shadow-[0_0_20px_rgba(99,102,241,0.5)]"></span>
                高負載設備排行 (Top 10)
            </h3>
            <div id="main-chart" class="w-full h-[400px]"></div>
        </div>

        <div class="glass-panel rounded-[3rem] overflow-hidden border-white/10">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-indigo-500/10 text-indigo-300 text-sm font-black uppercase tracking-[0.2em]">
                            <th class="px-12 py-8">放置地點 / 網路位址</th>
                            <th class="px-8 py-8">型號</th>
                            <th class="px-8 py-8 text-center text-blue-400">列印</th>
                            <th class="px-8 py-8 text-center text-emerald-400">影印</th>
                            <th class="px-8 py-8 text-center text-white">總量</th>
                            <th class="px-12 py-8 text-right">管理</th>
                        </tr>
                    </thead>
                    <tbody id="printer-table-body" class="divide-y divide-white/5">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="detail-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-8">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="closeModal()"></div>
        <div
            class="glass-panel w-full max-w-4xl rounded-[3.5rem] shadow-2xl relative border-white/20 animate-in fade-in zoom-in duration-300">
            <div class="p-12">
                <div class="flex justify-between items-start mb-12">
                    <div>
                        <h3 class="text-5xl font-black text-white mb-4" id="modal-printer-name">裝置資訊</h3>
                        <p id="m-ip"
                            class="text-indigo-400 font-mono text-xl tracking-wider bg-white/5 px-4 py-1.5 rounded-xl border border-white/10 inline-block">
                        </p>
                    </div>
                    <button onclick="closeModal()"
                        class="p-4 hover:bg-white/10 rounded-full transition-all text-slate-500 hover:text-white">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-8 mb-12">
                    <div class="bg-white/5 p-8 rounded-[2rem] border border-white/10">
                        <p class="metric-label text-indigo-300/60 uppercase mb-3">Device Model</p>
                        <p id="m-model" class="text-2xl font-bold text-white"></p>
                    </div>
                    <div class="bg-white/5 p-8 rounded-[2rem] border border-white/10">
                        <p class="metric-label text-emerald-400/60 uppercase mb-3">Absolute Life Count</p>
                        <p id="m-raw-total" class="text-3xl font-black text-emerald-400"></p>
                    </div>
                </div>

                <div class="bg-black/20 rounded-[2.5rem] overflow-hidden border border-white/5 mb-10">
                    <table class="w-full text-center">
                        <thead class="bg-white/5 text-xs font-black uppercase text-slate-500 tracking-widest">
                            <tr>
                                <th class="py-6 border-b border-white/5">統計維度</th>
                                <th class="py-6 border-b border-white/5 text-blue-400">列印增量</th>
                                <th class="py-6 border-b border-white/5 text-emerald-400">影印增量</th>
                                <th class="py-6 border-b border-white/5 text-amber-400">傳真增量</th>
                                <th class="py-6 border-b border-white/5 text-white">總計</th>
                            </tr>
                        </thead>
                        <tbody id="modal-stats-body" class="text-lg font-bold text-slate-200"></tbody>
                    </table>
                </div>

                <button onclick="closeModal()"
                    class="w-full py-6 bg-indigo-600 hover:bg-indigo-500 text-white rounded-[1.5rem] font-black text-xl transition-all shadow-lg uppercase tracking-widest">Close
                    Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        let printerData = [];
        let currentPeriod = 'daily';

        async function init() {
            try {
                const response = await fetch('data.json');
                printerData = await response.json();
                document.getElementById('last-update').innerText = `Sync: ${new Date().toLocaleTimeString('zh-TW')}`;
                render(currentPeriod);
            } catch (e) {
                document.getElementById('last-update').innerText = 'Data Error';
            }
        }

        function updateView(period, el) {
            currentPeriod = period;
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('tab-active'));
            el.classList.add('tab-active');
            render(period);
        }

        function render(period) {
            renderChart(period);
            renderTable(period);
        }

        function renderChart(period) {
            const container = d3.select("#main-chart");
            const width = container.node().getBoundingClientRect().width;
            const height = 400;
            container.selectAll("*").remove();

            const svg = container.append("svg").attr("width", width).attr("height", height)
                .append("g").attr("transform", "translate(60, 40)");

            const sorted = [...printerData].sort((a, b) => b[period].total - a[period].total).slice(0, 10);

            const x = d3.scaleBand().range([0, width - 100]).domain(sorted.map(d => d.location)).padding(0.4);
            const y = d3.scaleLinear().range([height - 120, 0]).domain([0, d3.max(sorted, d => d[period].total) * 1.1 || 10]);

            // 定義漸層
            const defs = svg.append("defs");
            const grad = defs.append("linearGradient").attr("id", "barGrad").attr("x1", "0%").attr("y1", "0%").attr("x2", "0%").attr("y2", "100%");
            grad.append("stop").attr("offset", "0%").attr("stop-color", "#818cf8");
            grad.append("stop").attr("offset", "100%").attr("stop-color", "#4f46e5");

            // 座標軸
            const xAxis = svg.append("g").attr("transform", `translate(0, ${height - 120})`).call(d3.axisBottom(x));
            xAxis.selectAll("text").attr("transform", "rotate(-25)").style("text-anchor", "end").style("fill", "#94a3b8").style("font-size", "14px").style("font-weight", "600");
            xAxis.select(".domain").attr("stroke", "rgba(255,255,255,0.1)");

            svg.selectAll(".bar").data(sorted).enter().append("rect")
                .attr("class", "bar-gradient")
                .attr("x", d => x(d.location))
                .attr("y", d => y(d[period].total))
                .attr("width", x.bandwidth())
                .attr("height", d => (height - 120) - y(d[period].total))
                .attr("rx", 10);
        }

        function renderTable(period) {
            const tbody = document.getElementById('printer-table-body');
            tbody.innerHTML = printerData.map(d => `
                <tr class="hover:bg-white/5 transition-all group">
                    <td class="px-12 py-9">
                        <div class="text-2xl font-black text-white group-hover:text-indigo-400 transition-colors">${d.location}</div>
                        <div class="text-base text-indigo-300/60 font-mono mt-2 tracking-wide">${d.ip}</div>
                    </td>
                    <td class="px-8 py-9 text-lg font-bold text-slate-300">${d.model}</td>
                    <td class="px-8 py-9 text-center data-val text-blue-400">${d[period].print.toLocaleString()}</td>
                    <td class="px-8 py-9 text-center data-val text-emerald-400">${d[period].copy.toLocaleString()}</td>
                    <td class="px-8 py-9 text-center text-2xl font-black text-white">${d[period].total.toLocaleString()}</td>
                    <td class="px-12 py-9 text-right">
                        <button onclick="showPrinterDetail('${d.ip}')" class="px-8 py-3 bg-white/10 hover:bg-white text-white hover:text-indigo-900 text-base font-black rounded-2xl transition-all border border-white/10 uppercase tracking-widest shadow-lg">Detail</button>
                    </td>
                </tr>
            `).join('');
        }

        function showPrinterDetail(ip) {
            const p = printerData.find(d => d.ip === ip);
            if (!p) return;

            document.getElementById('modal-printer-name').innerText = p.location;
            document.getElementById('m-ip').innerText = p.ip;
            document.getElementById('m-model').innerText = p.model;
            document.getElementById('m-raw-total').innerText = p.raw_total.toLocaleString();

            const rows = [
                { l: 'Today Change', k: 'daily', c: 'text-blue-400' },
                { l: 'Monthly Peak', k: 'monthly', c: 'text-emerald-400' },
                { l: 'Yearly Total', k: 'yearly', c: 'text-white' }
            ];

            document.getElementById('modal-stats-body').innerHTML = rows.map(r => `
                <tr class="border-b border-white/5 group hover:bg-white/5 transition-colors">
                    <td class="py-8 text-slate-400 font-black uppercase text-sm pl-8 text-left italic">${r.l}</td>
                    <td class="py-8 text-2xl font-bold text-blue-400">${p[r.k].print}</td>
                    <td class="py-8 text-2xl font-bold text-emerald-400">${p[r.k].copy}</td>
                    <td class="py-8 text-2xl font-bold text-amber-400">${p[r.k].fax}</td>
                    <td class="py-8 text-3xl font-black ${r.c}">${p[r.k].total}</td>
                </tr>
            `).join('');

            document.getElementById('detail-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        window.onload = init;
        window.onresize = () => renderChart(currentPeriod);
    </script>
</body>

</html>
