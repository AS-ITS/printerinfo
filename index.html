<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印表機使用量監控儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        /* Modal 動畫與樣式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 50;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        /* D3 圖表樣式 */
        .bar {
            transition: fill 0.2s;
        }

        .bar:hover {
            fill: #4f46e5;
        }

        .axis-label {
            font-size: 12px;
            color: #64748b;
        }

        /* 選單啟動狀態 */
        .tab-active {
            background-color: #4f46e5 !important;
            color: white !important;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z">
                            </path>
                        </svg>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-slate-800">Printer Analytics</span>
                </div>
                <div class="text-sm text-slate-500" id="last-update">資料讀取中...</div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">

        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">使用量統計</h2>
                <p class="text-slate-500">監控各辦公室印表機之列印、影印與傳真數據</p>
            </div>
            <div class="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200">
                <button onclick="updateView('daily', this)"
                    class="period-btn px-4 py-2 rounded-lg text-sm font-semibold text-slate-600 transition-all tab-active">本日增量</button>
                <button onclick="updateView('monthly', this)"
                    class="period-btn px-4 py-2 rounded-lg text-sm font-semibold text-slate-600 transition-all">本月累計</button>
                <button onclick="updateView('yearly', this)"
                    class="period-btn px-4 py-2 rounded-lg text-sm font-semibold text-slate-600 transition-all">今年累計</button>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-8 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-bold text-slate-700 flex items-center gap-2">
                        <span class="w-2 h-6 bg-indigo-500 rounded-full"></span>
                        高用量排名 (Top 10)
                    </h3>
                    <span id="chart-period-label"
                        class="text-xs font-bold uppercase tracking-wider text-slate-400 bg-slate-100 px-2 py-1 rounded">Daily</span>
                </div>
                <div id="main-chart" class="w-full h-80"></div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500 tracking-wider">放置地點</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500 tracking-wider">設備型號</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500 tracking-wider text-center">
                                列印</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500 tracking-wider text-center">
                                影印</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500 tracking-wider text-center">
                                傳真</th>
                            <th
                                class="px-6 py-4 text-xs font-bold uppercase text-slate-500 tracking-wider text-center text-indigo-600">
                                總計增量</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500 tracking-wider text-center">
                                操作</th>
                        </tr>
                    </thead>
                    <tbody id="printer-table-body" class="divide-y divide-slate-100">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="detail-modal" class="modal">
        <div class="bg-white w-full max-w-2xl mx-4 rounded-2xl shadow-2xl overflow-hidden transform transition-all">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="text-xl font-bold text-slate-800" id="modal-printer-name">印表機詳細資訊</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="p-8">
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="p-4 bg-slate-50 rounded-xl">
                        <p class="text-xs font-bold text-slate-400 uppercase mb-1">IP 位址</p>
                        <p id="m-ip" class="font-mono font-semibold text-slate-700"></p>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-xl">
                        <p class="text-xs font-bold text-slate-400 uppercase mb-1">設備型號</p>
                        <p id="m-model" class="font-semibold text-slate-700"></p>
                    </div>
                </div>

                <h4 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                        </path>
                    </svg>
                    各週期統計對照 (增量)
                </h4>
                <div class="border border-slate-200 rounded-xl overflow-hidden">
                    <table class="w-full text-center border-collapse">
                        <thead class="bg-slate-50 text-xs font-bold text-slate-500 uppercase">
                            <tr>
                                <th class="py-3 border-b">週期</th>
                                <th class="py-3 border-b text-blue-600">列印</th>
                                <th class="py-3 border-b text-emerald-600">影印</th>
                                <th class="py-3 border-b text-amber-600">傳真</th>
                                <th class="py-3 border-b text-slate-800">總計</th>
                            </tr>
                        </thead>
                        <tbody id="modal-stats-body" class="text-sm">
                        </tbody>
                    </table>
                </div>

                <div class="mt-8 flex justify-between items-center">
                    <div class="text-xs text-slate-400">
                        機器目前面板累積總讀數：<span id="m-raw-total" class="font-bold text-slate-600"></span>
                    </div>
                    <button onclick="closeModal()"
                        class="px-6 py-2 bg-slate-800 text-white rounded-lg font-semibold hover:bg-slate-700 transition-colors shadow-lg shadow-slate-200">關閉視窗</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let printerData = [];
        let currentPeriod = 'daily';

        // 初始化
        async function init() {
            try {
                // 這裡的 data.json 是由 Golang 後端產生的
                const response = await fetch('data.json');
                printerData = await response.json();

                document.getElementById('last-update').innerText = `更新時間: ${new Date().toLocaleString('zh-TW')}`;

                render(currentPeriod);
            } catch (error) {
                console.error('無法載入數據:', error);
                document.getElementById('last-update').innerText = '數據載入失敗';
            }
        }

        // 切換視圖 (日/月/年)
        function updateView(period, element) {
            currentPeriod = period;

            // 更新按鈕樣式
            document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('tab-active'));
            element.classList.add('tab-active');

            // 更新圖表標籤
            document.getElementById('chart-period-label').innerText = period;

            render(period);
        }

        // 執行渲染
        function render(period) {
            renderChart(period);
            renderTable(period);
        }

        // D3.js 渲染圖表
        function renderChart(period) {
            const container = d3.select("#main-chart");
            const width = container.node().getBoundingClientRect().width;
            const height = 320;
            container.selectAll("*").remove();

            const svg = container.append("svg")
                .attr("width", width)
                .attr("height", height)
                .append("g")
                .attr("transform", "translate(50, 20)");

            // 只取前 10 名
            const sortedData = [...printerData]
                .sort((a, b) => b[period].total - a[period].total)
                .slice(0, 10);

            const x = d3.scaleBand()
                .range([0, width - 80])
                .domain(sortedData.map(d => d.location))
                .padding(0.3);

            const y = d3.scaleLinear()
                .range([height - 70, 0])
                .domain([0, d3.max(sortedData, d => d[period].total) * 1.1 || 10]);

            // 畫 X 軸
            svg.append("g")
                .attr("transform", `translate(0, ${height - 70})`)
                .call(d3.axisBottom(x))
                .selectAll("text")
                .attr("transform", "rotate(-20)")
                .attr("class", "axis-label text-slate-400")
                .style("text-anchor", "end");

            // 畫 Y 軸
            svg.append("g")
                .call(d3.axisLeft(y).ticks(5).tickSize(-width + 80))
                .call(g => g.select(".domain").remove())
                .call(g => g.selectAll(".tick line").attr("stroke", "#e2e8f0").attr("stroke-dasharray", "4,4"));

            // 畫長條
            svg.selectAll(".bar")
                .data(sortedData)
                .enter().append("rect")
                .attr("class", "bar fill-indigo-500 rounded-t")
                .attr("x", d => x(d.location))
                .attr("y", d => y(d[period].total))
                .attr("width", x.bandwidth())
                .attr("height", d => (height - 70) - y(d[period].total))
                .attr("rx", 4);
        }

        // 渲染資料表格
        function renderTable(period) {
            const tbody = document.getElementById('printer-table-body');
            tbody.innerHTML = printerData.map(d => `
                <tr class="hover:bg-slate-50/80 transition-colors group">
                    <td class="px-6 py-4">
                        <div class="text-sm font-semibold text-slate-800">${d.location}</div>
                        <div class="text-xs text-slate-400 font-mono">${d.ip}</div>
                    </td>
                    <td class="px-6 py-4 text-sm text-slate-500">${d.model}</td>
                    <td class="px-6 py-4 text-sm text-center text-blue-600 font-medium">${d[period].print.toLocaleString()}</td>
                    <td class="px-6 py-4 text-sm text-center text-emerald-600 font-medium">${d[period].copy.toLocaleString()}</td>
                    <td class="px-6 py-4 text-sm text-center text-amber-600 font-medium">${d[period].fax.toLocaleString()}</td>
                    <td class="px-6 py-4 text-sm text-center font-bold text-slate-900">${d[period].total.toLocaleString()}</td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="showPrinterDetail('${d.ip}')" class="px-3 py-1 text-xs font-bold text-indigo-600 bg-indigo-50 rounded-full hover:bg-indigo-600 hover:text-white transition-all">詳情</button>
                    </td>
                </tr>
            `).join('');
        }

        // 顯示單台詳細資訊 Modal
        function showPrinterDetail(ip) {
            const printer = printerData.find(p => p.ip === ip);
            if (!printer) return;

            // 設定基本內容
            document.getElementById('modal-printer-name').innerText = `${printer.location} - 裝置詳情`;
            document.getElementById('m-ip').innerText = printer.ip;
            document.getElementById('m-model').innerText = printer.model;
            document.getElementById('m-raw-total').innerText = printer.raw_total.toLocaleString();

            // 渲染統計表格列
            const rows = [
                { label: '本日增量', key: 'daily' },
                { label: '本月累積', key: 'monthly' },
                { label: '今年累積', key: 'yearly' }
            ];

            const tbodyHtml = rows.map(r => `
                <tr class="hover:bg-slate-50">
                    <td class="py-4 border-b font-semibold text-slate-500">${r.label}</td>
                    <td class="py-4 border-b text-blue-600 font-medium">${printer[r.key].print.toLocaleString()}</td>
                    <td class="py-4 border-b text-emerald-600 font-medium">${printer[r.key].copy.toLocaleString()}</td>
                    <td class="py-4 border-b text-amber-600 font-medium">${printer[r.key].fax.toLocaleString()}</td>
                    <td class="py-4 border-b font-bold text-slate-800">${printer[r.key].total.toLocaleString()}</td>
                </tr>
            `).join('');

            document.getElementById('modal-stats-body').innerHTML = tbodyHtml;

            // 顯示 Modal
            document.getElementById('detail-modal').classList.add('show');
            document.body.style.overflow = 'hidden'; // 防止底層滾動
        }

        // 關閉 Modal
        function closeModal() {
            document.getElementById('detail-modal').classList.remove('show');
            document.body.style.overflow = 'auto';
        }

        // 監聽 ESC 鍵關閉 Modal
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // 監聽視窗調整大小以重繪圖表
        window.addEventListener('resize', () => renderChart(currentPeriod));

        // 啟動
        init();
    </script>
</body>

</html>
