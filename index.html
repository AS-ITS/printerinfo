<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印表機使用量監控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body class="bg-slate-50 min-h-screen">
    <nav class="bg-blue-700 text-white p-4 shadow-lg">
        <div class="container mx-auto font-bold text-xl text-center md:text-left">
            🖨️ 印表機數據中心
        </div>
    </nav>

    <main class="container mx-auto p-4 md:py-10">
        <div id="dashboard" hx-get="data.json" hx-trigger="load" hx-swap="innerHTML"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

            <div class="text-center col-span-full py-10 text-gray-500">
                正在讀取最新數據...
            </div>
        </div>
    </main>

    <script>
        document.body.addEventListener('htmx:afterRequest', function (evt) {
            if (evt.detail.pathInfo.requestPath === 'data.json') {
                const data = JSON.parse(evt.detail.xhr.responseText);
                const container = document.getElementById('dashboard');

                container.innerHTML = data.map(item => `
                    <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-blue-500 hover:shadow-lg transition-shadow">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-lg font-bold text-gray-800">${item.location}</h3>
                                <p class="text-sm text-gray-500">${item.model}</p>
                            </div>
                            <span class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded">${item.ip}</span>
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between">
                                <span class="text-gray-600">今日總印量</span>
                                <span class="font-bold text-2xl text-blue-600">${item.total}</span>
                            </div>
                            <div class="text-xs text-gray-400 text-right">更新日期：${item.date}</div>
                        </div>
                    </div>
                `).join('');
            }
        });
    </script>
</body>

</html>
