<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printer Analytics | 年度累計報告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            background-attachment: fixed;
            color: #f8fafc;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .text-header {
            font-size: 3.5rem;
            font-weight: 800;
        }

        .text-data {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .text-label {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .row-hover:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* 載入動畫 */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .loading-pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>

<body class="min-h-screen pb-20">

    <nav class="glass-panel sticky top-0 z-50 px-10 py-6 mb-12">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black italic tracking-tighter">PRINTER<span class="text-indigo-400">HISTORY</span>
            </h1>
            <div class="flex items-center gap-6">
                <!-- 載入狀態指示 -->
                <span id="status-badge" class="text-slate-500 text-sm font-bold loading-pulse">載入中...</span>
                <span class="text-slate-400 font-bold uppercase tracking-widest text-sm">選擇年份:</span>
                <select id="year-selector" onchange="render()"
                    class="bg-slate-800 text-white px-6 py-2 rounded-xl border border-white/20 text-lg font-bold outline-none cursor-pointer">
                </select>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8">
        <div class="mb-16">
            <p class="text-emerald-400 font-black text-xl uppercase tracking-[0.3em] mb-3">Statistics Center</p>
            <h2 class="text-header text-white leading-none">年度累計報告</h2>
            <p id="last-update" class="text-slate-500 text-sm mt-3"></p>
        </div>

        <!-- 錯誤訊息 -->
        <div id="error-msg" class="hidden glass-panel rounded-2xl p-6 mb-8 border border-red-500/30 bg-red-500/10">
            <p class="text-red-400 font-bold">⚠️ 資料載入失敗</p>
            <p id="error-detail" class="text-red-300 text-sm mt-1"></p>
        </div>

        <div id="printer-container" class="space-y-16">
        </div>
    </main>

    <script>
        // =============================================
        // Supabase 設定
        // =============================================
        const SUPABASE_URL = 'https://aopzclrptvpfovklhcip.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvcHpjbHJwdHZwZm92a2xoY2lwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDI1MzgsImV4cCI6MjA5MjM3ODUzOH0.ZXpDc6ADxFXwSj6LYjcZn9viytSHEPA_69E7VY2bVT0';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 全域資料
        let fullData = [];

        // =============================================
        // 初始化：從 Supabase 拉取資料
        // =============================================
        async function init() {
            const statusEl = document.getElementById('status-badge');
            try {
                // 1. 拉取所有印表機基本資料
                const { data: printers, error: printerErr } = await supabaseClient
                    .from('printers')
                    .select('id, ip_address, location, model, unit')
                    .order('unit', { ascending: true })
                    .order('location', { ascending: true });

                if (printerErr) throw printerErr;
                if (!printers || printers.length === 0) {
                    throw new Error('沒有任何印表機資料');
                }

                // 2. 拉取 daily_stats view 的全部歷史記錄（含每日差值）
                const { data: stats, error: statsErr } = await supabaseClient
                    .from('daily_stats')
                    .select('ip_address, recorded_at, daily_print, daily_copy, daily_fax, daily_total, print_count, copy_count, fax_count')
                    .order('recorded_at', { ascending: true });

                if (statsErr) throw statsErr;

                // 3. 以 ip_address 建立快速索引 map
                const statsMap = {};
                (stats || []).forEach(row => {
                    const ip = row.ip_address;
                    if (!statsMap[ip]) statsMap[ip] = [];
                    statsMap[ip].push(row);
                });

                // 4. 為每台印表機聚合年/月資料
                fullData = printers.map(p => {
                    const rows = statsMap[p.ip_address] || [];
                    // 年份 → 月份 → { print, copy, fax, total }
                    const yearMap = {};

                    rows.forEach(row => {
                        if (!row.recorded_at) return;
                        const date = new Date(row.recorded_at);
                        const year = String(date.getFullYear());
                        const month = String(date.getMonth() + 1).padStart(2, '0');

                        // 優先使用 daily_* 差值欄位（已由 SQL LAG 計算），避免累加重複
                        const dPrint = Math.max(0, row.daily_print || 0);
                        const dCopy  = Math.max(0, row.daily_copy  || 0);
                        const dFax   = Math.max(0, row.daily_fax   || 0);
                        const dTotal = Math.max(0, row.daily_total || (dPrint + dCopy + dFax));

                        if (!yearMap[year]) yearMap[year] = { total: 0, months: {} };
                        if (!yearMap[year].months[month]) {
                            yearMap[year].months[month] = { print: 0, copy: 0, fax: 0, total: 0 };
                        }

                        yearMap[year].months[month].print += dPrint;
                        yearMap[year].months[month].copy  += dCopy;
                        yearMap[year].months[month].fax   += dFax;
                        yearMap[year].months[month].total += dTotal;
                        yearMap[year].total += dTotal;
                    });

                    // 轉換成陣列格式供前端渲染
                    const history = Object.keys(yearMap).sort().reverse().map(year => ({
                        year,
                        year_total: { total: yearMap[year].total },
                        months: Object.keys(yearMap[year].months).sort().reverse().map(month => ({
                            month,
                            metrics: yearMap[year].months[month]
                        }))
                    }));

                    return {
                        location: p.location,
                        ip: p.ip_address,
                        model: p.model,
                        unit: p.unit,
                        history
                    };
                }).filter(p => p.history.length > 0); // 僅保留有資料的印表機

                if (fullData.length === 0) {
                    throw new Error('所有印表機均無歷史列印紀錄');
                }

                // 5. 取得所有不重複年份，填充年份選擇器
                const years = new Set();
                fullData.forEach(p => p.history.forEach(h => years.add(h.year)));
                const selector = document.getElementById('year-selector');
                selector.innerHTML = '';
                Array.from(years).sort().reverse().forEach(y => {
                    const opt = document.createElement('option');
                    opt.value = y;
                    opt.innerText = y + ' 年度';
                    selector.appendChild(opt);
                });

                // 更新狀態
                statusEl.textContent = `已更新：${new Date().toLocaleString('zh-TW')}`;
                statusEl.classList.remove('loading-pulse');
                statusEl.classList.add('text-emerald-400');
                document.getElementById('last-update').textContent =
                    `資料來源：Supabase 即時讀取 · ${printers.length} 台印表機 · ${(stats || []).length} 筆記錄`;

                render();

            } catch (e) {
                console.error('載入失敗:', e);
                statusEl.textContent = '載入失敗';
                statusEl.classList.add('text-red-400');
                statusEl.classList.remove('loading-pulse');
                document.getElementById('error-msg').classList.remove('hidden');
                document.getElementById('error-detail').textContent = e.message || String(e);
            }
        }

        // =============================================
        // 渲染：依選擇的年份顯示各印表機月份報表
        // =============================================
        function render() {
            const selectedYear = document.getElementById('year-selector').value;
            const container = document.getElementById('printer-container');
            container.innerHTML = '';

            fullData.forEach(printer => {
                const yearInfo = printer.history.find(h => h.year === selectedYear);
                if (!yearInfo) return;

                const section = document.createElement('div');
                section.className = 'glass-panel rounded-[3rem] p-12 overflow-hidden border-white/10';

                section.innerHTML = `
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-8">
                        <div>
                            <p class="text-indigo-300 font-bold text-sm uppercase tracking-widest mb-2">${printer.unit || ''}</p>
                            <h3 class="text-4xl font-black text-white mb-3">${printer.location}</h3>
                            <p class="text-2xl text-indigo-300 font-mono opacity-80">${printer.ip} · ${printer.model || '-'}</p>
                        </div>
                        <div class="bg-white/5 p-6 rounded-3xl border border-white/10 text-right min-w-[240px]">
                            <p class="text-sm font-black text-slate-500 uppercase tracking-widest mb-2">年度累計總量</p>
                            <p class="text-6xl font-black text-white">${yearInfo.year_total.total.toLocaleString()}</p>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-center">
                            <thead>
                                <tr class="text-base font-black uppercase tracking-widest text-slate-500 border-b border-white/10">
                                    <th class="py-6 text-left pl-6">月份</th>
                                    <th class="py-6 text-blue-400">列印 (Print)</th>
                                    <th class="py-6 text-emerald-400">影印 (Copy)</th>
                                    <th class="py-6 text-amber-400">傳真 (Fax)</th>
                                    <th class="py-6 text-white bg-white/5 rounded-t-2xl">單月合計</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/5">
                                ${yearInfo.months.map(m => `
                                    <tr class="row-hover transition-colors">
                                        <td class="py-7 text-left pl-6 text-2xl font-bold text-slate-200">${parseInt(m.month)}月</td>
                                        <td class="py-7 text-data text-blue-400/90">${m.metrics.print.toLocaleString()}</td>
                                        <td class="py-7 text-data text-emerald-400/90">${m.metrics.copy.toLocaleString()}</td>
                                        <td class="py-7 text-data text-amber-400/90">${m.metrics.fax.toLocaleString()}</td>
                                        <td class="py-7 text-data text-white bg-white/5">${m.metrics.total.toLocaleString()}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                container.appendChild(section);
            });

            // 若該年份完全沒有資料
            if (container.children.length === 0) {
                container.innerHTML = `
                    <div class="glass-panel rounded-3xl p-12 text-center text-slate-500">
                        <p class="text-2xl font-bold">該年度無任何列印紀錄</p>
                    </div>
                `;
            }
        }

        // 啟動
        window.onload = init;
    </script>
</body>

</html>
