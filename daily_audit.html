<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日印量檢查 | Daily Print Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --accent: #fb6a7d;
            --accent-strong: #f43f5e;
            --blue: #3b9cff;
            --ink: #172033;
            --muted: #64748b;
            --surface: #edf1f5;
            --panel: #ffffff;
            --line: #d9dee7;
        }

        * { box-sizing: border-box; }
        html { width: 100%; overflow-x: hidden; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Plus Jakarta Sans", "Noto Sans TC", sans-serif;
            background: var(--surface);
            color: var(--ink);
            overflow-x: hidden;
        }
        button, input, select, textarea { font: inherit; }

        .glass-panel {
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
        }

        .shell {
            width: min(100%, 1440px);
            margin: 0 auto;
            padding: 0 14px 18px;
            min-width: 0;
        }

        .hero {
            min-height: 110px;
            margin: 0 -14px 12px;
            padding: 24px 22px 8px 34px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 860px);
            gap: 18px;
            align-items: center;
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
        }
        .hero-title { margin: 0; font-size: 48px; line-height: 1.05; font-weight: 800; color: #111827; }
        .hero-subtitle { margin-top: 8px; color: #475569; font-size: 15px; font-weight: 700; }

        .dashboard-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .action-btn {
            border: 1px solid rgba(0,0,0,0.12) !important;
            border-radius: 8px !important;
            background: rgba(0,0,0,0.05) !important;
            color: #111827 !important;
            padding: 9px 13px !important;
            font-size: 13px !important;
            font-weight: 800 !important;
            line-height: 1 !important;
            text-decoration: none !important;
            cursor: pointer !important;
            transition: background 0.15s ease, transform 0.15s ease;
        }
        .action-btn:hover { background: rgba(0,0,0,0.10) !important; transform: translateY(-1px); }
        .action-btn:disabled { opacity: 0.6 !important; cursor: not-allowed; }
        .back-link { color: var(--accent-strong); font-size: 14px; font-weight: 700; text-decoration: underline; }

        #scroll-hint {
            display: none; text-align: center; padding: 6px 0 4px;
            font-size: 11px; color: var(--muted);
        }
        @media (max-width: 900px) { #scroll-hint { display: block; } }

        #summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 12px; }
        .summary-card { padding: 12px; border-radius: 8px; border: 1px solid var(--line); }
        .summary-card .num { font-size: 28px; font-weight: 800; line-height: 1; }
        .summary-card .lbl { font-size: 12px; font-weight: 700; color: var(--muted); margin-top: 4px; }

        #audit-wrapper { overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch; }
        #audit-table {
            width: 100%; color: var(--ink);
            border-collapse: separate; border-spacing: 0;
            min-width: 800px;
        }
        #audit-table thead tr { background: #f3f5f8 !important; color: #334155 !important; }
        #audit-table tbody tr { border-color: var(--line); }
        #audit-table tbody tr:nth-child(even) { background: #f8fafc; }
        #audit-table tbody tr:hover { background: #fff1f4 !important; }
        #audit-table .mono { font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px; }

        .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 800; }
        .badge-ok { background: #f0fdf4; color: #16a34a; }
        .badge-warn { background: #fefce8; color: #ca8a04; }
        .badge-danger { background: #fef2f2; color: #dc2626; }
        .badge-info { background: #eff6ff; color: #2563eb; }
        .badge-neg { background: #fef2f2; color: #b91c1c; }
        .badge-miss { background: #fff7ed; color: #c2410c; }
        .badge-field { background: #f0fdfa; color: #0e7490; }
        .badge-dup { background: #fdf4ff; color: #a219ef; }

        #table-section { margin: 0 !important; border-radius: 8px !important; background: var(--panel); border: 1px solid var(--line); box-shadow: 0 2px 8px rgba(15,23,42,0.08); padding: 12px !important; }
        #table-section h3 { margin: 0 0 10px !important; color: var(--accent-strong) !important; font-size: 17px !important; font-weight: 800 !important; }

        #log-section { margin: 0 !important; border-radius: 8px !important; background: var(--panel); border: 1px solid var(--line); box-shadow: 0 2px 8px rgba(15,23,42,0.08); padding: 12px !important; }
        #log-section h3 { margin: 0 0 10px !important; color: var(--accent-strong) !important; font-size: 17px !important; font-weight: 800 !important; }
        #log-content { font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; color: #334155; max-height: 300px; overflow-y: auto; }

        @media (max-width: 760px) {
            .hero { margin: 0 -10px 10px; padding: 20px 16px 14px 22px; grid-template-columns: 1fr; }
            .hero-title { font-size: 32px; }
            .shell { padding: 0 10px 14px; }
            #table-section, #log-section { padding: 10px !important; }
            #table-section h3, #log-section h3 { font-size: 15px !important; }
        }
    </style>
</head>

<body>
    <!-- 登入畫面 -->
    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center" style="background: radial-gradient(circle at 0% 0%, #0f172a, #1e1b4b);">
        <div class="text-center">
            <h1 class="text-5xl font-extrabold mb-2 text-white">OPERATIONS<span class="text-indigo-500">CENTER</span></h1>
            <p class="text-slate-400 font-medium mb-8">每日印量檢查工具</p>
            <button id="google-login-btn" class="flex items-center gap-3 mx-auto bg-white text-slate-900 hover:bg-slate-100 font-bold py-3 px-8 rounded-xl transition-all duration-200 shadow-lg hover:shadow-xl" onclick="handleGoogleLogin()">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.65 0 6.53 5.78 5.04 13.42l7.46 5.79C13.64 15.08 18.3 9.5 24 9.5z"/><path fill="#34A853" d="M46.85 24.49c.34-1.97.54-3.98.54-6.49 0-1.49-.13-2.9-.39-4.25H24v9.03h12.74c-.57 2.99-2.23 5.45-4.74 7.12l7.43 5.76c4.34-4.01 6.85-9.91 6.85-15.17z"/><path fill="#4A90D9" d="M5.04 13.42C3.48 16.53 2.55 20.21 2.55 24s.93 7.47 2.49 10.58l-7.46 5.79C-1.54 37.01-3.04 30.92-3.04 24s1.5-13.01 4.09-18.58l4z"/><path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.76l-7.43-5.76c-2.14 1.44-4.88 2.36-8.46 2.36-6.54 0-12.08-4.42-14.04-10.4L5.04 34.58C6.53 42.22 14.65 48 24 48z"/></svg>
                Sign in with Google
            </button>
            <p id="login-error" class="text-red-400 text-sm mt-4 hidden"></p>
        </div>
    </div>

    <!-- 主畫面 -->
    <div id="dashboard-content" class="shell hidden">
        <header class="hero">
            <div>
                <h1 class="hero-title">每日印量檢查工具</h1>
                <p class="hero-subtitle" id="mode-subtitle">檢查 daily_stats 的增量計算是否合理</p>
                <p id="gt-summary" class="hero-subtitle" style="display:none;margin-top:6px;color:var(--accent-strong);"></p>
                <div class="dashboard-actions">
                    <button id="check-btn" class="action-btn" onclick="runAudit()">開始檢查</button>
                    <button id="export-btn" class="action-btn" onclick="exportCSV()" disabled>匯出 CSV</button>
                    <input id="threshold-input" type="number" min="1" value="500" style="width:80px" class="action-btn" title="日均異常門檻">
                    <a class="back-link" href="index.html">回首頁</a>
                </div>
            </div>
            <div></div>
        </header>

        <div id="summary-cards"></div>
        <div id="table-section">
            <h3>異常清單</h3>
            <p id="scroll-hint">← 左右滑動查看完整欄位 →</p>
            <div id="audit-wrapper">
                <table id="audit-table" class="hidden">
                    <thead>
                        <tr>
                            <th class="px-4 py-3 font-bold text-left text-xs text-slate-500 uppercase">單位</th>
                            <th class="px-4 py-3 font-bold text-left text-xs text-slate-500 uppercase">地點</th>
                            <th class="px-4 py-3 font-bold text-left text-xs text-slate-500 uppercase">IP</th>
                            <th class="px-4 py-3 font-bold text-left text-xs text-slate-500 uppercase">型號</th>
                            <th class="px-4 py-3 font-bold text-right text-xs text-slate-500 uppercase">記錄日期</th>
                            <th class="px-4 py-3 font-bold text-right text-xs text-slate-500 uppercase">本次累計</th>
                            <th class="px-4 py-3 font-bold text-right text-xs text-slate-500 uppercase">上次累計</th>
                            <th class="px-4 py-3 font-bold text-right text-xs text-slate-500 uppercase">上次記錄日期</th>
                            <th class="px-4 py-3 font-bold text-right text-xs text-slate-500 uppercase">間隔天數</th>
                            <th class="px-4 py-3 font-bold text-right text-xs text-slate-500 uppercase">總增量</th>
                            <th class="px-4 py-3 font-bold text-right text-xs text-slate-500 uppercase">日均</th>
                            <th class="px-4 py-3 font-bold text-center text-xs text-slate-500 uppercase">異常類型</th>
                            <th class="px-4 py-3 font-bold text-center text-xs text-slate-500 uppercase">說明</th>
                            <th class="px-4 py-3 font-bold text-center text-xs text-slate-500 uppercase">風險</th>
                        </tr>
                    </thead>
                    <tbody id="audit-tbody"></tbody>
                </table>
            </div>
        </div>
        <div id="log-section" style="margin-top:12px;">
            <h3>檢查日誌</h3>
            <div id="log-content">尚未執行檢查。</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://aopzclrptvpfovklhcip.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvcHpjbHJwdHZwZm92a2xoY2lwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDI1MzgsImV4cCI6MjA5MjM3ODUzOH0.ZXpDc6ADxFXwSj6LYjcZn9viytSHEPA_69E7VY2bVT0';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;

        function addLog(msg, level) {
            const logEl = document.getElementById('log-content');
            const colors = { info: '#3b82f6', warn: '#f59e0b', ok: '#22c55e', error: '#ef4444' };
            logEl.innerHTML += `<span style="color:${colors[level] || '#334155'}">${msg}</span>\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function renderSummary(totalPrinters, gaps, resets, largeJumps, negativeDeltas, consistencyMisses, perFieldAvg, duplicates) {
            const cards = document.getElementById('summary-cards');
            cards.innerHTML = `
                <div class="summary-card" style="background:#f8fafc;border-color:#e2e8f0;">
                    <div class="num" style="color:#334155;">${totalPrinters}</div>
                    <div class="lbl">總印表機數</div>
                </div>
                <div class="summary-card" style="background:#f8fafc;border-color:#e2e8f0;">
                    <div class="num" style="color:#dc2626;">${resets.length + negativeDeltas.length}</div>
                    <div class="lbl">counter 重置 / 負增量</div>
                </div>
                <div class="summary-card" style="background:#f8fafc;border-color:#e2e8f0;">
                    <div class="num" style="color:#ca8a04;">${gaps.length}</div>
                    <div class="lbl">記錄間隔異常（>1天）</div>
                </div>
                <div class="summary-card" style="background:#f8fafc;border-color:#e2e8f0;">
                    <div class="num" style="color:#0e7490;">${perFieldAvg.length}</div>
                    <div class="lbl">欄位級日均異常</div>
                </div>
                <div class="summary-card" style="background:#f8fafc;border-color:#e2e8f0;">
                    <div class="num" style="color:#c2410c;">${consistencyMisses.length}</div>
                    <div class="lbl">daily_total 不一致</div>
                </div>
                <div class="summary-card" style="background:#f8fafc;border-color:#e2e8f0;">
                    <div class="num" style="color:#a219ef;">${duplicates.length}</div>
                    <div class="lbl">重複記錄</div>
                </div>
            `;
        }

        function getParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                mode: params.get('mode') || 'default',
                threshold: parseInt(params.get('daily_avg_threshold')) || 500
            };
        }

        function buildRow(a) {
            const cls = a.riskCls || 'badge-info';
            const label = a.riskLabel || a.risk;
            const typeLabels = {
                reset: 'counter重置', negPrint: '列印負增量', negCopy: '影印負增量',
                negScan: '掃描負增量', negFax: '傳真負增量', dailyTotalMiss: 'daily_total不一致',
                fieldAvg: '欄位日均異常', gap: '間隔異常', largeJump: '日均異常',
                groundTruth: 'GT差異', duplicate: '重複記錄'
            };
            const typeHtml = a.anomalyType
                ? `<td class="px-4 py-3 text-center"><span class="badge ${cls}">${typeLabels[a.anomalyType] || a.anomalyType}</span></td>`
                : '';
            const detailCol = a.detail
                ? `<td class="px-4 py-3 mono text-right" style="max-width:200px;word-break:break-all;">${a.detail}</td>`
                : '';
            return `
                    <tr class="border-t border-white/5">
                        <td class="px-4 py-3 text-slate-500 text-xs font-bold">${a.unit}</td>
                        <td class="px-4 py-3 text-slate-900 text-xs font-bold">${a.location}</td>
                        <td class="px-4 py-3 mono">${a.ip}</td>
                        <td class="px-4 py-3 text-slate-500 text-xs">${a.model || '-'}</td>
                        <td class="px-4 py-3 mono text-right">${a.date}</td>
                        <td class="px-4 py-3 mono text-right">${a.currentTotal != null ? a.currentTotal.toLocaleString() : ''}</td>
                        <td class="px-4 py-3 mono text-right">${a.prevTotal != null ? a.prevTotal.toLocaleString() : ''}</td>
                        <td class="px-4 py-3 mono text-right">${a.prevDate || ''}</td>
                        <td class="px-4 py-3 mono text-right">${a.gapDays != null ? a.gapDays : ''}</td>
                        <td class="px-4 py-3 mono text-right">${a.deltaTotal != null ? a.deltaTotal.toLocaleString() : ''}</td>
                        <td class="px-4 py-3 mono text-right">${a.dailyAvg != null ? a.dailyAvg.toLocaleString() : ''}</td>
                        ${detailCol}
                        ${typeHtml}
                        <td class="px-4 py-3 text-center"><span class="badge ${cls}">${label}</span></td>
                    </tr>`;
        }

        function exportCSV() {
            if (!window._auditData || window._auditData.length === 0) return;
            const cols = ['unit','location','ip','model','date','currentTotal','prevTotal','prevDate','gapDays','deltaTotal','dailyAvg','detail','anomalyType','riskLabel'];
            const headers = ['單位','地點','IP','型號','日期','本次累計','上次累計','上次日期','間隔','總增量','日均','說明','異常類型','風險'];
            const rows = [headers.join(',')];
            window._auditData.forEach(a => {
                rows.push(cols.map(c => {
                    const v = a[c] ?? '';
                    return '"' + String(v).replace(/"/g, '""') + '"';
                }).join(','));
            });
            const blob = new Blob(['\xEF\xBB\xBF' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const el = document.createElement('a');
            el.href = url; el.download = 'audit_' + new Date().toISOString().slice(0,10) + '.csv';
            el.click(); URL.revokeObjectURL(url);
        }

        async function runAudit() {
            const btn = document.getElementById('check-btn');
            const exportBtn = document.getElementById('export-btn');
            const params = getParams();

            btn.disabled = true;
            btn.textContent = '檢查中...';
            document.getElementById('log-content').innerHTML = '';
            document.getElementById('gt-summary').style.display = 'none';
            exportBtn.disabled = true;

            // === Ground Truth mode ===
            if (params.mode === 'ground_truth') {
                document.getElementById('mode-subtitle').textContent = 'Ground Truth 比對模式';
                addLog('開始 Ground Truth 模式：直接從 printer_metrics 重算增量...', 'info');

                const { data: rawPrinters } = await supabaseClient.from('printers').select('*');
                const printerMap = {};
                (rawPrinters || []).forEach(p => { printerMap[p.ip_address] = p; printerMap[p.id] = p; });

                const { data: rawMetrics } = await supabaseClient.from('printer_metrics').select('*');
                addLog(`取得 ${rawMetrics?.length || 0} 筆 printer_metrics 記錄`, 'info');

                // Duplicate detection
                const dupCounts = {};
                (rawMetrics || []).forEach(m => {
                    const key = m.printer_id + '_' + m.recorded_at.substring(0, 10);
                    dupCounts[key] = (dupCounts[key] || 0) + 1;
                });
                const duplicates = Object.entries(dupCounts)
                    .filter(function(e) { return e[1] > 1; })
                    .map(function(e) {
                        var key = e[0], cnt = e[1];
                        var parts = key.split('_');
                        var pidStr = parts[0], date = parts[1];
                        var p = rawPrinters ? rawPrinters.find(function(x) { return String(x.id) === pidStr; }) : undefined;
                        return { unit: (p?p.unit:'-'), location: (p?p.location:'-'), ip: 'printer_id=' + pidStr, model: (p?p.model:'-'), date: date, currentTotal: 0, prevTotal: 0, gapDays: 0, deltaTotal: 0, dailyAvg: 0, anomalyType: 'duplicate', risk: 'warn', riskLabel: 'warn', riskCls: 'badge-dup', detail: cnt + ' 筆重複' };
                    });

                // Deduplicate by printer_id + date (take latest)
                const perPrinterDay = {};
                (rawMetrics || []).forEach(m => {
                    const key = m.printer_id + '_' + m.recorded_at.substring(0, 10);
                    if (!perPrinterDay[key] || m.recorded_at > perPrinterDay[key].recorded_at) {
                        perPrinterDay[key] = m;
                    }
                });

                // Group by printer_id and sort
                const byPrinter = {};
                Object.values(perPrinterDay).forEach(m => {
                    if (!byPrinter[m.printer_id]) byPrinter[m.printer_id] = [];
                    byPrinter[m.printer_id].push(m);
                });
                for (const pid of Object.keys(byPrinter)) {
                    byPrinter[pid].sort(function(a, b) { return a.recorded_at.localeCompare(b.recorded_at); });
                }

                // Recalculate deltas
                const gtRecalc = {};
                for (const [pid, rows] of Object.entries(byPrinter)) {
                    for (let i = 1; i < rows.length; i++) {
                        const cur = rows[i], prev = rows[i-1];
                        const gapDays = Math.round((new Date(cur.recorded_at) - new Date(prev.recorded_at)) / 86400000);
                        if (gapDays <= 0) continue;
                        const ip = printerMap[pid] ? printerMap[pid].ip_address : '-';
                        const date = cur.recorded_at.substring(0, 10);
                        const dp = Math.max(0, (cur.print_count||0) - (prev.print_count||0));
                        const dc = Math.max(0, (cur.copy_count||0) - (prev.copy_count||0));
                        const ds = Math.max(0, (cur.scan_total||0) - (prev.scan_total||0));
                        const df = Math.max(0, (cur.fax_count||0) - (prev.fax_count||0));
                        const dt = Math.max(0, (cur.total_count||0) - (prev.total_count||0));
                        gtRecalc[ip + '_' + date] = { pid: pid, ip: ip, date: date, gapDays: gapDays, dp: dp, dc: dc, ds: ds, df: df, dt: dt, sum: dp + dc + ds + df };
                    }
                }

                const { data: allStats } = await supabaseClient.from('daily_stats').select('*');
                const gtStats = {};
                (allStats || []).forEach(s => { gtStats[s.ip_address + '_' + s.recorded_at.substring(0, 10)] = s; });

                // Compare
                const gtMissList = [];
                let gtMatch = 0, gtMismatch = 0;

                for (const [key, recalc] of Object.entries(gtRecalc)) {
                    const stat = gtStats[key];
                    if (!stat) {
                        gtMissList.push({ unit: (printerMap[recalc.pid]?printerMap[recalc.pid].unit:'-'), location: (printerMap[recalc.pid]?printerMap[recalc.pid].location:'-'), ip: recalc.ip, model: (printerMap[recalc.pid]?printerMap[recalc.pid].model:'-'), date: recalc.date, currentTotal: recalc.dt, prevTotal: 0, gapDays: recalc.gapDays, deltaTotal: 0, dailyAvg: 0, anomalyType: 'groundTruth', risk: 'miss', riskLabel: 'GT差異', riskCls: 'badge-miss', detail: 'daily_stats 無此筆' });
                        gtMismatch++; continue;
                    }
                    const missItems = [];
                    if (stat.daily_print !== recalc.dp) missItems.push('print: GS=' + stat.daily_print + ' GT=' + recalc.dp);
                    if (stat.daily_copy !== recalc.dc) missItems.push('copy: GS=' + stat.daily_copy + ' GT=' + recalc.dc);
                    if (stat.daily_scan !== recalc.ds) missItems.push('scan: GS=' + stat.daily_scan + ' GT=' + recalc.ds);
                    if (stat.daily_fax !== recalc.df) missItems.push('fax: GS=' + stat.daily_fax + ' GT=' + recalc.df);
                    if (stat.daily_total !== recalc.dt) missItems.push('total: GS=' + stat.daily_total + ' GT=' + recalc.dt);
                    if (stat.daily_total !== recalc.sum) missItems.push('total!=sum: GS=' + stat.daily_total + ' sum=' + recalc.sum);

                    if (missItems.length > 0) {
                        gtMissList.push({ unit: (printerMap[recalc.pid]?printerMap[recalc.pid].unit:'-'), location: (printerMap[recalc.pid]?printerMap[recalc.pid].location:'-'), ip: recalc.ip, model: (printerMap[recalc.pid]?printerMap[recalc.pid].model:'-'), date: recalc.date, currentTotal: stat.daily_total, prevTotal: recalc.dt, gapDays: recalc.gapDays, deltaTotal: missItems.length, dailyAvg: 0, anomalyType: 'groundTruth', risk: 'miss', riskLabel: 'GT差異', riskCls: 'badge-miss', detail: missItems.join(' | ') });
                        gtMismatch++;
                    } else {
                        gtMatch++;
                    }
                }

                renderSummary(rawPrinters ? rawPrinters.length : 0, [], duplicates, [], [], [], [], []);
                const gtSummaryEl = document.getElementById('gt-summary');
                gtSummaryEl.style.display = 'block';
                gtSummaryEl.textContent = 'Ground Truth：共 ' + Object.keys(gtRecalc).length + ' 筆、匹配 ' + gtMatch + '、差異 ' + gtMismatch;

                const allGTMisses = gtMissList.sort(function(a,b) { return (a.risk==='miss'?0:1)-(b.risk==='miss'?0:1); });
                const allResults = allGTMisses.concat(duplicates);
                const tbody = document.getElementById('audit-tbody');
                const table = document.getElementById('audit-table');

                if (allResults.length === 0) {
                    table.classList.add('hidden');
                    document.getElementById('log-content').innerHTML += '\n\xE2\x9C\x85 Ground Truth 比對完成：無異常！\n';
                } else {
                    table.classList.remove('hidden');
                    tbody.innerHTML = allResults.map(function(a) { return buildRow(a); }).join('');
                }

                addLog('Ground Truth 檢查結束。匹配 ' + gtMatch + ' 筆，差異 ' + gtMismatch + ' 筆', 'ok');
                btn.disabled = false;
                btn.textContent = '重新檢查';
                return;
            }

            // === Default mode (enhanced) ===
            document.getElementById('mode-subtitle').textContent = '日均門檻：' + params.threshold;
            addLog('開始檢查 daily_stats 資料...', 'info');

            const { data: rawPrinters } = await supabaseClient.from('printers').select('*').order('unit', { ascending: true }).order('location', { ascending: true });
            const printerMap = {};
            (rawPrinters || []).forEach(p => { printerMap[p.ip_address] = p; });

            const { data: allStats } = await supabaseClient.from('daily_stats').select('*').order('recorded_at', { ascending: true });
            addLog('取得 ' + (allStats ? allStats.length : 0) + ' 筆 daily_stats 記錄', 'info');

            const byIP = {};
            (allStats || []).forEach(m => { if (!byIP[m.ip_address]) byIP[m.ip_address] = []; byIP[m.ip_address].push(m); });

            const gaps = [], resets = [], largeJumps = [];
            const negDeltas = [], consistencyMisses = [], perFieldAvg = [];

            for (const [ip, rows] of Object.entries(byIP)) {
                rows.sort(function(a, b) { return a.recorded_at.localeCompare(b.recorded_at); });
                let prevValid = null, prevValidDate = null;

                for (let ri = 0; ri < rows.length; ri++) {
                    const row = rows[ri];
                    const hasCounter = (row.total_count||0) + (row.print_count||0) + (row.copy_count||0) + (row.scan_total||0) + (row.fax_count||0) > 0;
                    if (!hasCounter) continue;

                    const currentDate = row.recorded_at.substring(0, 10);
                    if (!prevValid) { prevValid = row; prevValidDate = currentDate; continue; }

                    const prevDate = prevValidDate;
                    const d1 = new Date(currentDate), d2 = new Date(prevDate);
                    const gapDays = Math.round((d1 - d2) / 86400000);
                    const p = printerMap[ip] || {};

                    // Per-field negative deltas
                    const fields = [
                        { key: 'negPrint', label: '列印', val: row.print_count, prev: prevValid.print_count },
                        { key: 'negCopy', label: '影印', val: row.copy_count, prev: prevValid.copy_count },
                        { key: 'negScan', label: '掃描', val: row.scan_total, prev: prevValid.scan_total },
                        { key: 'negFax', label: '傳真', val: row.fax_count, prev: prevValid.fax_count }
                    ];
                    for (let fi = 0; fi < fields.length; fi++) {
                        const f = fields[fi];
                        const delta = (f.val||0) - (f.prev||0);
                        if (delta < 0) {
                            negDeltas.push({ unit: p.unit||'-', location: p.location||'-', ip: ip, model: p.model||'-', date: currentDate, anomalyType: f.key, risk: 'danger', riskLabel: '負增量', riskCls: 'badge-neg', detail: f.label + ': ' + (f.val||0) + '\xE2\x86\x92' + (f.prev||0) + ' (\xE2\x88\x93' + delta + ')', currentTotal: 0, prevTotal: 0, gapDays: 0, deltaTotal: 0, dailyAvg: 0 });
                        }
                    }

                    // daily_total consistency
                    const sumFields = (row.daily_print||0) + (row.daily_copy||0) + (row.daily_scan||0) + (row.daily_fax||0);
                    if (row.daily_total != null && sumFields > 0 && row.daily_total !== sumFields) {
                        consistencyMisses.push({ unit: p.unit||'-', location: p.location||'-', ip: ip, model: p.model||'-', date: currentDate, anomalyType: 'dailyTotalMiss', risk: 'miss', riskLabel: '不一致', riskCls: 'badge-miss', detail: 'GS=' + row.daily_total + ' sum=' + sumFields, currentTotal: row.daily_total, prevTotal: sumFields, gapDays: 0, deltaTotal: 0, dailyAvg: 0 });
                    }

                    if (gapDays <= 0) { prevValid = row; prevValidDate = currentDate; continue; }

                    const deltaTotal = (row.total_count||0) - (prevValid.total_count||0);

                    // Gap > 1 day
                    if (gapDays > 1) {
                        gaps.push({ unit: p.unit||'-', location: p.location||'-', ip: ip, model: p.model||'-', date: currentDate, anomalyType: 'gap', risk: 'warn', riskLabel: '間隔異常', riskCls: 'badge-warn', currentTotal: row.total_count, prevTotal: prevValid.total_count, prevDate: prevDate, gapDays: gapDays, deltaTotal: deltaTotal, dailyAvg: deltaTotal > 0 ? Math.round(deltaTotal/gapDays) : 0 });
                    }

                    // Counter reset
                    if (row.total_count < prevValid.total_count) {
                        resets.push({ unit: p.unit||'-', location: p.location||'-', ip: ip, model: p.model||'-', date: currentDate, anomalyType: 'reset', risk: 'danger', riskLabel: 'counter重置', riskCls: 'badge-danger', detail: String(row.total_count) + ' < ' + prevValid.total_count, currentTotal: row.total_count, prevTotal: prevValid.total_count, prevDate: prevDate, gapDays: gapDays, deltaTotal: deltaTotal, dailyAvg: 0 });
                    }

                    // Per-field daily avg anomaly
                    for (let fi = 0; fi < fields.length; fi++) {
                        const f = fields[fi];
                        const delta = Math.max(0, (f.val||0) - (f.prev||0));
                        const avg = Math.round(delta / gapDays);
                        if (avg > params.threshold) {
                            perFieldAvg.push({ unit: p.unit||'-', location: p.location||'-', ip: ip, model: p.model||'-', date: currentDate, anomalyType: 'fieldAvg', risk: 'field', riskLabel: '日均' + avg, riskCls: 'badge-field', detail: f.label + ': ' + delta + '/' + gapDays + '=' + avg + ' > ' + params.threshold, currentTotal: delta, prevTotal: 0, gapDays: gapDays, deltaTotal: delta, dailyAvg: avg });
                        }
                    }

                    // Total daily avg anomaly
                    if (deltaTotal > 0 && (deltaTotal / gapDays) > params.threshold) {
                        largeJumps.push({ unit: p.unit||'-', location: p.location||'-', ip: ip, model: p.model||'-', date: currentDate, anomalyType: 'largeJump', risk: 'info', riskLabel: '日均' + Math.round(deltaTotal/gapDays), riskCls: 'badge-info', detail: 'total日均>' + params.threshold, currentTotal: row.total_count, prevTotal: prevValid.total_count, prevDate: prevDate, gapDays: gapDays, deltaTotal: deltaTotal, dailyAvg: Math.round(deltaTotal/gapDays) });
                    }

                    prevValid = row;
                    prevValidDate = currentDate;
                }
            }

            // Unique anomalies
            const uniqueGaps = gaps.filter(function(g, i, a) { return a.findIndex(function(x) { return x.date===g.date && x.ip===g.ip; })===i; });
            const uniqueResets = resets.filter(function(r, i, a) { return a.findIndex(function(x) { return x.date===r.date && x.ip===r.ip; })===i; });
            const uniqueNeg = negDeltas.filter(function(n, i, a) { return a.findIndex(function(x) { return x.date===n.date && x.ip===n.ip && x.anomalyType===n.anomalyType; })===i; });
            const uniqueConsistency = consistencyMisses.filter(function(c, i, a) { return a.findIndex(function(x) { return x.date===c.date && x.ip===c.ip; })===i; });
            const uniquePerField = perFieldAvg.filter(function(p, i, a) { return a.findIndex(function(x) { return x.date===p.date && x.ip===p.ip && x.anomalyType===p.anomalyType; })===i; });

            // Duplicate detection
            const { data: dupMetrics } = await supabaseClient.from('printer_metrics').select('printer_id, recorded_at');
            const dupCounts = {};
            (dupMetrics || []).forEach(function(m) { const k = m.printer_id + '_' + m.recorded_at.substring(0,10); dupCounts[k]=(dupCounts[k]||0)+1; });
            const duplicates = Object.entries(dupCounts)
                .filter(function(e) { return e[1] > 1; })
                .map(function(e) {
                    var key = e[0], cnt = e[1];
                    var parts = key.split('_');
                    var pidStr = parts[0], date = parts[1];
                    var p = rawPrinters ? rawPrinters.find(function(x) { return String(x.id)===pidStr; }) : undefined;
                    return { unit: (p?p.unit:'-'), location: (p?p.location:'-'), ip: 'printer_id=' + pidStr, model: (p?p.model:'-'), date: date, currentTotal: 0, prevTotal: 0, gapDays: 0, deltaTotal: 0, dailyAvg: 0, anomalyType: 'duplicate', risk: 'warn', riskLabel: 'warn', riskCls: 'badge-dup', detail: cnt + ' 筆重複' };
                });
            const uniqueDupes = duplicates.filter(function(d, i, a) { return a.findIndex(function(x) { return x.date===d.date && x.ip===d.ip; })===i; });

            renderSummary(rawPrinters ? rawPrinters.length : 0, uniqueGaps, uniqueResets, largeJumps, uniqueNeg, uniqueConsistency, uniquePerField, uniqueDupes);

            const allAnomalies = uniqueResets.concat(uniqueNeg)
                .concat(uniqueGaps.filter(function(g) { return !uniqueResets.find(function(r) { return r.date===g.date && r.ip===g.ip; }); }))
                .concat(uniqueConsistency)
                .concat(uniquePerField)
                .concat(uniqueDupes)
                .concat(uniqueJumps ? uniqueJumps.filter(function(j) { return !uniqueResets.find(function(r) { return r.date===j.date && r.ip===j.ip; }) && !uniqueGaps.find(function(g) { return g.date===j.date && g.ip===j.ip; }); }) : []);
            allAnomalies.sort(function(a,b) {
                var ord = { danger:0, miss:1, warn:2, field:3, info:4 };
                return (ord[a.risk]||5) - (ord[b.risk]||5);
            });

            const tbody = document.getElementById('audit-tbody');
            const table = document.getElementById('audit-table');

            if (allAnomalies.length === 0) {
                table.classList.add('hidden');
                document.getElementById('log-content').innerHTML += '\n\xE2\x9C\x85 所有印表機的每日增量計算合理，無異常！\n';
            } else {
                table.classList.remove('hidden');
                tbody.innerHTML = allAnomalies.map(function(a) { return buildRow(a); }).join('');
                document.getElementById('log-content').innerHTML += '\n\xE2\x9A\xA0 共 ' + allAnomalies.length + ' 筆異常：\n' +
                    '  - ' + (uniqueResets.length + uniqueNeg.length) + ' 筆 counter 重置 / 負增量\n' +
                    '  - ' + uniqueGaps.length + ' 筆記錄間隔 > 1 天\n' +
                    '  - ' + uniquePerField.length + ' 筆欄位級日均異常（> ' + params.threshold + '）\n' +
                    '  - ' + uniqueConsistency.length + ' 筆 daily_total 不一致\n' +
                    '  - ' + uniqueDupes.length + ' 筆重複記錄\n\n';
            }

            window._auditData = allAnomalies;
            exportBtn.disabled = false;

            addLog('檢查結束。', 'ok');
            btn.disabled = false;
            btn.textContent = '重新檢查';
        }

        // == 認證 ==
        async function handleGoogleLogin() {
            const btn = document.getElementById('google-login-btn');
            btn.disabled = true;
            btn.innerHTML = '登入中...';
            const { data, error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
            if (error) {
                const errEl = document.getElementById('login-error');
                errEl.textContent = error.message;
                errEl.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = 'Sign in with Google';
            }
        }
        function setAuthState(isLoggedIn) {
            document.getElementById('login-screen').style.display = isLoggedIn ? 'none' : 'flex';
            document.getElementById('dashboard-content').classList.toggle('hidden', !isLoggedIn);
            if (isLoggedIn && currentUser) {
                const header = document.querySelector('.hero');
                const existing = document.getElementById('signout-btn');
                if (existing) existing.remove();
                const btn = document.createElement('button');
                btn.id = 'signout-btn';
                btn.className = 'action-btn';
                btn.textContent = 'Sign out (' + currentUser.email + ')';
                btn.onclick = handleSignOut;
                const actions = document.querySelector('.dashboard-actions');
                if (actions) actions.appendChild(btn);
            }
        }
        async function handleSignOut() { await supabaseClient.auth.signOut(); window.location.reload(); }
        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) { currentUser = session.user; setAuthState(true); } else { setAuthState(false); }
            supabaseClient.auth.onAuthStateChange((_event, session) => {
                if (session) { currentUser = session.user; setAuthState(true); } else { currentUser = null; setAuthState(false); }
            });
        }
        init();
    </script>
