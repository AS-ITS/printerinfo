name: Build Data and Deploy to Vercel
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # 也可以設定每天凌晨自動跑一次，更新資料

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      # 步驟 A: 執行 Go 程式從 Supabase 抓資料並產生 json
      - name: Generate data.json
        run: |
          go mod tidy
          go run scripts/gen_data.go
        env:
          SUPABASE_DB_CONNECTION: ${{ secrets.SUPABASE_DB_CONNECTION }}

      # 步驟 B: 安裝 Vercel CLI
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # 步驟 C: 部署 (此時 data.json 已經存在於工作目錄中)
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build and Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}