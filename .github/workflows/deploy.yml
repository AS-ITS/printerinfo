name: Build Data and Deploy to Vercel
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # 也可以設定每天凌晨自動跑一次，更新資料

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      # 步驟 A: 執行 Go 程式從 Supabase 抓資料並產生 json
      - name: Generate data.json
        run: |
          cd scripts
          go mod tidy
          go run main.go
          ls -R public/  # 檢查 data.json 是否真的在裡面
        env:
          SUPABASE_DB_CONNECTION: ${{ secrets.SUPABASE_DB_CONNECTION }}

      # 步驟 B: 安裝 Vercel CLI
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # 步驟 C: 部署 (此時 data.json 已經存在於工作目錄中)
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        # 加入 --prod 參數，這會在 Actions 環境內完成打包
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

      - name: Deploy Project Artifacts to Vercel
        # 使用 --prebuilt 參數，直接將剛才打包好的成果送上 Vercel，不進行雲端編譯
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}